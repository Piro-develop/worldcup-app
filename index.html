<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北米中W杯 2026 観戦アプリ</title>
  <style>
    :root{
      --bg:#050913;--panel:#0c1424;--panel2:#111c30;--slot:#101b2f;
      --line:rgba(205,220,245,.24);--line2:rgba(205,220,245,.48);
      --text:#eef5ff;--muted:#8fa1bc;--accent:#34d2d0;--accent2:#155c66;
      --gold:#f0c96b;--danger:#ff6b6b;--shadow:0 12px 30px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050913;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
    body{background:radial-gradient(circle at 50% -10%,rgba(58,98,150,.32),transparent 34%),linear-gradient(180deg,#070c16 0%,#050913 100%)}
    .wrap{max-width:1180px;margin:0 auto;padding:12px 8px 28px}
    .hero{padding:8px 6px 4px}.eyebrow{font-size:10px;letter-spacing:.22em;color:#78c7ff;font-weight:800}.title{font-size:22px;margin:5px 0 2px;font-weight:900}.lead{font-size:12px;color:var(--muted);margin:0;line-height:1.55}
    .tabs{display:flex;gap:6px;overflow-x:auto;position:sticky;top:0;z-index:50;margin-top:10px;padding:7px;border:1px solid var(--line);border-radius:14px;background:rgba(7,12,22,.82);backdrop-filter:blur(14px)}
    .tab{border:1px solid transparent;border-radius:10px;padding:8px 10px;background:transparent;color:#c8d6ea;font-size:12px;font-weight:800;white-space:nowrap}.tab.active{background:rgba(52,210,208,.16);border-color:rgba(52,210,208,.45);color:#fff}
    .panel{margin-top:10px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:8px 2px}.btn{border:1px solid var(--line);border-radius:10px;background:#111c30;color:#eaf3ff;padding:8px 10px;font-weight:800;font-size:12px}.btn.primary{background:linear-gradient(180deg,#1b8a94,#155c66);border-color:rgba(52,210,208,.44)}

    .bracket-card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(11,18,32,.94),rgba(5,9,19,.96));box-shadow:var(--shadow);padding:8px;overflow:hidden}
    .bracket{position:relative;display:grid;grid-template-columns:1fr 28px 1fr;gap:6px;min-height:760px;background:radial-gradient(circle at 50% 50%,rgba(52,210,208,.10),transparent 24%);border-radius:14px;padding:5px 0}
    .spine{position:relative}.spine:before{content:"";position:absolute;top:40px;bottom:40px;left:50%;width:2px;background:linear-gradient(180deg,transparent,var(--line2),var(--line2),transparent)}.spine:after{content:"";position:absolute;left:50%;top:50%;width:9px;height:9px;border-radius:999px;background:var(--gold);box-shadow:0 0 18px rgba(240,201,107,.95);transform:translate(-45%,-50%)}
    .side{display:flex;flex-direction:column;justify-content:space-between;min-width:0}.match{position:relative;min-height:82px}.match:after{content:"";position:absolute;top:50%;width:15px;height:2px;background:var(--line2)}.side.left .match:after{right:-16px}.side.right .match:after{left:-16px}.match-lines{position:absolute;top:19px;bottom:19px;width:13px;border-top:2px solid var(--line2);border-bottom:2px solid var(--line2)}.side.left .match-lines{right:-2px;border-right:2px solid var(--line2);border-radius:0 4px 4px 0}.side.right .match-lines{left:-2px;border-left:2px solid var(--line2);border-radius:4px 0 0 4px}
    .slot{height:36px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,#14223a,#0d1728);display:flex;align-items:center;gap:6px;padding:4px 6px;margin-bottom:6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.025);cursor:pointer;position:relative;z-index:2}.slot:hover{border-color:rgba(52,210,208,.62)}.slot.jp{background:linear-gradient(180deg,rgba(35,135,139,.95),rgba(16,89,96,.95));border-color:rgba(93,243,240,.64)}.slot.empty{color:#a4b3c9}.tag{min-width:31px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;background:#24314a;color:#c8d5e8;font-size:10px;font-weight:900}.slot.jp .tag{background:#6ee7e5;color:#08212a}.team-text{font-size:clamp(10px,2.5vw,14px);font-weight:900;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.team-text .muted{font-weight:700;color:#aab8cc}.flag{font-size:14px;margin-right:3px}.side.right .slot{flex-direction:row}.side.right .team-text{direction:ltr}

    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.56);z-index:100;display:none}.sheet-backdrop.show{display:block}.sheet{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(520px,calc(100vw - 18px));max-height:78vh;overflow:auto;border:1px solid var(--line2);border-radius:18px;background:#07111f;box-shadow:0 28px 70px rgba(0,0,0,.55);z-index:101;display:none}.sheet.show{display:block}.sheet-head{position:sticky;top:0;background:#07111f;border-bottom:1px solid var(--line);padding:12px}.sheet-title{font-weight:900}.sheet-body{padding:10px}.opt{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid rgba(205,220,245,.12);border-radius:12px;margin-bottom:7px;background:#0d1728}.opt input{accent-color:var(--accent);transform:scale(1.15)}.sheet-actions{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);position:sticky;bottom:0;background:#07111f}.sheet-actions .btn{flex:1}

    .card{border:1px solid var(--line);border-radius:16px;background:rgba(12,20,36,.9);padding:14px;margin:10px 0;box-shadow:var(--shadow)}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid rgba(205,220,245,.12);padding:8px;text-align:left}.input{width:100%;border:1px solid var(--line);border-radius:8px;background:#07111f;color:#fff;padding:8px}.small{font-size:12px;color:var(--muted);line-height:1.6}
    @media (max-width:430px){.wrap{padding-left:5px;padding-right:5px}.bracket{grid-template-columns:1fr 18px 1fr;gap:3px;min-height:720px}.slot{height:34px;padding:3px 4px}.tag{min-width:27px;height:22px;font-size:9px}.flag{font-size:12px}.match:after{width:10px}.side.left .match:after{right:-11px}.side.right .match:after{left:-11px}.match-lines{width:9px}.title{font-size:19px}.lead{display:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="eyebrow">FIFA WORLD CUP 2026</div>
      <h1 class="title">北米中W杯 観戦アプリ</h1>
      <p class="lead">決勝トーナメントを中心に、ランキング・速報・ニュースを確認するための軽量版です。</p>
    </header>
    <nav class="tabs" id="tabs"></nav>
    <main id="app"></main>
  </div>
  <div class="sheet-backdrop" id="backdrop"></div>
  <div class="sheet" id="sheet"></div>
<script>
(function(){
'use strict';
const STORE='wc2026-light-bracket-v1';
const T={
 de:['ドイツ','🇩🇪'],jp:['日本','🇯🇵'],fr:['フランス','🇫🇷'],kr:['韓国','🇰🇷'],za:['南アフリカ','🇿🇦'],ch:['スイス','🇨🇭'],ca:['カナダ','🇨🇦'],br:['ブラジル','🇧🇷'],ma:['モロッコ','🇲🇦'],co:['コロンビア','🇨🇴'],pt:['ポルトガル','🇵🇹'],hr:['クロアチア','🇭🇷'],es:['スペイン','🇪🇸'],at:['オーストリア','🇦🇹'],us:['アメリカ','🇺🇸'],be:['ベルギー','🇧🇪'],ci:['コートジボワール','🇨🇮'],no:['ノルウェー','🇳🇴'],mx:['メキシコ','🇲🇽'],eng:['イングランド','🏴'],ar:['アルゼンチン','🇦🇷'],uy:['ウルグアイ','🇺🇾'],au:['オーストラリア','🇦🇺'],py:['パラグアイ','🇵🇾'],eg:['エジプト','🇪🇬'],nl:['オランダ','🇳🇱'],se:['スウェーデン','🇸🇪'],tn:['チュニジア','🇹🇳'],cz:['チェコ','🇨🇿'],qa:['カタール','🇶🇦'],ba:['ボスニア・ヘルツェゴビナ','🇧🇦'],ht:['ハイチ','🇭🇹'],sct:['スコットランド','🏴'],tr:['トゥルキエ','🇹🇷'],ec:['エクアドル','🇪🇨'],cw:['キュラソー','🇨🇼'],ir:['イラン','🇮🇷'],nz:['ニュージーランド','🇳🇿'],sa:['サウジアラビア','🇸🇦'],cv:['カーボベルデ','🇨🇻'],sn:['セネガル','🇸🇳'],iq:['イラク','🇮🇶'],dz:['アルジェリア','🇩🇿'],jo:['ヨルダン','🇯🇴'],uz:['ウズベキスタン','🇺🇿'],cd:['コンゴ民主共和国','🇨🇩'],gh:['ガーナ','🇬🇭'],pa:['パナマ','🇵🇦']
};
const G={A:['mx','za','kr','cz'],B:['ca','ba','qa','ch'],C:['br','ma','ht','sct'],D:['us','py','au','tr'],E:['de','ci','ec','cw'],F:['nl','jp','tn','se'],G:['be','eg','ir','nz'],H:['es','sa','cv','uy'],I:['fr','sn','iq','no'],J:['ar','dz','at','jo'],K:['pt','uz','co','cd'],L:['eng','hr','gh','pa']};
const ALL=Object.keys(T);
const uniq=a=>[...new Set(a)];
const gts=gs=>uniq(gs.flatMap(g=>G[g]||[]));
const TH={t1:gts(['A','B','C','D','F']),t2:gts(['C','D','F','G','H']),t3:gts(['C','E','F','H','I']),t4:gts(['E','H','I','J','K']),t5:gts(['B','E','F','I','J']),t6:gts(['A','E','H','I','J']),t7:gts(['E','F','G','I','J']),t8:gts(['D','E','I','J','L'])};
const tabs=[['bracket','決勝トーナメント'],['goals','得点ランキング'],['assists','アシストランキング'],['flash','速報'],['news','最新ニュース']];
const initial={
 left:[
  [{id:'l1a',tag:'E1',sel:['de'],opts:G.E},{id:'l1b',tag:'3位',sel:[],opts:TH.t1}],
  [{id:'l2a',tag:'I1',sel:['fr'],opts:G.I},{id:'l2b',tag:'3位',sel:['jp'],opts:TH.t2}],
  [{id:'l3a',tag:'A2',sel:['kr','za'],opts:G.A},{id:'l3b',tag:'B2',sel:['ch','ca'],opts:G.B}],
  [{id:'l4a',tag:'F1',sel:['jp'],opts:G.F},{id:'l4b',tag:'C2',sel:['br','ma'],opts:G.C}],
  [{id:'l5a',tag:'K2',sel:['co','pt'],opts:G.K},{id:'l5b',tag:'L2',sel:['hr'],opts:G.L}],
  [{id:'l6a',tag:'H1',sel:['es'],opts:G.H},{id:'l6b',tag:'J2',sel:['at'],opts:G.J}],
  [{id:'l7a',tag:'D1',sel:['us'],opts:G.D},{id:'l7b',tag:'3位',sel:[],opts:TH.t5}],
  [{id:'l8a',tag:'G1',sel:['be'],opts:G.G},{id:'l8b',tag:'3位',sel:[],opts:TH.t6}]
 ],
 right:[
  [{id:'r1a',tag:'C1',sel:['br','ma'],opts:G.C},{id:'r1b',tag:'F2',sel:['jp'],opts:G.F}],
  [{id:'r2a',tag:'E2',sel:['ci'],opts:G.E},{id:'r2b',tag:'I2',sel:['no'],opts:G.I}],
  [{id:'r3a',tag:'A1',sel:['mx'],opts:G.A},{id:'r3b',tag:'3位',sel:[],opts:TH.t3}],
  [{id:'r4a',tag:'L1',sel:['eng'],opts:G.L},{id:'r4b',tag:'3位',sel:[],opts:TH.t4}],
  [{id:'r5a',tag:'J1',sel:['ar'],opts:G.J},{id:'r5b',tag:'H2',sel:['uy'],opts:G.H}],
  [{id:'r6a',tag:'D2',sel:['au','py'],opts:G.D},{id:'r6b',tag:'G2',sel:['eg'],opts:G.G}],
  [{id:'r7a',tag:'B1',sel:['ca','ch'],opts:G.B},{id:'r7b',tag:'3位',sel:[],opts:TH.t7}],
  [{id:'r8a',tag:'K1',sel:['pt','co'],opts:G.K},{id:'r8b',tag:'3位',sel:[],opts:TH.t8}]
 ]
};
let state=load();let editing=null;
function clone(x){return JSON.parse(JSON.stringify(x))}
function load(){try{return Object.assign({active:'bracket',bracket:clone(initial),goals:rows('得点'),assists:rows('アシスト')},JSON.parse(localStorage.getItem(STORE)||'{}'))}catch(e){return {active:'bracket',bracket:clone(initial),goals:rows('得点'),assists:rows('アシスト')}}}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function rows(){return Array.from({length:10},(_,i)=>({rank:i+1,value:'',player:'',team:''}))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function teamText(ids){if(!ids||!ids.length)return '<span class="muted">3位候補</span>';return ids.map(id=>T[id]?`<span class="flag">${T[id][1]}</span>${esc(T[id][0])}`:esc(id)).join(' <span class="muted">/</span> ')}
function render(){document.getElementById('tabs').innerHTML=tabs.map(([id,n])=>`<button class="tab ${state.active===id?'active':''}" data-tab="${id}">${n}</button>`).join('');document.getElementById('app').innerHTML=state.active==='bracket'?bracketHTML():simpleTab(state.active);bind()}
function bracketHTML(){return `<section class="panel"><div class="toolbar"><span class="small">各枠をタップして候補国を選択できます。</span><button class="btn" id="reset">初期表示に戻す</button></div><div class="bracket-card"><div class="bracket"><div class="side left">${state.bracket.left.map(matchHTML).join('')}</div><div class="spine"></div><div class="side right">${state.bracket.right.map(matchHTML).join('')}</div></div></div></section>`}
function matchHTML(m){return `<div class="match"><span class="match-lines"></span>${m.map(slotHTML).join('')}</div>`}
function slotHTML(s){return `<button class="slot ${s.sel.includes('jp')?'jp':''} ${s.sel.length?'':'empty'}" data-slot="${s.id}"><span class="tag">${esc(s.tag)}</span><span class="team-text">${teamText(s.sel)}</span></button>`}
function simpleTab(tab){const title={goals:'得点ランキング',assists:'アシストランキング',flash:'速報',news:'最新ニュース'}[tab];if(tab==='flash')return `<div class="card"><h2>${title}</h2><p class="small">軽量化のため、ここは次工程で再調整します。</p><button class="btn primary">更新</button></div>`;if(tab==='news')return `<div class="card"><h2>${title}</h2><p class="small">軽量化のため、ここは次工程で再調整します。</p><select class="input"><option>W杯全体</option>${ALL.map(id=>`<option>${esc(T[id][0])}</option>`).join('')}</select></div>`;let rowsData=state[tab];return `<div class="card"><h2>${title}</h2><table class="table"><thead><tr><th>順位</th><th>${tab==='goals'?'得点数':'アシスト数'}</th><th>国旗 選手名（国名）</th></tr></thead><tbody>${rowsData.map((r,i)=>`<tr><td>${r.rank}</td><td><input class="input" data-r="${tab}|${i}|value" value="${esc(r.value)}"></td><td><input class="input" data-r="${tab}|${i}|player" placeholder="選手名" value="${esc(r.player)}"></td></tr>`).join('')}</tbody></table></div>`}
function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.active=b.dataset.tab;save();render()});document.querySelectorAll('[data-slot]').forEach(b=>b.onclick=()=>openSheet(b.dataset.slot));const reset=document.getElementById('reset');if(reset)reset.onclick=()=>{if(confirm('添付画像の初期表示に戻しますか？')){state.bracket=clone(initial);save();render()}};document.querySelectorAll('[data-r]').forEach(i=>i.oninput=()=>{const [t,n,f]=i.dataset.r.split('|');state[t][+n][f]=i.value;save()})}
function findSlot(id){for(const side of ['left','right'])for(const m of state.bracket[side])for(const s of m)if(s.id===id)return s;return null}
function openSheet(id){const s=findSlot(id);if(!s)return;editing=id;document.getElementById('backdrop').classList.add('show');document.getElementById('sheet').classList.add('show');document.getElementById('sheet').innerHTML=`<div class="sheet-head"><div class="sheet-title">${esc(s.tag)} の候補国を選択</div><div class="small">複数選択できます。</div></div><div class="sheet-body">${s.opts.map(id=>`<label class="opt"><input type="checkbox" value="${id}" ${s.sel.includes(id)?'checked':''}><span class="flag">${T[id][1]}</span><b>${esc(T[id][0])}</b></label>`).join('')}</div><div class="sheet-actions"><button class="btn" id="clearSel">クリア</button><button class="btn primary" id="doneSel">反映</button></div>`;document.getElementById('doneSel').onclick=applySheet;document.getElementById('clearSel').onclick=()=>{document.querySelectorAll('#sheet input').forEach(x=>x.checked=false)}}
function closeSheet(){document.getElementById('backdrop').classList.remove('show');document.getElementById('sheet').classList.remove('show');editing=null}
function applySheet(){const s=findSlot(editing);if(s){s.sel=[...document.querySelectorAll('#sheet input:checked')].map(x=>x.value);save();closeSheet();render()}}
document.getElementById('backdrop').onclick=closeSheet;
render();
})();
</script>
</body>
</html>
