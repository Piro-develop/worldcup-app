<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北米中W杯 2026 観戦アプリ</title>
  <style>
    :root{--bg:#080b12;--panel:#111827;--panel2:#0f172a;--line:#334155;--text:#f8fafc;--muted:#94a3b8;--blue:#2563eb;--blue2:#1d4ed8;--yellow:#facc15;--red:#ef4444;--green:#22c55e}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#1e293b 0,#0f1219 45%,#080a10 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif} a{color:inherit}.wrap{max-width:1200px;margin:0 auto;padding:18px 14px 40px}.eyebrow{font-size:12px;letter-spacing:.22em;color:#93c5fd;font-weight:800}.title{font-size:28px;margin:8px 0 6px;font-weight:900}.lead{font-size:14px;color:var(--muted);line-height:1.7;margin:0 0 16px}.tabs{display:flex;gap:8px;overflow-x:auto;padding:8px;background:rgba(15,23,42,.82);border:1px solid var(--line);border-radius:16px;position:sticky;top:0;z-index:20;backdrop-filter:blur(10px)}.tab{border:0;border-radius:12px;padding:10px 14px;background:#1e293b;color:#cbd5e1;font-weight:900;white-space:nowrap}.tab.active{background:var(--blue);color:white}.panel{margin-top:16px}.card{background:rgba(15,23,42,.78);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px}.note{background:rgba(30,64,175,.32);border-color:#3b82f6;color:#dbeafe}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:12px;background:var(--blue);color:white;font-weight:900;padding:10px 14px}.btn.secondary{background:#1e293b;color:#e2e8f0;border:1px solid #334155}.btn:disabled{opacity:.6}.grid{display:grid;gap:12px}.bracket{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}.match{min-width:300px;background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:18px;padding:12px}.match h3{margin:0 0 4px;font-size:15px}.venue{font-size:11px;color:var(--muted);margin-bottom:8px}.slot{border:1px solid #475569;border-radius:14px;background:#111827;padding:10px;margin-top:8px}.slot.jp{border-color:var(--yellow);background:rgba(113,63,18,.72)}.slot-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.label{display:inline-block;min-width:78px;text-align:center;background:#334155;color:#e2e8f0;border-radius:9px;padding:5px 7px;font-weight:900;font-size:12px}.slot.jp .label{background:var(--yellow);color:#111827}.select{width:100%;border:1px solid #475569;border-radius:12px;background:#020617;color:white;padding:8px;min-height:92px}.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid #475569;background:#020617;border-radius:999px;padding:4px 8px;font-size:12px}.pill.jp{background:var(--yellow);border-color:#fde68a;color:#111827;font-weight:900}.flag{width:20px;height:auto;border-radius:2px;object-fit:contain}.section-title{font-size:19px;margin:22px 0 10px;font-weight:900}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.78)}table{border-collapse:collapse;width:100%;min-width:620px}th,td{border-bottom:1px solid #1f2937;padding:9px;text-align:left;font-size:14px}th{background:#1e293b;color:#cbd5e1}.input,.country-select,.api-input,.news-select{width:100%;border:1px solid #475569;border-radius:10px;background:#020617;color:white;padding:8px}.small{font-size:12px;color:var(--muted);line-height:1.6}.status{font-size:12px;color:#cbd5e1;margin-top:8px}.game{border:1px solid var(--line);background:rgba(15,23,42,.78);border-radius:16px;padding:12px}.scoreline{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-top:8px}.score{text-align:center;background:#020617;border-radius:10px;padding:8px 10px;font-weight:900}.right{text-align:right}.news-item{display:block;text-decoration:none;border:1px solid var(--line);border-radius:16px;background:rgba(15,23,42,.78);padding:12px}.news-title{font-weight:900;line-height:1.45}.source{font-size:11px;color:#cbd5e1;background:#1e293b;border-radius:999px;padding:3px 7px;margin-left:6px}.groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}.group-card{background:#020617;border:1px solid #1f2937;border-radius:14px;padding:10px}.hide{display:none}.error{color:#fecaca}.success{color:#bbf7d0}@media(max-width:640px){.title{font-size:24px}.match{min-width:280px}.wrap{padding-left:10px;padding-right:10px}}
  </style>
</head>
<body>
  <noscript><div style="padding:20px;color:white;background:#991b1b">JavaScriptを有効にしてください。</div></noscript>
  <div class="wrap">
    <header>
      <div class="eyebrow">FIFA WORLD CUP 2026</div>
      <h1 class="title">北米中W杯 2026 観戦アプリ</h1>
      <p class="lead">決勝トーナメントのシミュレーション、ランキング、速報、国別ニュースをまとめた簡易Webアプリです。React/Babelを使わないため、GitHub Pagesで白画面になりにくい版です。</p>
    </header>

    <nav class="tabs" id="tabs"></nav>
    <main id="app"></main>
  </div>

<script>
(function(){
  'use strict';
  const STORAGE='wc2026-vanilla-v1';
  const SCOREBOARD='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
  const NEWS_RSS='https://news.google.com/rss/search';
  const PROXY='https://api.allorigins.win/raw?url=';

  const teams={
    mx:['メキシコ','mx'], za:['南アフリカ','za'], kr:['韓国','kr'], cz:['チェコ','cz'],
    ca:['カナダ','ca'], ba:['ボスニア・ヘルツェゴビナ','ba'], qa:['カタール','qa'], ch:['スイス','ch'],
    br:['ブラジル','br'], ma:['モロッコ','ma'], ht:['ハイチ','ht'], sct:['スコットランド','gb-sct'],
    us:['アメリカ','us'], py:['パラグアイ','py'], au:['オーストラリア','au'], tr:['トゥルキエ','tr'],
    de:['ドイツ','de'], ci:['コートジボワール','ci'], ec:['エクアドル','ec'], cw:['キュラソー','cw'],
    nl:['オランダ','nl'], jp:['日本','jp'], tn:['チュニジア','tn'], se:['スウェーデン','se'],
    be:['ベルギー','be'], eg:['エジプト','eg'], ir:['イラン','ir'], nz:['ニュージーランド','nz'],
    es:['スペイン','es'], sa:['サウジアラビア','sa'], cv:['カーボベルデ','cv'], uy:['ウルグアイ','uy'],
    fr:['フランス','fr'], sn:['セネガル','sn'], iq:['イラク','iq'], no:['ノルウェー','no'],
    ar:['アルゼンチン','ar'], dz:['アルジェリア','dz'], at:['オーストリア','at'], jo:['ヨルダン','jo'],
    pt:['ポルトガル','pt'], uz:['ウズベキスタン','uz'], co:['コロンビア','co'], cd:['コンゴ民主共和国','cd'],
    eng:['イングランド','gb-eng'], hr:['クロアチア','hr'], gh:['ガーナ','gh'], pa:['パナマ','pa']
  };
  const group={A:['mx','za','kr','cz'],B:['ca','ba','qa','ch'],C:['br','ma','ht','sct'],D:['us','py','au','tr'],E:['de','ci','ec','cw'],F:['nl','jp','tn','se'],G:['be','eg','ir','nz'],H:['es','sa','cv','uy'],I:['fr','sn','iq','no'],J:['ar','dz','at','jo'],K:['pt','uz','co','cd'],L:['eng','hr','gh','pa']};
  const allIds=Object.keys(teams);
  const uniq=a=>[...new Set(a)];
  const groupTeams=letters=>uniq(letters.flatMap(g=>group[g]||[]));
  const third={
    'A/B/C/D/F':groupTeams(['A','B','C','D','F']),'C/D/F/G/H':groupTeams(['C','D','F','G','H']),
    'C/E/F/H/I':groupTeams(['C','E','F','H','I']),'E/H/I/J/K':groupTeams(['E','H','I','J','K']),
    'B/E/F/I/J':groupTeams(['B','E','F','I','J']),'A/E/H/I/J':groupTeams(['A','E','H','I','J']),
    'E/F/G/I/J':groupTeams(['E','F','G','I','J']),'D/E/I/J/L':groupTeams(['D','E','I','J','L'])
  };

  const ro32=[
    ['M73','Match 73','6/28｜LA',['A2','g','A'],['B2','g','B']],
    ['M74','Match 74','6/29｜Foxborough',['E1','g','E'],['3位 A/B/C/D/F','t','A/B/C/D/F']],
    ['M75','Match 75','6/30｜Guadalupe',['F1','g','F'],['C2','g','C']],
    ['M76','Match 76','6/29｜Houston',['C1','g','C'],['F2','g','F']],
    ['M77','Match 77','6/30｜New Jersey',['I1','g','I'],['3位 C/D/F/G/H','t','C/D/F/G/H']],
    ['M78','Match 78','6/30｜Arlington',['E2','g','E'],['I2','g','I']],
    ['M79','Match 79','7/1｜Mexico City',['A1','g','A'],['3位 C/E/F/H/I','t','C/E/F/H/I']],
    ['M80','Match 80','7/1｜Atlanta',['L1','g','L'],['3位 E/H/I/J/K','t','E/H/I/J/K']],
    ['M81','Match 81','7/2｜Santa Clara',['D1','g','D'],['3位 B/E/F/I/J','t','B/E/F/I/J']],
    ['M82','Match 82','7/1｜Seattle',['G1','g','G'],['3位 A/E/H/I/J','t','A/E/H/I/J']],
    ['M83','Match 83','7/3｜Toronto',['K2','g','K'],['L2','g','L']],
    ['M84','Match 84','7/2｜LA',['H1','g','H'],['J2','g','J']],
    ['M85','Match 85','7/3｜Vancouver',['B1','g','B'],['3位 E/F/G/I/J','t','E/F/G/I/J']],
    ['M86','Match 86','7/3｜Miami',['J1','g','J'],['H2','g','H']],
    ['M87','Match 87','7/4｜Kansas City',['K1','g','K'],['3位 D/E/I/J/L','t','D/E/I/J/L']],
    ['M88','Match 88','7/3｜Arlington',['D2','g','D'],['G2','g','G']]
  ];
  const later=[
    ['ベスト16',[['M89','勝者 M73','勝者 M75'],['M90','勝者 M74','勝者 M77'],['M91','勝者 M76','勝者 M78'],['M92','勝者 M79','勝者 M80'],['M93','勝者 M83','勝者 M84'],['M94','勝者 M81','勝者 M82'],['M95','勝者 M86','勝者 M88'],['M96','勝者 M85','勝者 M87']]],
    ['準々決勝',[['M97','勝者 M89','勝者 M90'],['M98','勝者 M93','勝者 M94'],['M99','勝者 M91','勝者 M92'],['M100','勝者 M95','勝者 M96']]],
    ['準決勝',[['M101','勝者 M97','勝者 M98'],['M102','勝者 M99','勝者 M100']]],
    ['決勝',[['M104','勝者 M101','勝者 M102']]]
  ];
  const tabs=[['bracket','決勝トーナメント'],['goals','得点ランキング'],['assists','アシストランキング'],['flash','速報'],['news','最新ニュース']];

  function initialState(){
    const bracket={};
    ro32.forEach(m=>{bracket[m[0]]={id:m[0],title:m[1],venue:m[2],a:slot(m[3]),b:slot(m[4])};});
    later.forEach(r=>r[1].forEach(m=>{bracket[m[0]]={id:m[0],title:m[0],venue:'',a:freeSlot(m[1]),b:freeSlot(m[2])};}));
    bracket.CHAMPION={id:'CHAMPION',title:'優勝予想',venue:'',a:freeSlot('優勝'),b:freeSlot('準優勝')};
    return {active:'bracket',bracket,goals:blankRows(),assists:blankRows(),flash:{results:[],upcoming:[],live:[],status:'未更新',last:''},news:{items:[],status:'未更新',last:''},newsTarget:'all',goalsApi:'',assistsApi:''};
  }
  function slot(def){const [label,kind,key]=def; const opts=kind==='g'?(group[key]||[]):(kind==='t'?(third[key]||allIds):allIds); return {label,kind,key,opts,selected:kind==='g'?[...opts]:[]};}
  function freeSlot(label){return {label,kind:'free',key:'',opts:allIds,selected:[]};}
  function blankRows(){return Array.from({length:10},(_,i)=>({rank:i+1,value:'',player:'',team:''}));}
  function load(){try{return Object.assign(initialState(),JSON.parse(localStorage.getItem(STORAGE)||'{}'));}catch(e){return initialState();}}
  let state=load();
  function save(){localStorage.setItem(STORAGE,JSON.stringify(state));}
  function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function flag(id){const t=teams[id];return t?`<img class="flag" src="https://flagcdn.com/w40/${t[1]}.png" alt="${esc(t[0])}">`:'';}
  function pill(id){const t=teams[id];return t?`<span class="pill ${id==='jp'?'jp':''}">${flag(id)}${esc(t[0])}</span>`:'';}
  function fmt(d){if(!d)return'';const x=new Date(d);if(isNaN(x))return d;return new Intl.DateTimeFormat('ja-JP',{month:'numeric',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'}).format(x);}
  function ymd(d){return String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}

  function render(){renderTabs();const app=document.getElementById('app'); if(state.active==='bracket')app.innerHTML=bracketHtml(); if(state.active==='goals')app.innerHTML=rankingHtml('goals'); if(state.active==='assists')app.innerHTML=rankingHtml('assists'); if(state.active==='flash')app.innerHTML=flashHtml(); if(state.active==='news')app.innerHTML=newsHtml(); bind();}
  function renderTabs(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.active===t[0]?'active':''}" data-tab="${t[0]}">${t[1]}</button>`).join('');}
  function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.active=b.dataset.tab;save();render();});
    document.querySelectorAll('[data-slot]').forEach(sel=>sel.onchange=()=>{const [mid,side]=sel.dataset.slot.split('|');state.bracket[mid][side].selected=[...sel.selectedOptions].map(o=>o.value);save();render();});
    document.querySelectorAll('[data-rank]').forEach(i=>i.oninput=rankingInput);
    const reset=document.getElementById('resetBracket'); if(reset)reset.onclick=()=>{if(confirm('トーナメントを初期化しますか？')){state.bracket=initialState().bracket;save();render();}};
    const copy=document.getElementById('copyJson'); if(copy)copy.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(JSON.stringify(state.bracket,null,2));alert('コピーしました。');};
    const add=document.getElementById('addRow'); if(add)add.onclick=()=>{state[state.active].push({rank:state[state.active].length+1,value:'',player:'',team:''});save();render();};
    const clear=document.getElementById('clearRows'); if(clear)clear.onclick=()=>{if(confirm('空欄に戻しますか？')){state[state.active]=blankRows();save();render();}};
    const api=document.getElementById('apiUrl'); if(api)api.oninput=()=>{state[state.active+'Api']=api.value;save();};
    const updateRanking=document.getElementById('updateRanking'); if(updateRanking)updateRanking.onclick=fetchRanking;
    const updateFlash=document.getElementById('updateFlash'); if(updateFlash)updateFlash.onclick=fetchFlash;
    const newsSel=document.getElementById('newsTarget'); if(newsSel)newsSel.onchange=()=>{state.newsTarget=newsSel.value;save();};
    const updateNews=document.getElementById('updateNews'); if(updateNews)updateNews.onclick=fetchNews;
  }
  function bracketHtml(){return `<section class="panel"><div class="card note"><b>決勝トーナメント・シミュレーション</b><p class="small">各枠で候補国を複数選択できます。グループ1・2位枠は、そのグループ4か国を初期候補として表示しています。</p></div><div class="row"><button class="btn secondary" id="resetBracket">初期化</button><button class="btn secondary" id="copyJson">JSONコピー</button></div><div class="card"><details><summary><b>グループ一覧を表示</b></summary><div class="groups">${Object.entries(group).map(([g,ids])=>`<div class="group-card"><b>Group ${g}</b><div class="pills">${ids.map(pill).join('')}</div></div>`).join('')}</div></details></div>${roundHtml('ラウンド32',ro32.map(m=>state.bracket[m[0]]))}${later.map(r=>roundHtml(r[0],r[1].map(m=>state.bracket[m[0]]))).join('')}${roundHtml('優勝・準優勝予想',[state.bracket.CHAMPION])}</section>`;}
  function roundHtml(title,matches){return `<h2 class="section-title">${title}</h2><div class="bracket">${matches.map(matchHtml).join('')}</div>`;}
  function matchHtml(m){return `<div class="match"><h3>${esc(m.title)}</h3>${m.venue?`<div class="venue">${esc(m.venue)}</div>`:''}${slotHtml(m.id,'a',m.a)}${slotHtml(m.id,'b',m.b)}</div>`;}
  function slotHtml(mid,side,s){const jp=s.selected.includes('jp');return `<div class="slot ${jp?'jp':''}"><div class="slot-head"><span class="label">${esc(s.label)}</span><span class="small">${s.kind==='g'?'グループ'+s.key:s.kind==='t'?'対象 '+s.key:'全出場国'}</span></div><select class="select" multiple data-slot="${mid}|${side}">${s.opts.map(id=>`<option value="${id}" ${s.selected.includes(id)?'selected':''}>${teams[id][0]}</option>`).join('')}</select><div class="pills">${s.selected.map(pill).join('')||'<span class="small">未選択</span>'}</div></div>`;}
  function rankingHtml(type){const unit=type==='goals'?'得点数':'アシスト数';const title=type==='goals'?'得点ランキング':'アシストランキング';const api=state[type+'Api']||'';return `<section class="panel"><div class="card"><div class="row" style="justify-content:space-between"><div><h2 style="margin:0">${title}</h2><p class="small">順位、${unit}、国旗、選手名（国名）を表示します。</p></div><button class="btn" id="updateRanking">更新</button></div><div style="margin-top:10px"><div class="small">API設定。未設定なら手入力で使えます。</div><input class="api-input" id="apiUrl" value="${esc(api)}" placeholder="https://example.com/worldcup/${type}.json"></div></div><div class="table-wrap"><table><thead><tr><th>順位</th><th>${unit}</th><th>国旗 選手名（国名）</th></tr></thead><tbody>${state[type].map((r,i)=>rowHtml(type,r,i)).join('')}</tbody></table></div><div class="row" style="margin-top:10px"><button class="btn secondary" id="addRow">行を追加</button><button class="btn secondary" id="clearRows">空欄に戻す</button></div></section>`;}
  function rowHtml(type,r,i){return `<tr><td><input class="input" style="width:70px" data-rank="${type}|${i}|rank" value="${esc(r.rank)}"></td><td><input class="input" style="width:90px" data-rank="${type}|${i}|value" value="${esc(r.value)}"></td><td><div class="grid" style="grid-template-columns:1fr 180px"><input class="input" data-rank="${type}|${i}|player" value="${esc(r.player)}" placeholder="選手名"><select class="country-select" data-rank="${type}|${i}|team"><option value="">国を選択</option>${allIds.map(id=>`<option value="${id}" ${r.team===id?'selected':''}>${teams[id][0]}</option>`).join('')}</select></div><div class="pills">${r.team?pill(r.team):''}<span class="small">${esc(r.player||'選手名未入力')}${r.team?'（'+esc(teams[r.team][0])+'）':''}</span></div></td></tr>`;}
  function rankingInput(e){const [type,i,field]=e.target.dataset.rank.split('|');state[type][Number(i)][field]=e.target.value;save();}
  async function fetchRanking(){const type=state.active;const url=state[type+'Api'];if(!url){alert('API URLが未設定です。現時点では手入力で利用してください。');return;}try{const res=await fetch(url);if(!res.ok)throw new Error('HTTP '+res.status);const json=await res.json();const rows=(Array.isArray(json)?json:(json.items||json.data||json.leaders||[])).map((x,i)=>({rank:x.rank||i+1,value:String(x.value??x.goals??x.assists??x.count??''),player:x.player||x.playerName||x.name||'',team:resolveTeam(x.teamId||x.country||x.team||x.nation||'')}));state[type]=rows.length?rows:state[type];save();render();}catch(e){alert('取得できませんでした：'+e.message);}}
  function resolveTeam(raw){const v=String(raw||'').toLowerCase();if(teams[v])return v;return allIds.find(id=>teams[id][0].toLowerCase()===v||v.includes(teams[id][0].toLowerCase()))||'';}
  function flashHtml(){const f=state.flash;return `<section class="panel"><div class="card"><div class="row" style="justify-content:space-between"><div><h2 style="margin:0">速報</h2><p class="small">現在時刻を基準に、24時間前までの結果と24時間後までの試合予定を表示します。</p></div><button class="btn" id="updateFlash">更新</button></div><div class="status">状態：${esc(f.status)}${f.last?'｜最終更新 '+fmt(f.last):''}</div></div>${gameSection('試合中',f.live,true)}${gameSection('直近24時間の結果',f.results,true)}${gameSection('今後24時間の試合予定',f.upcoming,false)}</section>`;}
  function gameSection(title,items,score){return `<h2 class="section-title">${title}</h2><div class="grid">${items.length?items.map(g=>gameHtml(g,score)).join(''):'<div class="card small">まだ取得結果がありません。更新ボタンを押してください。</div>'}</div>`;}
  function gameHtml(g,show){return `<div class="game"><div class="row" style="justify-content:space-between"><span class="small">${fmt(g.date)}</span><span class="small">${esc(g.status)}</span></div><div class="scoreline"><div class="right"><b>${esc(g.away.name||g.away.abbr)}</b></div><div class="score">${show?esc(g.away.score)+' - '+esc(g.home.score):'vs'}</div><div><b>${esc(g.home.name||g.home.abbr)}</b></div></div></div>`;}
  async function fetchFlash(){state.flash.status='更新中...';save();render();try{const now=new Date(),from=new Date(now-86400000),to=new Date(now.getTime()+86400000);const dates=[...new Set([from,now,to].map(ymd))];const payloads=await Promise.all(dates.map(d=>fetch(SCOREBOARD+'?dates='+d+'&limit=100').then(r=>r.json())));const events=payloads.flatMap(p=>p.events||[]).map(parseEvent);const unique=Object.values(events.reduce((a,e)=>(a[e.id]=e,a),{}));const win=unique.filter(e=>{const d=new Date(e.date);return d>=from&&d<=to;}).sort((a,b)=>new Date(a.date)-new Date(b.date));state.flash={results:win.filter(e=>e.completed&&new Date(e.date)<=now).sort((a,b)=>new Date(b.date)-new Date(a.date)),upcoming:win.filter(e=>!e.completed&&new Date(e.date)>=now),live:win.filter(e=>!e.completed&&e.state==='in'),status:'取得しました。',last:new Date().toISOString()};}catch(e){state.flash.status='取得できませんでした：'+e.message;}save();render();}
  function parseEvent(ev){const c=(ev.competitions||[])[0]||{},cs=c.competitors||[],home=cs.find(x=>x.homeAway==='home')||cs[0]||{},away=cs.find(x=>x.homeAway==='away')||cs[1]||{},st=(ev.status||{}).type||{};return{id:ev.id,date:ev.date,status:st.shortDetail||st.description||st.name||'',completed:!!st.completed,state:st.state||'',home:{name:home.team?.displayName||home.team?.shortDisplayName||'',abbr:home.team?.abbreviation||'',score:home.score??''},away:{name:away.team?.displayName||away.team?.shortDisplayName||'',abbr:away.team?.abbreviation||'',score:away.score??''}};}
  function newsOptions(){return [{id:'all',label:'W杯全体',query:'サッカー ワールドカップ 2026'}].concat(allIds.map(id=>({id,label:teams[id][0],query:'サッカー ワールドカップ 2026 '+teams[id][0]})));}
  function newsHtml(){const opts=newsOptions();return `<section class="panel"><div class="card"><h2 style="margin:0">最新ニュース</h2><p class="small">W杯全体、または国別に日本語記事を取得します。</p><div class="row"><select class="news-select" id="newsTarget" style="flex:1">${opts.map(o=>`<option value="${o.id}" ${state.newsTarget===o.id?'selected':''}>${o.label}</option>`).join('')}</select><button class="btn" id="updateNews">更新</button></div><div class="status">状態：${esc(state.news.status)}${state.news.last?'｜最終更新 '+fmt(state.news.last):''}</div></div><div class="grid">${state.news.items.length?state.news.items.map(n=>`<a class="news-item" href="${esc(n.link)}" target="_blank" rel="noreferrer"><div class="news-title">${esc(n.title)}${n.source?`<span class="source">${esc(n.source)}</span>`:''}</div><div class="small">${fmt(n.pubDate)}</div></a>`).join(''):'<div class="card small">まだニュースがありません。対象を選んで更新してください。</div>'}</div></section>`;}
  async function fetchNews(){state.news.status='更新中...';save();render();try{const o=newsOptions().find(x=>x.id===state.newsTarget)||newsOptions()[0];const params=new URLSearchParams({q:o.query,hl:'ja',gl:'JP',ceid:'JP:ja'});const rss=NEWS_RSS+'?'+params.toString();const text=await fetch(PROXY+encodeURIComponent(rss)).then(r=>r.text());const doc=new DOMParser().parseFromString(text,'text/xml');const items=[...doc.querySelectorAll('item')].slice(0,12).map(item=>({title:item.querySelector('title')?.textContent||'',link:item.querySelector('link')?.textContent||'',pubDate:item.querySelector('pubDate')?.textContent||'',source:item.querySelector('source')?.textContent||''})).filter(x=>x.title&&x.link);if(!items.length)throw new Error('ニュースを読み取れませんでした。');state.news={items,status:o.label+'のニュースを'+items.length+'件取得しました。',last:new Date().toISOString()};}catch(e){state.news.status='取得できませんでした：'+e.message;}save();render();}
  try{render();}catch(e){document.getElementById('app').innerHTML='<div class="card error"><b>画面表示エラー</b><p>'+esc(e.message)+'</p></div>';console.error(e);}
})();
</script>
