    const uniq = (arr) => Array.from(new Set(arr));

    const thirdOptions = {

    const makeSlot = ({ label, kind = 'free', group = null, thirdKey = null, selected = null, note = '' }) => {
      let options = allTeamIds;
      let defaultSelected = [];

      if (kind === 'group') {
        options = GROUPS[group] || [];
        defaultSelected = selected || options;
      } else if (kind === 'third') {
        options = thirdOptions[thirdKey] || allTeamIds;
        defaultSelected = selected || [];
      } else {
        options = allTeamIds;
        defaultSelected = selected || [];
      }

      return {
        label,
        kind,
        group,
        thirdKey,
        note,
        options,
        selected: defaultSelected,
        highlight: defaultSelected.includes('jp'),
      };
    };

    const buildInitialBracket = () => {

    const INITIAL_BRACKET = buildInitialBracket();

        { label: 'Yahoo Sports｜W杯', url: 'https://sports.yahoo.com/soccer/' },
      ],
    };

    const safeLoad = (key, fallback) => {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        return fallback;
      }
    };

    const saveJson = (key, value) => {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    };

    const toDateInput = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}${m}${d}`;
    };

    const formatDateTime = (value) => {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return new Intl.DateTimeFormat('ja-JP', {
        month: 'numeric', day: 'numeric', weekday: 'short', hour: '2-digit', minute: '2-digit',
      }).format(d);
    };

    const fetchWithTimeout = async (url, options = {}, timeoutMs = 9000) => {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res;
      } finally {
        clearTimeout(timer);
      }
    };

    const normalizeRankingRows = (payload, type) => {
      const sourceRows = Array.isArray(payload) ? payload : (payload?.leaders || payload?.items || payload?.data || []);
      return sourceRows.slice(0, 30).map((item, index) => {
        const player = item.player || item.playerName || item.name || item.athlete?.displayName || item.athlete?.fullName || '';
        const rawTeam = item.teamId || item.team || item.countryCode || item.country || item.nation || item.athlete?.team?.abbreviation || '';
        const teamId = resolveTeamId(rawTeam);
        const value = item.value ?? item.count ?? item.goals ?? item.assists ?? item.total ?? item.stat ?? '';
        return {
          rank: item.rank || index + 1,
          player,
          teamId,
          value: String(value),
        };
      }).filter((row) => row.player || row.teamId || row.value);
    };

    const resolveTeamId = (raw) => {
      if (!raw) return '';
      const value = String(raw).toLowerCase().trim();
      if (TEAMS[value]) return value;
      const byFlag = Object.entries(TEAMS).find(([id, team]) => team.flag.toLowerCase() === value);
      if (byFlag) return byFlag[0];
      const byName = Object.entries(TEAMS).find(([id, team]) =>
        team.name.toLowerCase() === value || value.includes(team.name.toLowerCase())
      );
      return byName ? byName[0] : '';
    };

    const parseEspnEvent = (event) => {
      const comp = event?.competitions?.[0] || {};
      const competitors = comp.competitors || [];
      const home = competitors.find((c) => c.homeAway === 'home') || competitors[0];
      const away = competitors.find((c) => c.homeAway === 'away') || competitors[1];
      const statusType = event?.status?.type || {};
      const statusText = statusType.shortDetail || statusType.description || event?.status?.type?.name || '';
      return {
        id: event.id,
        name: event.shortName || event.name || '',
        date: event.date,
        status: statusText,
        completed: Boolean(statusType.completed),
        state: statusType.state || '',
        home: {
          name: home?.team?.displayName || home?.team?.shortDisplayName || '',
          abbr: home?.team?.abbreviation || '',
          score: home?.score ?? '',
        },
        away: {
          name: away?.team?.displayName || away?.team?.shortDisplayName || '',
          abbr: away?.team?.abbreviation || '',
          score: away?.score ?? '',
        },
      };
    };

    const NEWS_OPTIONS = [
      { id: 'all', label: 'W杯全体', query: 'サッカー ワールドカップ 2026' },
      ...allTeamIds.map((id) => ({ id, label: TEAMS[id].name, query: `サッカー ワールドカップ 2026 ${TEAMS[id].name}` })),

    function Flag({ teamId, className = 'w-5 h-auto' }) {
      const team = TEAMS[teamId];
      if (!team) return null;
      return <img src={`https://flagcdn.com/w40/${team.flag}.png`} alt={team.name} className={`${className} inline-block object-contain rounded-[2px]`} />;
    }

    function TeamPill({ teamId }) {
      const team = TEAMS[teamId];
      if (!team) return null;
      return (
        <span className={`inline-flex items-center gap-1.5 rounded-full px-2 py-1 text-xs border ${teamId === 'jp' ? 'bg-yellow-300 text-slate-950 border-yellow-100 font-bold' : 'bg-slate-900/80 text-white border-slate-700'}`}>
          <Flag teamId={teamId} className="w-4 h-auto" />
          {team.name}
        </span>
      );
    }

    function SlotPicker({ slotKey, slot, onChange }) {
      const [open, setOpen] = useState(false);
      const selected = slot.selected || [];
      const selectedText = selected.length > 0 ? selected.map((id) => TEAMS[id]?.name).filter(Boolean).join(' / ') : '候補を選択';

      const toggleTeam = (teamId) => {
        const next = selected.includes(teamId)
          ? selected.filter((id) => id !== teamId)
          : [...selected, teamId];
        onChange({ ...slot, selected: next, highlight: next.includes('jp') });
      };

      const selectAll = () => onChange({ ...slot, selected: [...slot.options], highlight: slot.options.includes('jp') });
      const clearAll = () => onChange({ ...slot, selected: [], highlight: false });

      return (
        <div className="relative">
          <button
            type="button"
            onClick={() => setOpen(!open)}
            className={`w-full min-h-[3.1rem] rounded-xl border px-2.5 py-2 text-left transition ${slot.highlight ? 'bg-yellow-900/80 border-yellow-400' : 'bg-slate-800/95 border-slate-700 hover:border-slate-500'}`}
          >
            <div className="flex items-center gap-2">
              <span className={`w-[4.8rem] shrink-0 rounded-lg px-2 py-1 text-center text-[11px] font-black ${slot.highlight ? 'bg-yellow-300 text-slate-950' : 'bg-slate-700 text-slate-200'}`}>
                {slot.label}
              </span>
              <div className="min-w-0 flex-1">
                <div className="flex flex-wrap gap-1">
                  {selected.length > 0 ? selected.slice(0, 5).map((id) => <TeamPill key={id} teamId={id} />) : <span className="text-sm text-slate-400">{selectedText}</span>}
                  {selected.length > 5 && <span className="text-xs text-slate-400 px-1 py-1">+{selected.length - 5}</span>}
                </div>
              </div>
              <span className="text-slate-400 text-xs">▼</span>
            </div>
          </button>

          {open && (
            <div className="slot-panel absolute left-0 right-0 z-40 mt-2 max-h-80 overflow-y-auto rounded-2xl border border-slate-600 bg-slate-950 p-3 soft-scroll">
              <div className="mb-2 flex items-center justify-between gap-2">
                <p className="text-xs text-slate-400">
                  {slot.kind === 'group' ? `グループ${slot.group}の4か国から選択` : slot.kind === 'third' ? `対象グループ：${slot.thirdKey}` : '全出場国から選択'}

                <div className="flex gap-1">

    function StatsTab({ type, stats, setStats }) {
      const title = type === 'goals' ? '得点ランキング' : 'アシストランキング';
      const unit = type === 'goals' ? '得点数' : 'アシスト数';
      const rows = stats[type] || [];
      const meta = stats.meta?.[type] || {};
      const [loading, setLoading] = useState(false);
      const [endpointMap, setEndpointMap] = useState(() => safeLoad(RANKING_ENDPOINT_STORAGE_KEY, {
        goals: DATA_SOURCES.ranking.goalsJsonUrl,
        assists: DATA_SOURCES.ranking.assistsJsonUrl,
      }));
      const endpoint = endpointMap[type] || '';

      useEffect(() => saveJson(RANKING_ENDPOINT_STORAGE_KEY, endpointMap), [endpointMap]);

      const updateRow = (index, field, value) => {
        setStats((prev) => {
          const nextRows = [...(prev[type] || [])];
          nextRows[index] = { ...nextRows[index], [field]: value };
          return { ...prev, [type]: nextRows };
        });
      };

      const setMeta = (status, lastUpdated = '') => {
        setStats((prev) => ({
          ...prev,
          meta: {
            ...(prev.meta || {}),
            [type]: { status, lastUpdated: lastUpdated || prev.meta?.[type]?.lastUpdated || '' },
          },
        }));
      };

      const fetchRanking = async () => {
        if (!endpoint) {
          setMeta('ランキングAPIが未設定です。下の「API設定」にJSON URLを入れると、更新ボタンで取得できます。');
          return;
        }
        setLoading(true);
        try {
          const res = await fetchWithTimeout(endpoint);
          const json = await res.json();
          const nextRows = normalizeRankingRows(json, type);
          if (!nextRows.length) throw new Error('ランキング形式のデータを読み取れませんでした。');
          setStats((prev) => ({
            ...prev,
            [type]: nextRows,
            meta: {
              ...(prev.meta || {}),
              [type]: { status: `${nextRows.length}件を取得しました。`, lastUpdated: new Date().toISOString() },
            },
          }));
        } catch (e) {
          setMeta(`取得できませんでした：${e.message || e}`);
        } finally {
          setLoading(false);
        }
      };

      const addRow = () => {
        setStats((prev) => ({
          ...prev,
          [type]: [...(prev[type] || []), { rank: (prev[type] || []).length + 1, player: '', teamId: '', value: '' }],
        }));
      };

      const clearRows = () => {
        if (!confirm(`${title}を空欄に戻しますか？`)) return;
        setStats((prev) => ({ ...prev, [type]: buildEmptyRankingRows() }));

      return (
        <section className="space-y-4">
          <div className="rounded-2xl border border-slate-700 bg-slate-900/70 p-4">
            <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div>

                <p className="mt-1 text-sm text-slate-400">順位、{unit}、国旗、選手名（国名）を一覧表示します。手入力データは端末内に自動保存されます。</p>
              </div>
              <button onClick={fetchRanking} disabled={loading} className="rounded-xl bg-blue-600 px-4 py-2 text-sm font-black hover:bg-blue-500 disabled:opacity-60">
                {loading ? '更新中...' : '更新'}
              </button>
            </div>
            <p className="mt-3 text-xs text-slate-400">状態：{meta.status || '未更新'}{meta.lastUpdated && `｜最終更新 ${formatDateTime(meta.lastUpdated)}`}</p>
            <details className="mt-3 rounded-xl bg-slate-950/60 p-3">
              <summary className="cursor-pointer text-sm font-bold text-slate-200">API設定</summary>
              <p className="mt-2 text-xs text-slate-400">JSON URLを設定すると、更新ボタンで取得できます。形式例：[{`{ "rank":1, "player":"選手名", "teamId":"jp", "value":3 }`}]</p>
              <input
                value={endpoint}
                onChange={(e) => setEndpointMap((prev) => ({ ...prev, [type]: e.target.value }))}
                placeholder="例: https://example.com/worldcup/goals.json"
                className="mt-2 w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-white"
              />
            </details>
          </div>

          <div className="overflow-x-auto rounded-2xl border border-slate-700 bg-slate-900/70 soft-scroll">
            <table className="min-w-[42rem] w-full text-sm">
              <thead className="bg-slate-800 text-slate-300">
                <tr>
                  <th className="w-16 px-3 py-2 text-left">順位</th>
                  <th className="w-28 px-3 py-2 text-left">{unit}</th>
                  <th className="px-3 py-2 text-left">国旗 選手名（国名）</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((row, index) => {
                  const team = TEAMS[row.teamId];
                  return (
                    <tr key={index} className="border-t border-slate-800">
                      <td className="px-3 py-2 align-top">
                        <input value={row.rank} onChange={(e) => updateRow(index, 'rank', e.target.value)} className="w-12 rounded-lg bg-slate-800 px-2 py-1 text-white" />
                      </td>
                      <td className="px-3 py-2 align-top">
                        <input value={row.value} onChange={(e) => updateRow(index, 'value', e.target.value)} placeholder="0" className="w-20 rounded-lg bg-slate-800 px-2 py-1 text-white" />
                      </td>
                      <td className="px-3 py-2">
                        <div className="grid gap-2 sm:grid-cols-[1fr_13rem]">
                          <input value={row.player} onChange={(e) => updateRow(index, 'player', e.target.value)} placeholder="選手名" className="w-full rounded-lg bg-slate-800 px-2 py-1 text-white" />
                          <select value={row.teamId} onChange={(e) => updateRow(index, 'teamId', e.target.value)} className="w-full rounded-lg bg-slate-800 px-2 py-1 text-white">
                            <option value="">国を選択</option>

                          </div>

                    </tr>
                  );
                })}

            </table>
          </div>
          <div className="flex flex-wrap gap-2">
            <button onClick={addRow} className="rounded-xl bg-slate-800 px-3 py-2 text-sm font-bold hover:bg-slate-700">行を追加</button>
            <button onClick={clearRows} className="rounded-xl bg-slate-800 px-3 py-2 text-sm font-bold hover:bg-slate-700">空欄に戻す</button>
          </div>
        </section>
      );
    }

    function FlashTab() {
      const [flash, setFlash] = useState(() => safeLoad(FLASH_STORAGE_KEY, {
        results: [], upcoming: [], live: [], status: '未更新', lastUpdated: ''
      }));
      const [loading, setLoading] = useState(false);

      useEffect(() => saveJson(FLASH_STORAGE_KEY, flash), [flash]);

      const loadFlash = async () => {
        setLoading(true);
        try {
          const now = new Date();
          const from = new Date(now.getTime() - 24 * 60 * 60 * 1000);
          const to = new Date(now.getTime() + 24 * 60 * 60 * 1000);
          const dateKeys = Array.from(new Set([from, now, to].map(toDateInput)));
          const payloads = await Promise.all(dateKeys.map(async (dateKey) => {
            const url = `${DATA_SOURCES.espnScoreboardUrl}?dates=${dateKey}&limit=100`;
            const res = await fetchWithTimeout(url);
            return res.json();
          }));
          const events = payloads.flatMap((p) => p.events || []).map(parseEspnEvent);
          const deduped = Object.values(events.reduce((acc, event) => ({ ...acc, [event.id]: event }), {}));
          const inWindow = deduped.filter((event) => {
            const d = new Date(event.date);
            return d >= from && d <= to;
          }).sort((a, b) => new Date(a.date) - new Date(b.date));
          const results = inWindow.filter((event) => event.completed && new Date(event.date) <= now).sort((a, b) => new Date(b.date) - new Date(a.date));
          const upcoming = inWindow.filter((event) => !event.completed && new Date(event.date) >= now).sort((a, b) => new Date(a.date) - new Date(b.date));
          const live = inWindow.filter((event) => !event.completed && event.state === 'in');
          setFlash({
            results,
            upcoming,
            live,
            status: `結果${results.length}件、予定${upcoming.length}件を取得しました。`,
            lastUpdated: new Date().toISOString(),
          });
        } catch (e) {
          setFlash((prev) => ({ ...prev, status: `取得できませんでした：${e.message || e}` }));
        } finally {
          setLoading(false);
        }
      };

      const GameRow = ({ game, showScore }) => (
        <div className="rounded-2xl border border-slate-700 bg-slate-900/70 p-3">
          <div className="flex items-center justify-between gap-3">
            <p className="text-xs text-slate-400">{formatDateTime(game.date)}</p>
            <span className="rounded-full bg-slate-800 px-2 py-1 text-[11px] text-slate-300">{game.status}</span>
          </div>
          <div className="mt-2 grid grid-cols-[1fr_auto_1fr] items-center gap-3 text-sm">
            <div className="text-right font-bold">{game.away.name || game.away.abbr}</div>
            <div className="rounded-xl bg-slate-950 px-3 py-2 text-center font-black">
              {showScore ? `${game.away.score} - ${game.home.score}` : 'vs'}
            </div>
            <div className="font-bold">{game.home.name || game.home.abbr}</div>
          </div>
        </div>
      );

      return (
        <section className="space-y-4">
          <div className="rounded-2xl border border-slate-700 bg-slate-900/70 p-4">
            <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <h2 className="text-lg font-black">速報</h2>
                <p className="mt-1 text-sm text-slate-400">現在時刻を基準に、24時間前までの結果と24時間後までの試合予定を表示します。</p>
              </div>
              <button onClick={loadFlash} disabled={loading} className="rounded-xl bg-blue-600 px-4 py-2 text-sm font-black hover:bg-blue-500 disabled:opacity-60">
                {loading ? '更新中...' : '更新'}
              </button>
            </div>
            <p className="mt-3 text-xs text-slate-400">状態：{flash.status}{flash.lastUpdated && `｜最終更新 ${formatDateTime(flash.lastUpdated)}`}</p>
          </div>

          {flash.live.length > 0 && (
            <div>
              <h3 className="mb-2 text-base font-black text-red-200">試合中</h3>
              <div className="grid gap-3 lg:grid-cols-2">{flash.live.map((game) => <GameRow key={game.id} game={game} showScore />)}</div>
            </div>
          )}

          <div>
            <h3 className="mb-2 text-base font-black">直近24時間の結果</h3>
            <div className="grid gap-3 lg:grid-cols-2">
              {flash.results.length ? flash.results.map((game) => <GameRow key={game.id} game={game} showScore />) : <p className="rounded-2xl border border-slate-700 bg-slate-900/70 p-4 text-sm text-slate-400">まだ取得結果がありません。更新ボタンを押してください。</p>}
            </div>
          </div>

          <div>
            <h3 className="mb-2 text-base font-black">今後24時間の試合予定</h3>
            <div className="grid gap-3 lg:grid-cols-2">
              {flash.upcoming.length ? flash.upcoming.map((game) => <GameRow key={game.id} game={game} />) : <p className="rounded-2xl border border-slate-700 bg-slate-900/70 p-4 text-sm text-slate-400">まだ取得予定がありません。更新ボタンを押してください。</p>}
            </div>
          </div>
        </section>
      );
    }

    function LatestNewsTab() {
      const [selectedTarget, setSelectedTarget] = useState('all');
      const [newsState, setNewsState] = useState(() => safeLoad(LATEST_NEWS_STORAGE_KEY, {
        items: [], status: '未更新', lastUpdated: '', target: 'all'
      }));
      const [loading, setLoading] = useState(false);

      useEffect(() => saveJson(LATEST_NEWS_STORAGE_KEY, newsState), [newsState]);

      const fetchNews = async () => {
        setLoading(true);
        try {
          const target = NEWS_OPTIONS.find((item) => item.id === selectedTarget) || NEWS_OPTIONS[0];
          const params = new URLSearchParams({ q: target.query, hl: 'ja', gl: 'JP', ceid: 'JP:ja' });
          const rssUrl = `${DATA_SOURCES.googleNewsRssBase}?${params.toString()}`;
          const proxiedUrl = `${DATA_SOURCES.corsProxyRaw}${encodeURIComponent(rssUrl)}`;
          const res = await fetchWithTimeout(proxiedUrl);
          const text = await res.text();
          const doc = new DOMParser().parseFromString(text, 'text/xml');
          const items = Array.from(doc.querySelectorAll('item')).slice(0, 12).map((item) => ({
            title: item.querySelector('title')?.textContent || '',
            link: item.querySelector('link')?.textContent || '',
            pubDate: item.querySelector('pubDate')?.textContent || '',
            source: item.querySelector('source')?.textContent || '',
          })).filter((item) => item.title && item.link);
          if (!items.length) throw new Error('ニュースを読み取れませんでした。');
          setNewsState({
            items,
            status: `${target.label}のニュースを${items.length}件取得しました。`,
            lastUpdated: new Date().toISOString(),
            target: selectedTarget,
          });
        } catch (e) {
          setNewsState((prev) => ({ ...prev, status: `取得できませんでした：${e.message || e}` }));
        } finally {
          setLoading(false);
        }
      };

      return (
        <section className="space-y-4">
          <div className="rounded-2xl border border-slate-700 bg-slate-900/70 p-4">
            <h2 className="text-lg font-black">最新ニュース</h2>
            <p className="mt-1 text-sm text-slate-400">W杯全体、または国別に日本語記事を取得します。</p>
            <div className="mt-4 grid gap-2 sm:grid-cols-[1fr_auto]">
              <select value={selectedTarget} onChange={(e) => setSelectedTarget(e.target.value)} className="rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white">
                {NEWS_OPTIONS.map((option) => <option key={option.id} value={option.id}>{option.label}</option>)}
              </select>
              <button onClick={fetchNews} disabled={loading} className="rounded-xl bg-blue-600 px-4 py-2 text-sm font-black hover:bg-blue-500 disabled:opacity-60">
                {loading ? '更新中...' : '更新'}
              </button>
            </div>
            <p className="mt-3 text-xs text-slate-400">状態：{newsState.status}{newsState.lastUpdated && `｜最終更新 ${formatDateTime(newsState.lastUpdated)}`}</p>
          </div>

          <div className="grid gap-3">
            {newsState.items.length ? newsState.items.map((item, index) => (
              <a key={`${item.link}-${index}`} href={item.link} target="_blank" rel="noreferrer" className="rounded-2xl border border-slate-700 bg-slate-900/70 p-4 hover:border-blue-400 hover:bg-slate-800">
                <div className="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
                  <p className="font-bold leading-snug">{item.title}</p>
                  {item.source && <span className="shrink-0 rounded-full bg-slate-800 px-2 py-1 text-[11px] text-slate-300">{item.source}</span>}
                </div>
                <p className="mt-2 text-xs text-slate-500">{formatDateTime(item.pubDate)}</p>
              </a>
            )) : <p className="rounded-2xl border border-slate-700 bg-slate-900/70 p-4 text-sm text-slate-400">まだニュースがありません。対象を選んで更新してください。</p>}
          </div>
        </section>
      );
    }

              ))}
            </nav>

            {activeTab === 'bracket' && <GroupReference />}
            {activeTab === 'bracket' && <BracketTab bracket={bracket} setBracket={setBracket} />}
            {activeTab === 'goals' && <StatsTab type="goals" stats={stats} setStats={setStats} />}
            {activeTab === 'assists' && <StatsTab type="assists" stats={stats} setStats={setStats} />}
            {activeTab === 'flash' && <FlashTab />}
            {activeTab === 'latestNews' && <LatestNewsTab />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
