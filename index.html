  <style>
    :root{

function scoreboardMatchUpdatesFromEvents(events){
  const updates=[];
  (events||[]).forEach(ev=>{
    const id=String(ev.id||'');
    const base=GROUP_MATCH_BY_ID[id];
    if(!base)return;
    const comp=(ev.competitions||[])[0]||{};
    const st=(ev.status||{}).type||{};
    const cs=comp.competitors||[];
    if(cs.length<2)return;
    const scores={};
    cs.forEach(c=>{
      const tid=resolveTeamFromESPN(c.team||c);
      const score=Number(c.score);
      if(tid&&!Number.isNaN(score))scores[tid]=score;
    });
    if(scores[base.home]===undefined||scores[base.away]===undefined)return;
    updates.push({id,completed:!!st.completed,hs:scores[base.home],as:scores[base.away],statusText:st.detail||st.shortDetail||st.description||''});
  });
  return updates;
}
function scoreboardMatchUpdatesFromPayloads(payloads){

function linesSVG(){
  const slotTop=3.5;

  const slotGap=5.5;

    const first=slotTop+i*matchGap+slotH/2;
    return [first, first+slotGap];
  });
  const mid=pairCenters.map(([a,b])=>(a+b)/2);
  const block=[(mid[0]+mid[1])/2,(mid[2]+mid[3])/2,(mid[4]+mid[5])/2,(mid[6]+mid[7])/2];
  const semi=[(block[0]+block[1])/2,(block[2]+block[3])/2];
  const final=(semi[0]+semi[1])/2;
  let p=[];
  const line=(x1,x2,y)=>p.push(`<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}"/>`);

  // 左側：枠の右端中央から中央方向へ
  pairCenters.forEach(([a,b],i)=>{
    line(39.0,40.6,a);line(39.0,40.6,b);
    p.push(`<line x1="40.6" y1="${a}" x2="40.6" y2="${b}"/>`);
    line(40.6,43.0,mid[i]);
  });
  for(let i=0;i<4;i++){const a=mid[i*2],b=mid[i*2+1],m=block[i];p.push(`<line x1="43.0" y1="${a}" x2="43.0" y2="${b}"/>`);line(43.0,45.2,m);}
  for(let i=0;i<2;i++){const a=block[i*2],b=block[i*2+1],m=semi[i];p.push(`<line x1="45.2" y1="${a}" x2="45.2" y2="${b}"/>`);line(45.2,48.6,m);}
  p.push(`<line x1="48.6" y1="${semi[0]}" x2="48.6" y2="${semi[1]}"/>`);
  line(48.6,49.7,final);

  // 右側：枠の左端中央から中央方向へ
  pairCenters.forEach(([a,b],i)=>{
    line(61.0,59.4,a);line(61.0,59.4,b);
    p.push(`<line x1="59.4" y1="${a}" x2="59.4" y2="${b}"/>`);
    line(59.4,57.0,mid[i]);
  });
  for(let i=0;i<4;i++){const a=mid[i*2],b=mid[i*2+1],m=block[i];p.push(`<line x1="57.0" y1="${a}" x2="57.0" y2="${b}"/>`);line(57.0,54.8,m);}
  for(let i=0;i<2;i++){const a=block[i*2],b=block[i*2+1],m=semi[i];p.push(`<line x1="54.8" y1="${a}" x2="54.8" y2="${b}"/>`);line(54.8,51.4,m);}
  p.push(`<line x1="51.4" y1="${semi[0]}" x2="51.4" y2="${semi[1]}"/>`);
  line(51.4,50.3,final);

  p.push(`<line x1="49.7" y1="${final}" x2="50.3" y2="${final}"/>`);
  p.push(`<circle class="final-dot" cx="50" cy="${final}" r=".65"/>`);
  return `<svg class="bracket-svg" viewBox="0 0 100 100" preserveAspectRatio="none">${p.join('')}</svg>`
}

function knockoutLayout(viewCol=koViewCol()){
  const cardH=96, top=54;
  const page=knockoutPage(viewCol);
  const visibleCols=page.cols;
  const twoColView=visibleCols.length===2;
  const xCols=twoColView?[8,56]:[2,34.5,67];
  const cardW=twoColView?36:30.5;
  const r32=[73,75,74,77,83,84,81,82,76,78,79,80,86,88,85,87];
  const r16=[90,89,93,94,91,92,95,96];
  const qf=[97,98,99,100];
  const sf=[101,102];
  const finalCol=[104,103];
  const orders=[r32,r16,qf,sf,finalCol];
  const globalTitles=['ベスト32','ラウンド16','準々決勝','準決勝','決勝/3位決定戦'];
  const pos={};
  const xForGlobalCol=(col)=>xCols[visibleCols.indexOf(col)];
  const stepForCount=(count)=>count>=8?112:(count>=4?116:148);

  const firstCol=visibleCols[0];
  const firstOrder=orders[firstCol]||[];
  const firstStep=stepForCount(firstOrder.length);
  firstOrder.forEach((no,i)=>{
    pos[no]={x:xForGlobalCol(firstCol),y:top+i*firstStep,w:cardW,h:cardH,col:firstCol,viewIndex:0};
  });

  for(let vi=1;vi<visibleCols.length;vi++){
    const col=visibleCols[vi];
    const arr=orders[col]||[];
    if(col===4){
      const p101=pos[101], p102=pos[102];
      const fallbackMid=top+cardH+20;
      const mid=(p101&&p102)?((p101.y+p101.h/2)+(p102.y+p102.h/2))/2:fallbackMid;
      const gap=14;
      pos[104]={x:xForGlobalCol(col),y:Math.max(top,mid-cardH-gap/2),w:cardW,h:cardH,col,viewIndex:vi};
      pos[103]={x:xForGlobalCol(col),y:pos[104].y+cardH+gap,w:cardW,h:cardH,col,viewIndex:vi};
      continue;
    }
    arr.forEach((no,i)=>{
      const m=koMatchByNo(no);
      const deps=m?koDependencyNos(m).map(d=>pos[d]).filter(Boolean):[];
      let cy;
      if(deps.length){
        cy=deps.map(p=>p.y+p.h/2).reduce((a,b)=>a+b,0)/deps.length;
      }else{
        const st=stepForCount(arr.length);
        cy=top+i*st+cardH/2;
      }
      pos[no]={x:xForGlobalCol(col),y:cy-cardH/2,w:cardW,h:cardH,col,viewIndex:vi};
    });
  }

  const visibleMatches=visibleCols.flatMap(col=>orders[col]||[]);
  const visiblePositions=visibleMatches.map(no=>pos[no]).filter(Boolean);
  const boardH=Math.max(...visiblePositions.map(p=>p.y+p.h),top+cardH)+34;
  return {pos,orders,titles:page.titles,globalTitles,visibleCols,visibleMatches,cardW,cardH,boardW:100,boardH,viewCol};
}

function isKoWinner(result,side){
  if(result.winner===side)return true;
  const hs=Number(result.hs),as=Number(result.as);
  if(Number.isNaN(hs)||Number.isNaN(as))return false;
  if(side==='home'&&hs>as)return true;
  if(side==='away'&&as>hs)return true;
  const hp=Number(result.homePens),ap=Number(result.awayPens);
  if(!Number.isNaN(hp)&&!Number.isNaN(ap))return side==='home'?hp>ap:ap>hp;
  return false;
}

function resolveKoSide(token){
  const t=String(token||'');
  if(T[t])return {type:'team',id:t};
  const g=t.match(/^([A-L])([12])$/);
  if(g){
    const team=confirmedTeamByGroupRank(g[1],Number(g[2]));
    if(team)return {type:'team',id:team};
    return {type:'label',label:`${g[1]}組${g[2]}位`};
  }
  const third=t.match(/^3([A-L]+)$/);
  if(third)return {type:'label',label:`3位（${third[1].split('').join('/')}）`};
  const win=t.match(/^W(\d+)$/);
  if(win){
    const winner=winnerOfMatch(Number(win[1]));
    if(winner)return {type:'team',id:winner};
    return {type:'label',label:'未定'};
  }
  const lose=t.match(/^L(\d+)$/);
  if(lose){
    const loser=loserOfMatch(Number(lose[1]));
    if(loser)return {type:'team',id:loser};
    return {type:'label',label:'未定'};
  }
  return {type:'label',label:t||'未定'};
}

function confirmedTeamByGroupRank(g,rank){
  const byTag=BRACKET_CONFIRMED_BY_TAG[`${g}${rank}`];
  if(byTag)return byTag;
  const rows=state.groups?.[g]||[];
  if(groupRowsComplete(g)){
    const row=rows.find(r=>Number(r.rank)===rank)||rows[rank-1];
    if(row&&row.team)return row.team;
  }
  const slot=allBracketSlots().find(s=>String(s.tag||'')===`${g}${rank}`&&(s.fixed||s.confirmed)&&(s.sel||[]).length===1);
  return slot?slot.sel[0]:'';
}
function winnerOfMatch(no){
  const m=KNOCKOUT_MATCHES.find(x=>Number(x.no)===Number(no));
  if(!m)return '';
  const r=getKoResult(m);
  if(!r.completed)return '';
  if(isKoWinner(r,'home'))return r.home||resolveKoSide(m.a).id||'';
  if(isKoWinner(r,'away'))return r.away||resolveKoSide(m.b).id||'';
  return '';
}
function loserOfMatch(no){
  const m=KNOCKOUT_MATCHES.find(x=>Number(x.no)===Number(no));
  if(!m)return '';
  const r=getKoResult(m);
  if(!r.completed)return '';
  if(isKoWinner(r,'home'))return r.away||resolveKoSide(m.b).id||'';
  if(isKoWinner(r,'away'))return r.home||resolveKoSide(m.a).id||'';
  return '';
}

async function fetchKnockoutResults(){
  const ids=new Set(KNOCKOUT_MATCHES.map(m=>String(m.id||''))); 
  const settled=await Promise.allSettled(KNOCKOUT_ESPN_DATES.map(d=>fetchJSONNoStore(`${ESPN_SCOREBOARD}?dates=${d}&limit=100`)));
  const payloads=settled.filter(x=>x.status==='fulfilled').map(x=>x.value);
  const out={};
  uniqueESPNEvents(payloads).forEach(ev=>{
    const eid=String(ev.id||'');
    if(!ids.has(eid))return;
    const comp=(ev.competitions||[])[0]||{};
    const cs=comp.competitors||[];
    if(cs.length<2)return;
    const home=cs.find(c=>c.homeAway==='home')||cs[0];
    const away=cs.find(c=>c.homeAway==='away')||cs[1];
    const hId=resolveTeamFromESPN(home.team||home);
    const aId=resolveTeamFromESPN(away.team||away);
    const st=(ev.status||{}).type||{};
    const rec={completed:!!st.completed,live:!!st.inProgress,home:hId,away:aId,hs:home.score,as:away.score};
    if(home.winner)rec.winner='home';
    if(away.winner)rec.winner='away';
    const hp=home.curatedRank?.current||home.penaltyScore||home.shootoutScore;
    const ap=away.curatedRank?.current||away.penaltyScore||away.shootoutScore;
    if(hp!==undefined&&ap!==undefined){rec.homePens=hp;rec.awayPens=ap;}
    out[eid]=rec;
  });
  return out;
}

function espnEventPriority(ev){
  const type=(ev?.status||{}).type||{};
  const statusScore=type.completed?3:(type.inProgress?2:1);
  const t=Date.parse(ev?.date||'')||0;
  return statusScore*10000000000000+t;
}
function uniqueESPNEvents(payloads){
  const map=new Map();
  (payloads||[]).forEach(p=>(p?.events||[]).forEach(ev=>{
    const id=String(ev?.id||'');
    if(!id)return;
    const prev=map.get(id);
    if(!prev||espnEventPriority(ev)>=espnEventPriority(prev))map.set(id,ev);
  }));
  return [...map.values()];
}
async function fetchGroupScoreboardPayloads(){
  const range=`${ESPN_DATES[0]}-${ESPN_DATES[ESPN_DATES.length-1]}`;
  const urls=[`${ESPN_SCOREBOARD}?dates=${range}&limit=200`].concat(
    ESPN_DATES.map(d=>`${ESPN_SCOREBOARD}?dates=${d}&limit=100`)
  );
  const settled=await Promise.allSettled(urls.map(u=>fetchJSONNoStore(u)));
  return settled.filter(x=>x.status==='fulfilled').map(x=>x.value);
}
function localGroupMatchResult(){
  const stats=blankStats();
  const updates=[];
  let count=0;
  Object.values(GROUP_MATCHES).flat().forEach(m=>{
    if(m.status!=='done'||m.hs===undefined||m.as===undefined)return;
    const idA=m.home,idB=m.away;
    if(!stats[idA]||!stats[idB])return;
    const scoreA=Number(m.hs),scoreB=Number(m.as);
    if(Number.isNaN(scoreA)||Number.isNaN(scoreB))return;
    stats[idA].gf+=scoreA;stats[idA].ga+=scoreB;
    stats[idB].gf+=scoreB;stats[idB].ga+=scoreA;
    if(scoreA>scoreB){stats[idA].w++;stats[idB].l++;stats[idA].pts+=3}
    else if(scoreA<scoreB){stats[idB].w++;stats[idA].l++;stats[idB].pts+=3}
    else{stats[idA].d++;stats[idB].d++;stats[idA].pts++;stats[idB].pts++}
    updates.push({id:m.id,completed:true,hs:scoreA,as:scoreB,statusText:'終了'});
    count++;
  });
  return {groups:standingsFromStats(stats),count,matchUpdates:updates};
}

function allBracketSlots(){return ['left','right'].flatMap(side=>(state.bracket?.[side]||[]).flatMap(m=>m||[]));}

function setBracketSlotConfirmed(slot,team,locked){
  if(!slot||!team)return false;
  slot.sel=[team];
  slot.confirmed=true;
  slot.fixed=true;
  slot.autoLocked=true;
  if(locked)locked.add(team);
  return true;
}
function applyConfirmedBracketSlots(){
  const slots=allBracketSlots();
  const applied=[];
  const locked=new Set();

  // 公式・手元データ上ですでに進出枠が確定しているものは、保存済み入力より優先して固定します。
  slots.forEach(s=>{
    const team=BRACKET_CONFIRMED_BY_TAG[String(s.tag||'')];
    if(team&&setBracketSlotConfirmed(s,team,locked))applied.push(s);
  });

  // グループ全試合が完了した枠は、順位表から1位/2位を自動反映します。
  slots.forEach(s=>{
    if(applied.includes(s))return;
    const m=String(s.tag||'').match(/^([A-L])([12])$/);
    if(!m)return;
    const g=m[1], rank=Number(m[2]);
    const rows=state.groups?.[g]||[];
    if(!groupRowsComplete(g))return;
    const row=rows.find(r=>Number(r.rank)===rank)||rows[rank-1];
    if(row&&row.team&&setBracketSlotConfirmed(s,row.team,locked))applied.push(s);
  });

  // 確定済みチームが他の未確定枠に残っていた場合だけ除外します。
  // 未確定枠のユーザー入力そのものは残します。
  slots.forEach(s=>{
    if(applied.includes(s)||s.fixed)return;
    const before=(s.sel||[]).length;
    s.sel=(s.sel||[]).filter(id=>!locked.has(id));
    if(before&&!s.sel.length)s.confirmed=false;
  });
  return applied.length;
}
async function fetchLatestStandings(){
  const payloads=await fetchGroupScoreboardPayloads();
  const events=uniqueESPNEvents(payloads);
  const matchUpdates=scoreboardMatchUpdatesFromEvents(events);
  const stats=blankStats();
  let count=0;
  events.forEach(ev=>{
    const comp=(ev.competitions||[])[0]||{};
    const st=(ev.status||{}).type||{};
    if(!st.completed)return;
    const cs=comp.competitors||[];
    if(cs.length<2)return;
    const a=cs[0],b=cs[1];
    const idA=resolveTeamFromESPN(a.team||a),idB=resolveTeamFromESPN(b.team||b);
    if(!idA||!idB||!stats[idA]||!stats[idB])return;
    if(TEAM_TO_GROUP[idA]!==TEAM_TO_GROUP[idB])return;
    const scoreA=Number(a.score),scoreB=Number(b.score);
    if(Number.isNaN(scoreA)||Number.isNaN(scoreB))return;
    stats[idA].gf+=scoreA;stats[idA].ga+=scoreB;
    stats[idB].gf+=scoreB;stats[idB].ga+=scoreA;
    if(scoreA>scoreB){stats[idA].w++;stats[idB].l++;stats[idA].pts+=3}
    else if(scoreA<scoreB){stats[idB].w++;stats[idA].l++;stats[idB].pts+=3}
    else{stats[idA].d++;stats[idB].d++;stats[idA].pts++;stats[idB].pts++}
    count++;
  });
  if(count===0)return localGroupMatchResult();
  return {groups:standingsFromStats(stats),count,matchUpdates};
}

function scorerBlock(items,done,goals,loading,fetched){

function normalizeScorers(scorers,m){
  const out={home:[],away:[]};
  if(!scorers)return out;
  if(Array.isArray(scorers)){
    scorers.forEach(x=>{
      if(typeof x==='string'){
        const team=scoreStringTeam(x,m);
        const label=stripTeamFromScorerLabel(x);
        if(team===m.home)out.home.push(label);else if(team===m.away)out.away.push(label);
      }else if(x&&typeof x==='object'){
        const team=x.team;
        const label=formatScorerLabel(x.name||x.player||x.label||'得点',x.minute);
        if(team===m.home)out.home.push(label);else if(team===m.away)out.away.push(label);
      }
    });
  }else if(typeof scorers==='object'){
    ['home','away'].forEach(side=>(scorers[side]||[]).forEach(x=>{
      out[side].push(typeof x==='string'?x:formatScorerLabel(x.name||x.player||x.label||'得点',x.minute));
    }));
  }
  out.home=[...new Set(out.home.filter(Boolean))];
  out.away=[...new Set(out.away.filter(Boolean))];
  return out;
}

function fitScorerRows(){
  try{
    document.querySelectorAll('.scorer-line').forEach(row=>{
      row.style.fontSize='';
      let size=parseFloat(getComputedStyle(row).fontSize)||8;
      const min=6.1;
      let guard=0;
      while(row.scrollWidth>row.clientWidth+1&&size>min&&guard<14){
        size=Math.max(min,size-.25);
        row.style.fontSize=size+'px';
        guard++;
      }
    });
  }catch(e){console.warn('得点者表示調整失敗',e)}
}
function parseScorerLabel(label){
  let s=String(label||'').trim();
  const isPk=/\(?PK\)?|ペナルティ|penalty/i.test(s)&&!/PK戦|shootout/i.test(s);
  s=s.replace(/\s*\(?PK\)?\s*/gi,' ').replace(/ペナルティキック|ペナルティ|penalty/gi,' ').replace(/\s+/g,' ').trim();
  const addPk=name=>isPk&&!String(name||'').startsWith('(PK)')?`(PK)${name}`:name;
  const m=s.match(/^(.*?)(?:\s+)(前半|後半|延前|延後|前|後)\s*([0-9]+(?:\+[0-9]+)?(?:['′分])?)?$/);
  if(m)return {name:addPk((m[1]||'得点').trim()),period:(m[2]||'').trim(),minute:(m[3]||'').trim()};
  const m2=s.match(/^(.*?)(?:\s+)([0-9]+(?:\+[0-9]+)?(?:['′分])?)$/);
  if(m2)return {name:addPk((m2[1]||'得点').trim()),period:'',minute:(m2[2]||'').trim()};
  return {name:addPk(s||'得点'),period:'',minute:''};
}
function formatScorerLabel(name,minute){return `${name||'得点'}${minute?` ${minute}`:''}`.trim()}
function addPenaltyPrefixToScorerLabel(label){
  const s=String(label||'').trim();
  if(!s)return s;
  const p=parseScorerLabel(s+' (PK)');
  return `${p.name}${p.period?` ${p.period}`:''}${p.minute?` ${p.minute}`:''}`.trim();
}
function stripTeamFromScorerLabel(label){return String(label).replace(/（[^）]+）/g,'').replace(/\([^)]*\)/g,'').trim()}
function scoreStringTeam(label,m){

  for(const t of [m.home,m.away]){const n=T[t]?.[0];if(n&&txt.includes(n))return t}
  return '';
}

    const id=(block.match(/\/game\/(\d+)/)||[])[1]||(block.match(/game\/(\d+)/)||[])[1];

function readerPlainLines(text){

    return line
      .replace(/!\[[^\]]*\]\([^)]*\)/g,'')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'$1')

      .replace(/https?:\/\/\S+/g,'')

  });
}
function cleanYahooScorer(line){
  const items=expandYahooScorerLine(line);

}
function expandYahooScorerLine(line){
  let s=String(line||'')
    .replace(/^[-・\s]+/,'')
    .replace(/\b\d+\s*-\s*\d+\b/g,'')
    .replace(/\s+/g,' ')
    .trim();
  if(!s||/試合|順位|動画|戦評|フォーメーション|スタッツ|テキスト速報|ハイライト|FIFAランキング|マン・オブ・ザ・マッチ/.test(s))return [];
  s=s.replace(/(前半|後半)\s*(\d{1,3})分/g,(m,h,n)=>`${h==='前半'?'前':'後'} ${n}'`);
  const firstHalf=s.search(/(?:^|\s)(前|後)\s*\d{1,3}'/);
  if(firstHalf<0)return [];
  const name=s.slice(0,firstHalf).trim()||'得点';
  const times=s.slice(firstHalf).trim();
  const out=[];
  let currentHalf='';
  const re=/(前|後)?\s*(\d{1,3})'\s*(\(PK\))?/g;
  let match;
  while((match=re.exec(times))){
    if(match[1])currentHalf=match[1];
    if(!currentHalf)continue;
    out.push(`${name} ${currentHalf} ${match[2]}'${match[3]||''}`);
  }
  return out;
}
function parseYahooSummaryScorers(text,m){
  const out={home:[],away:[]};
  const lines=readerPlainLines(text);
  const startIdx=lines.findIndex(l=>l==='試合終了');
  const endIdx=lines.findIndex((l,i)=>i>(startIdx>=0?startIdx:0)&&/試合／無料|最新確定値|試合情報|マン・オブ・ザ・マッチ|## 動画/.test(l));
  const scope=lines.slice(startIdx>=0?startIdx:0,endIdx>0?endIdx:Math.min(lines.length,180));
  const groups=[];
  let current=[];
  scope.forEach(l=>{
    const scorers=expandYahooScorerLine(l);
    if(scorers.length){current.push(...scorers);return;}
    if(current.length){groups.push(current);current=[];}
  });
  if(current.length)groups.push(current);
  const hs=Number(m.hs)||0, as=Number(m.as)||0;
  if(groups.length>=2){
    out.home=groups[0].slice(0,hs||groups[0].length);
    out.away=groups[1].slice(0,as||groups[1].length);
  }else if(groups.length===1){
    if(hs>0&&as===0)out.home=groups[0];
    else if(hs===0&&as>0)out.away=groups[0];
    else if(hs>0&&as>0){
      out.home=groups[0].slice(0,hs);
      out.away=groups[0].slice(hs,hs+as);
    }
  }
  out.home=[...new Set(out.home.filter(Boolean))];
  out.away=[...new Set(out.away.filter(Boolean))];
  return out;
}
function parseScorersFromText(text,m){

  const joined=lines.join('\n');

function parseMatchSummary(data,m){

function extractScorers(data,m){
  const candidates=[];
  const pushArray=a=>{if(Array.isArray(a))a.forEach(x=>candidates.push(x))};
  pushArray(data.scoringPlays);
  pushArray(data.competitions?.[0]?.details);
  pushArray(data.header?.competitions?.[0]?.details);
  pushArray(data.details);
  pushArray(data.plays);
  pushArray(data.commentary);
  pushArray(data.gameInfo?.scoringPlays);
  collectGoalLikeObjects(data,candidates,new Set(),0);
  const out={home:[],away:[]};
  candidates.forEach(item=>{
    if(!isGoalEvent(item))return;
    const minute=goalMinute(item);
    const athlete=goalAthlete(item);

    const rawText=String(item.text||item.displayText||item.shortText||item.commentary||item.description||'').replace(/\s+/g,' ').trim();
    let label=formatScorerLabel(athlete||rawText||'得点',minute);
    if(/penalty|ペナルティ|PK/i.test(rawText)&&!/shootout|PK戦/i.test(rawText))label=addPenaltyPrefixToScorerLabel(label);
    if(team===m.home && !out.home.includes(label))out.home.push(label);
    if(team===m.away && !out.away.includes(label))out.away.push(label);
  });
  return out;
}
function collectGoalLikeObjects(obj,out,seen,depth){
  if(!obj||typeof obj!=='object'||depth>5||seen.has(obj))return;
  seen.add(obj);
  if(isGoalEvent(obj))out.push(obj);
  Object.keys(obj).forEach(k=>{
    const v=obj[k];
    if(Array.isArray(v))v.forEach(x=>collectGoalLikeObjects(x,out,seen,depth+1));
    else if(v&&typeof v==='object')collectGoalLikeObjects(v,out,seen,depth+1);
  });
}
function isGoalEvent(item){
  if(!item||typeof item!=='object')return false;

  const rawText=String(item.text||item.displayText||item.shortText||item.commentary||item.description||item.summary||rawType||'');
  const all=(rawType+' '+rawText).toLowerCase();
  if(!/(^|\b)goal\b|ゴール/.test(all))return false;
  if(/penalty shootout|shootout|missed|saved|post|woodwork|offside|var overturned|ruled out|disallowed|substitution|yellow card|red card/.test(all))return false;
  return true;
}
function goalMinute(item){

  const s=String(v).replace(' minute','').replace('min','').trim();

function goalAthlete(item){

  for(const arr of pools){

  if(direct)return String(direct);
  const txt=String(item.text||item.displayText||item.shortText||item.commentary||item.description||'').replace(/\s+/g,' ').trim();
  const m=txt.match(/(?:Goal!|Goal by|goal by)\s*([^.,;]+)/i);

}
function goalTeam(item,m){

function absolutizeNewsImageUrl(src,base){
  let u=decodeHtml(String(src||'')).trim().replace(/^['\"]|['\"]$/g,'');
  if(!u||/^data:/i.test(u))return '';
  if(u.startsWith('//'))u='https:'+u;

function parseArticleImageFromText(text,baseUrl){
  const raw=String(text||'');
  const pick=src=>{
    const u=absolutizeNewsImageUrl(src,baseUrl);
    return isHttpNewsImage(u)?u:'';
  };
  try{
    if(/<\s*(html|head|body|meta|img)\b/i.test(raw)){
      const doc=new DOMParser().parseFromString(raw,'text/html');
      const selectors=[
        'meta[property="og:image"]','meta[property="og:image:url"]','meta[property="og:image:secure_url"]',
        'meta[name="twitter:image"]','meta[name="twitter:image:src"]','link[rel="image_src"]'
      ];
      for(const sel of selectors){
        const el=doc.querySelector(sel);
        const val=el&&(el.getAttribute('content')||el.getAttribute('href'));
        const u=pick(val);
        if(u)return u;
      }
      const imgs=Array.from(doc.querySelectorAll('img'));
      for(const img of imgs){
        const val=img.getAttribute('src')||img.getAttribute('data-src')||img.getAttribute('data-original')||img.getAttribute('data-lazy-src')||img.getAttribute('data-srcset')||img.getAttribute('srcset')||'';
        const first=String(val).split(',')[0].trim().split(/\s+/)[0];
        const u=pick(first);
        if(u)return u;
      }
    }
  }catch(e){}
  const md=raw.match(/!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/i);
  if(md){const u=pick(md[1]);if(u)return u;}
  const direct=raw.match(/https?:\/\/[^\s\)\]"'<>]+\.(?:jpg|jpeg|png|webp|avif)(?:\?[^\s\)\]"'<>]*)?/i);
  if(direct){const u=pick(direct[0]);if(u)return u;}
  return '';
}
function promiseWithSoftTimeout(promise,ms){
  return new Promise(resolve=>{
    let done=false;
    const timer=setTimeout(()=>{if(!done){done=true;resolve('')}},ms);
    Promise.resolve(promise).then(v=>{if(!done){done=true;clearTimeout(timer);resolve(v||'')}}).catch(()=>{if(!done){done=true;clearTimeout(timer);resolve('')}});
  });
}
function firstTruthy(promises){
  return new Promise(resolve=>{
    let left=promises.length;
    if(!left)return resolve('');
    promises.forEach(p=>Promise.resolve(p).then(v=>{
      if(v){resolve(v);left=-999;return;}
      left--; if(left===0)resolve('');
    }).catch(()=>{left--; if(left===0)resolve('')}));
  });
}

async function enhanceNewsLinksAndImagesInBackground(target){

  const targets=state.news.items.map((item,idx)=>({item,idx})).slice(0,NEWS_BG_IMAGE_LIMIT);
  const results=await Promise.all(targets.map(async x=>{
    const resolved=isGoogleNewsArticleUrl(x.item.url)?await promiseWithSoftTimeout(resolveGoogleNewsArticleUrl(x.item.url),2600):'';

  }).map(p=>p.catch(()=>({idx:-1,url:'',img:''}))));
  if(!state.news||state.news.target!==target||!Array.isArray(state.news.items))return;
  let changed=false;

function stableNewsSelection(fresh,cached,target,limit=20){
  const freshPrepared=prepareNewsItems(Array.isArray(fresh)?fresh:[],target,limit);
  const cachedPrepared=sanitizeNewsCacheItems(Array.isArray(cached)?cached:[],target,limit);
  const freshDirect=countDirectNewsItems(freshPrepared);
  const cachedDirect=countDirectNewsItems(cachedPrepared);
  let selected=[];
  // 直接記事が十分にある場合のみキャッシュを安定化に使う。
  // ただし新規取得が十分な場合は新規を優先し、古いキャッシュ固定で更新されない状態を避ける。
  if(freshDirect>=NEWS_MIN_STABLE_RESULTS){
    selected=freshPrepared;
  }else if(cachedDirect>=NEWS_MIN_STABLE_RESULTS){
    selected=dedupeNews([...cachedPrepared,...freshPrepared],limit);
  }else if(freshDirect>0||cachedDirect>0){
    selected=dedupeNews([...freshPrepared,...cachedPrepared],limit);
  }else{
    selected=[];
  }
  return selected.slice(0,limit);
}

  return `取得済 ${direct}件`;
}

function parseJinaSearchText(text,domain){
  const raw=String(text||'').replace(/\r/g,'');
  const out=[];
  const seen=new Set();
  try{
    const json=JSON.parse(raw);
    out.push(...parseJinaSearchJson(json,domain));
  }catch(e){}
  const add=(title,url,extra={})=>{
    title=cleanNewsTitle(stripMarkdownLinks(title||''));
    url=normalizeNewsArticleUrl(url||'');
    if(!title||!url||seen.has(url))return;
    if(!isUsableNewsTitle(title))return;
    if(/^(画像|動画|写真|一覧|もっと見る|続きを読む|Google|ニュース|詳細|その他|ログイン)$/.test(title))return;
    seen.add(url);
    out.push({title,url,image:extra.image||'',seen:extra.seen||'',domain:extra.domain||domain||''});
  };
  // Search mode often returns blocks with "Title:" and "URL Source:" lines.
  const blockRe=/(?:^|\n)(?:#+\s*)?(?:Title:\s*)?([^\n]{8,220})\n+(?:URL Source|URL|Source):\s*(https?:\/\/[^\s\n)]+)/gi;
  let m;
  while((m=blockRe.exec(raw)))add(m[1],m[2]);
  // Markdown links, used by both r.jina.ai and s.jina.ai in some modes.
  const linkRe=/\[([^\]]{8,240})\]\((https?:\/\/[^)\s]+)\)/g;
  while((m=linkRe.exec(raw)))add(m[1],m[2]);
  // Fallback: line immediately before a raw URL.
  const lines=raw.split('\n').map(x=>x.trim()).filter(Boolean);
  for(let i=0;i<lines.length;i++){
    const urlMatch=lines[i].match(/https?:\/\/[^\s)]+/);
    if(!urlMatch)continue;
    const prev=(lines[i-1]||'').replace(/^[-*#\d.\s]+/,'').trim();
    if(prev)add(prev,urlMatch[0]);
  }
  return out;
}

}

  return /(スタジアム|会場|開催地|集客|観客|動員|チケット|入場者|大会運営|運営|ルール|レギュレーション|VAR|審判|判定|評価|批判|問題|課題|懸念|改善|経済効果|スポンサー|放映権|FIFA|世界中|世界各国|海外メディア|熱狂|盛り上がり|過熱感|人気|安全対策|交通|宿泊|開催都市|気候|暑さ|ピッチ|芝|セキュリティ)/.test(t);
}
function mentionsAnyCountryAlias(text,targetToIgnore){
  let t=String(text||'').toLowerCase();
  // 全体ニュースで使われやすい時刻・開催地表現は、国別記事と誤判定しないよう除外します。
  t=t.replace(/日本時間/g,'').replace(/現地時間/g,'').replace(/北米中/g,'').replace(/北中米/g,'').replace(/開催国/g,'').replace(/開催地/g,'').replace(/開催都市/g,'');
  for(const id of Object.keys(T)){
    if(id===targetToIgnore)continue;
    const aliases=newsTargetAliasList(id).filter(a=>String(a||'').length>=2);
    for(const a of aliases){
      const x=String(a||'').toLowerCase();
      if(!x)continue;
      if(x==='米国')continue;
      if(t.includes(x))return true;
    }
  }
  return false;
}
function newsHardRejectsText(text,title){
  if(isImageOnlyNewsTitle(title||text))return true;
  if(hasExcludedWorldCupCategory(text))return true;
  return false;
}
function countryOpponentMatchesNewsTarget(text,target){
  if(!target||target==='all')return false;
  const t=String(text||'').toLowerCase();
  return newsTargetOpponentAliases(target).some(a=>{
    const x=String(a||'').toLowerCase();
    return x.length>=2&&t.includes(x);
  });
}
function scoreWholeTournamentNews(item,target,source){
  const title=cleanNewsTitle(item&&item.title||'');
  const url=String(item&&item.url||'');
  const queryText=String(item&&item._query||'');
  const queryHit=(item&&item._queryTarget)==='all';
  const text=title+' '+url+' '+String(source&&source.name||source||'')+' '+String(item&&item.domain||'');
  if(!isUsableNewsTitle(title))return {score:-999,category:'reject'};
  if(newsHardRejectsText(text,title))return {score:-999,category:'reject'};
  if(!hasCurrentMensWorldCup2026Context(text+' '+queryText)){
    if(!queryHit)return {score:-999,category:'reject'};
  }
  let score=0;
  if(/(FIFAワールドカップ|ワールドカップ|W杯|World Cup|worldcup|wcup)/i.test(text))score+=22;
  if(/(2026|北米中|北中米|カナダ|メキシコ|アメリカ|米国|開催都市|開催地|スタジアム)/i.test(text))score+=26;
  if(hasWholeTournamentEditorialTopic(text))score+=42;
  if(/(FIFA|大会|運営|開催|会場|観客|チケット|ルール|VAR|審判|経済効果|スポンサー|放映権|セキュリティ)/.test(text))score+=12;
  if(hasUtilityOnlyNewsTopic(text))score-=55;
  // 個別国の選手・監督・次戦記事は、W杯全体ではなく国別ニュースに寄せます。
  if(mentionsAnyCountryAlias(text,'')&&hasCountryEditorialTopic(text))score-=60;
  if(/(試合結果|結果速報|スコア|日程|放送|中継|順位表|得点ランキング|アシストランキング)/.test(text)&&!hasWholeTournamentEditorialTopic(text))score-=45;
  if(queryHit&&hasWholeTournamentEditorialTopic(queryText))score+=10;
  return {score,category:'whole'};
}
function scoreCountryNews(item,target,source){
  const title=cleanNewsTitle(item&&item.title||'');
  const url=String(item&&item.url||'');
  const queryText=String(item&&item._query||'');
  const queryHit=(item&&item._queryTarget)===target;
  const text=title+' '+url+' '+String(source&&source.name||source||'')+' '+String(item&&item.domain||'');
  if(!isUsableNewsTitle(title))return {score:-999,category:'reject'};
  if(newsHardRejectsText(text+' '+queryText,title))return {score:-999,category:'reject'};
  const aliasHit=titleMatchesNewsTarget(text,target);
  const opponentHit=countryOpponentMatchesNewsTarget(text,target);
  if(!aliasHit&&!opponentHit&&!queryHit)return {score:-999,category:'reject'};
  const editorial=hasCountryEditorialTopic(text);
  const schedule=hasCountryScheduleResultTopic(text)||hasUtilityOnlyNewsTopic(text);
  const wcContext=hasCountryWorldCupNewsContext(text,target)||Boolean(queryHit&&/(FIFAワールドカップ|ワールドカップ|W杯|World Cup|worldcup|wcup|2026|北中米|北米中)/i.test(queryText));
  let score=0;
  if(aliasHit)score+=36;
  if(opponentHit)score+=18;
  if(queryHit)score+=22;
  if(/(FIFAワールドカップ|ワールドカップ|W杯|World Cup|worldcup|wcup)/i.test(text))score+=30;
  if(/(2026|北米中|北中米|category\/2026|\/wcup|\/worldcup|Soccer King W杯|ゲキサカ W杯|GOAL W杯|スポーツナビ W杯)/i.test(text))score+=14;
  if(editorial)score+=36;
  if(schedule)score+=20;
  if(/(次戦|次の試合|対戦相手|決勝トーナメント|突破|敗退|グループステージ)/.test(text))score+=12;
  if(/(監督|指揮官|会見|コメント|インタビュー|負傷|怪我|ケガ|コンディション|スタメン|先発|戦術|練習)/.test(text))score+=12;
  // 日本語記事が少ない国は、タイトルにW杯の語が入らないことがある。
  // その場合も国名/対戦相手＋試合・代表文脈があれば救済し、点数だけ下げる。
  if(!wcContext){
    if(editorial||schedule||opponentHit)score-=18;
    else score-=42;
  }
  const category=editorial?'editorial':(schedule?'schedule':'fallback');
  return {score,category};
}
function scoreNewsItemForTarget(item,target,source){
  if(!target||target==='all')return scoreWholeTournamentNews(item,target,source);
  return scoreCountryNews(item,target,source);
}
function isWholeTournamentNews(title,url,source){
  return scoreWholeTournamentNews({title,url,domain:String(source&&source.name||source||'')},'all',source).score>=45;
}
function newsMatchesRequestedScope(item,target,source){
  const title=cleanNewsTitle(item&&item.title||'');
  const url=String(item&&item.url||'');
  const text=title+' '+url+' '+String(source&&source.name||source||'')+' '+String(item&&item.domain||'');
  // 入口では厳しく落とさない。ここで落とすと、フランス・アメリカ・アルジェリア等の
  // 日本語記事が少ない国で候補自体が消えるため、最終選別は prepareNewsItems に集約する。
  if(!isUsableNewsTitle(title))return false;
  if(newsHardRejectsText(text,title))return false;
  if(!target||target==='all')return /(FIFAワールドカップ|ワールドカップ|W杯|World Cup|worldcup|wcup|北中米|北米中|2026)/i.test(text)||hasWholeTournamentEditorialTopic(text);
  return titleMatchesNewsTarget(text,target)||countryOpponentMatchesNewsTarget(text,target)||hasCountryWorldCupNewsContext(text,target);
}
function parseNewsDateValueFromString(s){
  const raw=String(s||'');
  if(!raw)return 0;
  const compact=raw.match(/(20\d{2})(\d{2})(\d{2})(?:[T\s_-]?(\d{2})(\d{2})?(\d{2})?)?/);
  if(compact){
    const y=+compact[1],m=+compact[2]-1,d=+compact[3],hh=+(compact[4]||0),mm=+(compact[5]||0),ss=+(compact[6]||0);
    const v=Date.UTC(y,m,d,hh,mm,ss);
    if(!Number.isNaN(v))return v;
  }
  const sep=raw.match(/(20\d{2})[\/\.\-年](\d{1,2})[\/\.\-月](\d{1,2})/);
  if(sep){
    const y=+sep[1],m=+sep[2]-1,d=+sep[3];
    const v=Date.UTC(y,m,d);
    if(!Number.isNaN(v))return v;
  }
  const jp=raw.match(/(?:20\d{2}年)?(\d{1,2})月(\d{1,2})日/);
  if(jp){
    const y=(new Date()).getFullYear(),m=+jp[1]-1,d=+jp[2];
    const v=Date.UTC(y,m,d);
    if(!Number.isNaN(v))return v;
  }
  const parsed=Date.parse(raw);
  return Number.isNaN(parsed)?0:parsed;
}
function newsTimeValue(item){
  return parseNewsDateValueFromString([item&&item.seen,item&&item.url,item&&item.title].filter(Boolean).join(' '));
}
function sortNewsLatestFirst(items){
  return (Array.isArray(items)?items:[]).map((item,idx)=>({item,idx,time:newsTimeValue(item)}))
    .sort((a,b)=>{
      if(b.time!==a.time)return b.time-a.time;
      const ao=Number.isFinite(+a.item._order)?+a.item._order:a.idx;
      const bo=Number.isFinite(+b.item._order)?+b.item._order:b.idx;
      return ao-bo;
    })
    .map(x=>x.item);
}
function prepareNewsItems(items,target,limit=20){
  const all=(Array.isArray(items)?items:[]).map((item,idx)=>{
    const x=Object.assign({},item);
    x.url=normalizeDirectNewsArticleUrl(x.url);
    const s=scoreNewsItemForTarget(x,target,x.domain);
    x._newsScore=s.score;
    x._newsCategory=s.category;
    x._order=Number.isFinite(+x._order)?+x._order:idx;
    return x;
  }).filter(x=>x.url&&isDirectNewsArticleUrl(x.url)&&x._newsScore>-500);

  let selected=[];
  if(!target||target==='all'){
    // 全体ニュースは大会全体テーマを優先。ただし検索元が不安定でもゼロにしないよう段階緩和。
    selected=all.filter(x=>x._newsScore>=45 && !hasUtilityOnlyNewsTopic(x.title));
    if(dedupeNews(selected,limit).length<NEWS_MIN_STABLE_RESULTS)selected=selected.concat(all.filter(x=>x._newsScore>=24));
    if(dedupeNews(selected,limit).length<NEWS_MIN_STABLE_RESULTS)selected=selected.concat(all.filter(x=>x._newsScore>=8));
  }else{
    const textOf=x=>(x.title||'')+' '+(x.url||'')+' '+(x.domain||'')+' '+(x._query||'');
    const relevant=all.filter(x=>titleMatchesNewsTarget(textOf(x),target)||countryOpponentMatchesNewsTarget(textOf(x),target)||(x._queryTarget===target));
    selected=relevant.filter(x=>x._newsCategory==='editorial'&&x._newsScore>=44);
    if(dedupeNews(selected,limit).length<NEWS_MIN_STABLE_RESULTS)selected=selected.concat(relevant.filter(x=>x._newsCategory==='schedule'&&x._newsScore>=28));
    if(dedupeNews(selected,limit).length<NEWS_MIN_STABLE_RESULTS)selected=selected.concat(relevant.filter(x=>x._newsScore>=10));
    if(dedupeNews(selected,limit).length<NEWS_MIN_STABLE_RESULTS)selected=selected.concat(relevant);
  }
  const cleaned=selected.sort((a,b)=>{
    if((b._newsScore||0)!==(a._newsScore||0))return (b._newsScore||0)-(a._newsScore||0);
    const bt=newsTimeValue(b), at=newsTimeValue(a);
    if(bt!==at)return bt-at;
    return (a._order||0)-(b._order||0);
  }).map(item=>{
    const x=Object.assign({},item);
    delete x._newsScore;
    delete x._newsCategory;
    delete x._queryTarget;
    delete x._query;
    return x;
  });
  // 最終表示は最新性も見たいので、同点に近い範囲では日付を優先する。
  return dedupeNews(cleaned,Math.max(limit*4,120)).slice(0,limit);
}
function isLikelyArticlePath(url){
  try{
    const u=new URL(String(url||''));
    const host=u.hostname.replace(/^www\./,'').toLowerCase();
    const path=u.pathname.toLowerCase();
    if(host.includes('soccer-king.jp'))return /\/news\//.test(path)&&/\/(\d{6,}|\d{4}\/\d{2}\/\d{2})/.test(path)&&!/\/news\/world\/wc\/?$/.test(path);
    if(host.includes('gekisaka.jp'))return /\/news\//.test(path)&&(/detail\//.test(path)||/\d+/.test(path))&&!/\/news\/?$|rsspage/.test(path);
    if(host.includes('goal.com'))return /\/jp\/%e3%83%8b%e3%83%a5%e3%83%bc%e3%82%b9\//.test(path)||/\/jp\/ニュース\//.test(decodeURIComponent(path));
    if(host.includes('football-zone.net'))return /\/archives\/\d+/.test(path);
    if(host.includes('footballchannel.jp'))return !isListingNewsUrl(url)&&(/\/\d{4}\//.test(path)||/\/article\//.test(path)||/\/post\//.test(path)||/\/20\d{2}\//.test(path));
    if(host.includes('qoly.jp'))return !isListingNewsUrl(url)&&(/\/\d{4}\//.test(path)||/\/news\//.test(path)||/\/article\//.test(path));
    if(host.includes('ultra-soccer.jp'))return !isListingNewsUrl(url)&&(/\/news\/view\?/.test(path+u.search.toLowerCase())||/\/news\//.test(path));
    if(host.includes('nikkansports.com'))return !isListingNewsUrl(url)&&(/\/news\//.test(path)||/\/soccer\//.test(path));
    if(host.includes('soccer.yahoo.co.jp'))return /\/wcup\/category\/2026\//.test(path)&&!/\/(schedule|standings|stats|cups|about)\/?$/i.test(path);
    if(host.includes('news.yahoo.co.jp'))return /\/articles\//.test(path)||/\/pickup\//.test(path);
    if(host==='news.google.com')return false;
    return !isListingNewsUrl(url);
  }catch(e){return false}
}
function parseCuratedNewsLinks(text,source,target,sourceIndex){
  const raw=String(text||'').replace(/\r/g,'');
  const out=[];
  const seen=new Set();
  let order=0;
  const add=(title,url)=>{
    title=cleanNewsTitle(stripMarkdownLinks(title||''));
    url=normalizeNewsArticleUrl(normalizeGoogleNewsMaybeRelativeUrl(url||''));
    if(!title||!url||seen.has(url))return;
    if(!isUsableNewsTitle(title))return;
    if(!isLikelyArticlePath(url))return;
    const candidate={title,url,image:'',seen:'',domain:source.name,_order:(Number(sourceIndex)||0)*1000+(order++)};
    // ここでは対象国との一致判定をしない。最終段階の点数制で選別する。
    if(newsHardRejectsText(title+' '+url+' '+source.name,title))return;
    if(isImageOnlyNewsTitle(title))return;
    if(/^(画像|動画|写真|一覧|もっと見る|続きを読む|Google|ニュース|詳細|その他|ログイン|ホーム|トップ)$/.test(title))return;
    if(/記事一覧|ニュース一覧|特設ページ|出場国一覧|試合日程・結果|ルール変更|順位表$/.test(title))return;
    seen.add(url);
    out.push(candidate);
  };
  const linkRe=/\[([^\]]{8,260})\]\(((?:https?:\/\/|\/)[^)\s]+)\)/g;
  let m;
  while((m=linkRe.exec(raw))){
    const url=m[2].startsWith('/')?new URL(m[2],source.url).href:m[2];
    add(m[1],url);
    if(out.length>=30)break;
  }
  const htmlLinkRe=/<a[^>]+href=["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi;
  while((m=htmlLinkRe.exec(raw))){
    const title=decodeHtml(m[2].replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim());
    const url=m[1].startsWith('/')?new URL(m[1],source.url).href:m[1];
    add(title,url);
    if(out.length>=30)break;
  }
  return out;
}
async function fetchCuratedJapaneseSoccerNewsItems(target){

function newsSourceKey(item){
  const host=newsProviderDomain(item)||String(item&&item.domain||'').trim().toLowerCase()||'unknown';
  return host||'unknown';
}
function countNewsSources(items){
  return new Set((Array.isArray(items)?items:[]).map(newsSourceKey).filter(Boolean)).size;
}
function diversifyNewsBySource(items,limit=20,firstPassCap=4){
  const base=dedupeNews(Array.isArray(items)?items:[],100);
  const groups=new Map();
  for(const item of base){
    const key=newsSourceKey(item);
    if(!groups.has(key))groups.set(key,[]);
    groups.get(key).push(item);
  }
  const keys=Array.from(groups.keys()).sort((a,b)=>{
    const da=(groups.get(a)||[]).length, db=(groups.get(b)||[]).length;
    return db-da;
  });
  const out=[];
  const used=new Set();
  const push=item=>{
    if(!item||used.has(item.url)||out.some(x=>isSimilarNews(item,x)))return false;
    used.add(item.url); out.push(item); return true;
  };
  // 第1段階：1媒体だけで埋まらないよう、各媒体から少数ずつ採用。
  for(let round=0; round<firstPassCap && out.length<limit; round++){
    for(const key of keys){
      const item=(groups.get(key)||[])[round];
      if(item)push(item);
      if(out.length>=limit)break;
    }
  }
  // 第2段階：残りを新しい順の元リスト順で補完。
  for(const item of base){
    push(item);
    if(out.length>=limit)break;
  }
  return out;
}

async function fetchNewsItems(target){
  // 方針：全取得元を同時に走らせる。取得順や一部APIの遅延で結果がゼロにならないよう、入口では広く集めて最後に点数制で選別する。
  const fallbackLoaders=[
    ['国内サッカーサイト一覧',()=>fetchCuratedJapaneseSoccerNewsItems(target)],
    ['Google News RSS2JSON JSONP',()=>fetchGoogleNewsRss2JsonpItems(target)],
    ['Google News RSS2JSON',()=>fetchGoogleNewsRss2JsonItems(target)],
    ['GDELT',()=>fetchGdeltNewsItems(target)],
    ['Google News Reader',()=>fetchGoogleNewsItems(target)],
    ['Google News AllOrigins GET',()=>fetchGoogleNewsAllOriginsGetItems(target)],
    ['Google News Codd Proxy',()=>fetchGoogleNewsCoddProxyItems(target)],
    ['Google News Search Reader',()=>fetchGoogleNewsSearchReaderItems(target)],
    ['Yahoo News Search Reader',()=>fetchYahooNewsSearchReaderItems(target)],
    ['Jina Search',()=>fetchJinaSearchNewsItems(target)]
  ];
  const queryTextForTarget=buildGoogleNewsQueries(target).join(' ');
  const settled=await Promise.all(fallbackLoaders.map(([name,loader],loaderIndex)=>
    promiseWithSoftTimeout(loader(),15000)
      .then(items=>({name,loaderIndex,items:Array.isArray(items)?items:[],error:null}))
      .catch(error=>({name,loaderIndex,items:[],error}))
  ));
  const combined=[];
  settled.forEach(r=>{
    if(r.error)console.warn('news loader failed:',r.name,r.error);
    (r.items||[]).forEach((x,i)=>{
      const title=cleanNewsTitle(x&&x.title);
      const url=normalizeNewsArticleUrl(x&&x.url);
      const item={
        title,
        url,
        image:'',
        seen:x.seen||'',
        domain:x.domain||r.name,
        _queryTarget:target,
        _query:x._query||queryTextForTarget,
        _order:(r.loaderIndex||0)*10000+i
      };
      if(!url)return;
      if(!isUsableNewsTitle(title))return;
      if(newsHardRejectsText(title+' '+url+' '+item._query,title))return;
      combined.push(item);
    });
  });
  const directCombined=await resolveNewsCandidatesToDirectArticles(combined);
  return prepareNewsItems(directCombined,target,20);
}

function extractJsonFromText(text){
  const raw=String(text||'').trim();
  if(!raw)return null;
  try{return JSON.parse(raw)}catch(e){}
  const fenced=raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fenced){try{return JSON.parse(fenced[1].trim())}catch(e){}}
  const firstObj=raw.indexOf('{');
  const lastObj=raw.lastIndexOf('}');
  if(firstObj>=0&&lastObj>firstObj){
    try{return JSON.parse(raw.slice(firstObj,lastObj+1))}catch(e){}
  }
  const firstArr=raw.indexOf('[');
  const lastArr=raw.lastIndexOf(']');
  if(firstArr>=0&&lastArr>firstArr){
    try{return JSON.parse(raw.slice(firstArr,lastArr+1))}catch(e){}
  }
  return null;
}

async function fetchJsonWithFallbacks(url){
  let lastErr=null;
  const tryJson=async loader=>{
    const text=await loader();
    const json=extractJsonFromText(text);
    if(!json)throw new Error('JSON parse failed');
    return json;
  };
  try{
    const res=await fetch(url,{cache:'no-store'});
    if(res.ok)return await res.json();
    lastErr=new Error('direct HTTP '+res.status);
  }catch(e){lastErr=e;}
  try{return await tryJson(()=>fetchAllOriginsText(url));}catch(e){lastErr=e;}
  try{return await tryJson(()=>fetchAllOriginsGetText(url));}catch(e){lastErr=e;}
  try{return await tryJson(()=>fetchTextViaCoddProxy(url));}catch(e){lastErr=e;}
  try{return await tryJson(()=>fetchReaderText(url));}catch(e){lastErr=e;}
  throw lastErr||new Error('JSON取得失敗');
}

function newsQueryLimit(target,baseLimit){
  return (!target||target==='all')?Math.min(baseLimit,8):Math.min(baseLimit,10);
}
async function collectNewsQueriesInParallel(target,queries,handler,limit=20,timeout=5200){
  const list=uniq(Array.isArray(queries)?queries:[]).filter(Boolean);
  const settled=await Promise.all(list.map((q,idx)=>
    promiseWithSoftTimeout(handler(q,idx),timeout)
      .then(items=>({idx,q,items:Array.isArray(items)?items:[]}))
      .catch(error=>({idx,q,items:[],error}))
  ));
  const out=[];
  settled.sort((a,b)=>a.idx-b.idx).forEach(r=>{
    if(r.error)console.warn('news query failed',r.q,r.error);
    (r.items||[]).forEach((item,i)=>out.push(Object.assign({},item,{_query:item._query||r.q,_order:Number.isFinite(+item._order)?+item._order:(r.idx*1000+i)})));
  });
  return dedupeNews(out,Math.max(limit*4,120));
}
async function fetchGdeltNewsItems(target){
  const queries=buildGdeltQueries(target).slice(0,newsQueryLimit(target,8));
  return collectNewsQueriesInParallel(target,queries,async q=>{

function fetchJsonp(url,timeout=4200){
  return new Promise((resolve,reject)=>{
    const cb='__jsonp_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const sep=url.includes('?')?'&':'?';
    const script=document.createElement('script');
    let done=false;
    const cleanup=()=>{try{delete window[cb]}catch(e){window[cb]=undefined} if(script.parentNode)script.parentNode.removeChild(script)};
    const timer=setTimeout(()=>{if(done)return;done=true;cleanup();reject(new Error('JSONP timeout'))},timeout);
    window[cb]=data=>{if(done)return;done=true;clearTimeout(timer);cleanup();resolve(data)};
    script.onerror=()=>{if(done)return;done=true;clearTimeout(timer);cleanup();reject(new Error('JSONP load error'))};
    script.src=url+sep+'callback='+encodeURIComponent(cb);
    document.head.appendChild(script);
  });
}

function normalizeGoogleNewsMaybeRelativeUrl(url){

function cleanRssText(text){

  if(raw.includes('&lt;item')||raw.includes('&lt;rss')||raw.includes('&lt;channel'))raw=decodeHtml(raw);
  raw=raw.replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g,'$1');

function parseGoogleNewsRssRegex(text){
  const raw=cleanRssText(text);
  if(!raw||!/<item[\s>]/i.test(raw))return [];
  const out=[];
  const itemRe=/<item[\s\S]*?<\/item>/gi;
  const tag=(block,name)=>{
    const re=new RegExp('<'+name+'(?:\\s[^>]*)?>([\\s\\S]*?)<\\/'+name+'>','i');
    const m=block.match(re);
    return m?decodeHtml(m[1].replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()):'';
  };
  let m;
  while((m=itemRe.exec(raw))){
    const block=m[0];
    const title=tag(block,'title');
    const link=normalizeNewsUrl(normalizeGoogleNewsMaybeRelativeUrl(tag(block,'link')));
    const pubDate=tag(block,'pubDate');
    const source=tag(block,'source');
    const desc=tag(block,'description');
    const imgMatch=block.match(/<(?:media:content|media:thumbnail)[^>]+url=["']([^"']+)["']/i)||desc.match(/<img[^>]+src=["']([^"']+)["']/i);
    const image=imgMatch?absolutizeNewsImageUrl(imgMatch[1],link):'';
    if(title&&link)out.push({title,url:link,image:isHttpNewsImage(image)?image:'',seen:pubDate,domain:source||'Google News'});
  }
  return out;
}
function parseGoogleNewsRssXml(text){
  const raw=cleanRssText(text);
  if(!raw||!/[<]item[\s>]/i.test(raw))return [];
  try{
    const doc=new DOMParser().parseFromString(raw,'text/xml');
    if(doc.querySelector('parsererror'))return parseGoogleNewsRssRegex(raw);
    const parsed=Array.from(doc.querySelectorAll('item')).map(item=>{
      const get=tag=>item.getElementsByTagName(tag)[0]?.textContent?.trim()||'';
      const desc=get('description');
      const imgNode=item.getElementsByTagName('media:content')[0]||item.getElementsByTagName('media:thumbnail')[0];
      const img=imgNode?.getAttribute('url')||((desc.match(/<img[^>]+src=["']([^"']+)["']/i)||[])[1])||'';
      const link=normalizeNewsUrl(normalizeGoogleNewsMaybeRelativeUrl(get('link')));
      const image=absolutizeNewsImageUrl(img,link);
      return {title:decodeHtml(get('title')),url:link,image:isHttpNewsImage(image)?image:'',seen:get('pubDate'),domain:get('source')||'Google News'};
    }).filter(a=>a.title&&a.url);
    return parsed.length?parsed:parseGoogleNewsRssRegex(raw);
  }catch(e){return parseGoogleNewsRssRegex(raw)}
}
function parseGoogleNewsReaderText(text){

}
function parseMarkdownNewsLinks(text,domain){

function normalizeNewsTitle(t){
  return String(t||'')
    .toLowerCase()
    .replace(/https?:\/\/\S+/g,'')
    .replace(/[\[\]【】「」『』（）()<>〈〉《》]/g,' ')
    .replace(/(fifa|world cup|ワールドカップ|w杯|2026|北米中|サッカー|football|soccer)/g,' ')
    .replace(/[\s\-–—_.,，。:：;；!！?？/／|｜]+/g,'')
    .trim();
}
function bigramSet(str){
  const s=normalizeNewsTitle(str);
  if(!s)return new Set();
  if(s.length<2)return new Set([s]);
  const out=new Set();
  for(let i=0;i<s.length-1;i++)out.add(s.slice(i,i+2));
  return out;
}
function titleSimilarity(a,b){
  const A=bigramSet(a),B=bigramSet(b);
  if(!A.size||!B.size)return 0;
  let inter=0;
  A.forEach(x=>{if(B.has(x))inter++});
  return inter/(A.size+B.size-inter);
}
function isSimilarNews(a,b){
  const na=normalizeNewsTitle(a.title),nb=normalizeNewsTitle(b.title);
  if(!na||!nb)return false;
  if(a.url&&b.url&&a.url===b.url)return true;
  if(na===nb)return true;
  const shorter=na.length<nb.length?na:nb;
  const longer=na.length<nb.length?nb:na;
  if(shorter.length>=10&&longer.includes(shorter))return true;
  return titleSimilarity(na,nb)>=0.62;
}
function dedupeNews(items,limit=20){
  const out=[];
  const max=Math.max(1,Number(limit)||20);
  for(const item of items){
    if(!item.title||!item.url)continue;
    const clean=Object.assign({},item);
    clean.title=decodeHtml(stripMarkdownLinks(clean.title)).replace(/\s+-\s+[^-]{2,30}$/,'').trim()||clean.title;
    if(!hasJapaneseText(clean.title))continue;
    clean.url=normalizeDirectNewsArticleUrl(clean.url);
    if(!clean.url||!isDirectNewsArticleUrl(clean.url))continue;
    clean.image=isHttpNewsImage(clean.image)?clean.image:'';
    if(out.some(x=>isSimilarNews(clean,x)))continue;
    out.push(clean);
    if(out.length>=max)break;
  }
  return out;
}

function parseSoccerKingStats(text,kind){
  if(kind!=='goals')return [];
  const lines=String(text||'').replace(/\r/g,'').split('\n').map(stripMarkdownLinks).filter(Boolean);
  const start=Math.max(0,lines.findIndex(l=>/FIFAワールドカップ\s*2026\s*得点ランキング|得点ランキング/.test(l)));
  const scope=lines.slice(start,start+120);
  const rows=[];
  const seen=new Set();
  for(let i=0;i<scope.length-1;i++){
    const line=scope[i].replace(/^[-*]\s*/,'').trim();
    const rank=line.match(/^(\d{1,2})[\.\)]?\s+(.+)$/);
    if(!rank)continue;
    const player=cleanPlayerName(rank[2]);

    for(let j=i+1;j<Math.min(scope.length,i+4);j++){

  const scope=lines.slice(start,start+180);
  const rows=[];
  const seen=new Set();
  const teamNames=Object.values(T).map(v=>v[0]).concat(['DRコンゴ']).sort((a,b)=>b.length-a.length).map(escapeRegExp).join('|');
  const pos='(?:GK|DF|MF|FW)';
  const re=new RegExp('^(\\d{1,2})\\s+(.+?)\\s+('+teamNames+')\\s+'+pos+'\\s+(\\d{1,2})\\s+(\\d{1,2})\\s+(\\d{1,2})\\s+', 'i');

  for(const raw of scope){
    const line=raw.replace(/cite\\d+†([^]+)/g,'$1').replace(/\s+/g,' ').trim();
    const m=line.match(re);
    if(!m)continue;
    const rank=Number(m[1]);
    const player=cleanPlayerName(m[2]);
    const teamName=m[3];
    const goals=Number(m[4]);
    const assists=Number(m[6]);
    const value=kind==='goals'?goals:assists;
    const team=teamName==='DRコンゴ'?'cd':teamIdFromText(teamName);
    if(!player||!Number.isFinite(value)||value<=0)continue;
    const key=player+'|'+team+'|'+value;
    if(!seen.has(key)){
      seen.add(key);
      rows.push({rank,value,player,team});
    }
    if(rows.length>=20)break;
  }
  return rows.sort((a,b)=>Number(b.value)-Number(a.value)||Number(a.rank)-Number(b.rank));
}

function parseStatsText(text,kind){
  const cleaned=String(text||'').replace(/\r/g,'');
  if(/No Data Available/i.test(cleaned))return [];
  const lines=cleaned.split('\n').map(x=>x.replace(/[*`]/g,'').replace(/\s+/g,' ').trim()).filter(Boolean);
  const rows=[];
  const seen=new Set();
  const want=kind==='goals'?/(goal|得点|scorer)/i:/(assist|アシスト)/i;
  const start=Math.max(0,lines.findIndex(l=>want.test(l))-5);
  const scope=lines.slice(start,start+220);
  for(const line of scope){
    const parsed=parseStatsLine(line,kind);
    if(parsed&&parsed.player&&Number(parsed.value)>0){
      const key=parsed.player+'|'+parsed.value+'|'+parsed.team;
      if(!seen.has(key)){seen.add(key);rows.push(parsed)}
    }
    if(rows.length>=20)break;
  }
  return rows.sort((a,b)=>Number(b.value)-Number(a.value));
}
function parseStatsLine(line,kind){
  const cells=line.includes('|')?line.split('|').map(x=>x.trim()).filter(Boolean):null;
  if(cells&&cells.length>=3){
    const nums=cells.map((c,i)=>({i,n:Number(c)})).filter(x=>Number.isFinite(x.n));
    const stat=nums.filter(x=>x.n>=0&&x.n<30).pop();
    if(!stat)return null;
    const value=stat.n;
    const teamCell=cells.find(c=>teamIdFromText(c));
    const team=teamIdFromText(teamCell||'');
    const player=cells.find((c,i)=>i!==stat.i&&c!==teamCell&&!/^\d+$/.test(c)&&!/rank|name|team|club|player|goals?|assists?|得点|アシスト/i.test(c));
    if(player)return {player:player.replace(/\[[^\]]+\]/g,'').trim(),team,value};
  }
  const m=line.match(/^(?:#?\s*)?(\d{1,2})[\.\)]?\s+(.+?)\s+(\d{1,2})$/);
  if(m){
    let body=m[2].trim();
    const value=Number(m[3]);
    const team=teamIdFromText(body);
    for(const [id,v] of Object.entries(T))body=body.replace(new RegExp(v[0],'gi'),'');
    Object.keys(NAME_MAP).forEach(n=>{body=body.replace(new RegExp(n,'gi'),'')});
    body=body.replace(/\b[A-Z]{3}\b/g,'').replace(/[-–—|,]+/g,' ').replace(/\s+/g,' ').trim();
    if(body&&value>0)return {player:body,team,value};
  }
  return null;
}

function openSheet(id){
  const s=findSlot(id);if(!s||s.fixed)return;
  const options=availableOptions(s);
  editing=id;
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('sheet').classList.remove('group-detail');
  document.getElementById('sheet').classList.add('show');
  document.getElementById('sheet').innerHTML=`<div class="sheet-head"><div><div class="sheet-title">${esc(s.tag)} の候補国を選択</div><div class="small">複数選択できます。確定済みのチーム、敗退決定チームは選択肢から除外されます。</div></div><button class="sheet-close" id="closeSheetBtn" type="button" aria-label="閉じる">×</button></div><div class="sheet-body">${options.length?options.map(id=>`<label class="opt"><input type="checkbox" value="${id}" ${s.sel.includes(id)?'checked':''}>${teamFlag(id)}<b>${esc(T[id][0])}</b></label>`).join(''):'<div class="small">選択可能な候補がありません。</div>'}</div><div class="sheet-actions"><button class="btn" id="clearSel">クリア</button><button class="btn primary" id="doneSel">反映</button></div>`;
  document.getElementById('doneSel').onclick=applySheet;
  document.getElementById('clearSel').onclick=()=>{document.querySelectorAll('#sheet input').forEach(x=>x.checked=false)};
  document.getElementById('closeSheetBtn').onclick=closeSheet;
}
function closeSheet(){document.getElementById('backdrop').classList.remove('show');const sh=document.getElementById('sheet');sh.classList.remove('show','group-detail');editing=null;currentGroup=null}
function applySheet(){const s=findSlot(editing);if(s){s.sel=[...document.querySelectorAll('#sheet input:checked')].map(x=>x.value);s.confirmed=false;save();closeSheet();render()}}
const backdropEl=document.getElementById('backdrop');
if(backdropEl)backdropEl.onclick=closeSheet;
function boot(){
  try{
    render();
    document.body.setAttribute('data-app-ready','true');
  }catch(e){
    console.error('初期表示エラー',e);
    const app=document.getElementById('app');
    if(app)app.innerHTML=`<div class="card"><h2>表示エラー</h2><p class="small">アプリの初期表示でエラーが発生しました。ブラウザのキャッシュを削除するか、URL末尾に ?v=25 などを付けて再読み込みしてください。</p><p class="small">${esc(e.message||e)}</p></div>`;
  }
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot,{once:true});}else{boot();}
})();
</script>
