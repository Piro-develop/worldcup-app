  [{id:'l7a',tag:'D1',sel:['us'],opts:G.D,fixed:true,confirmed:true},{id:'l7b',tag:'3位',sel:[],opts:TH.t5}],
  [{id:'l8a',tag:'G1',sel:['be'],opts:G.G},{id:'l8b',tag:'3位',sel:[],opts:TH.t6}]
 ],
 right:[
  [{id:'r1a',tag:'C1',sel:['br','ma'],opts:G.C},{id:'r1b',tag:'F2',sel:['jp'],opts:G.F}],
  [{id:'r2a',tag:'E2',sel:['ci'],opts:G.E},{id:'r2b',tag:'I2',sel:['no'],opts:G.I}],
  [{id:'r3a',tag:'A1',sel:['mx'],opts:G.A,fixed:true,confirmed:true},{id:'r3b',tag:'3位',sel:[],opts:TH.t3}],
  [{id:'r4a',tag:'L1',sel:['eng'],opts:G.L},{id:'r4b',tag:'3位',sel:[],opts:TH.t4}],
  [{id:'r5a',tag:'J1',sel:['ar'],opts:G.J,fixed:true,confirmed:true},{id:'r5b',tag:'H2',sel:['uy'],opts:G.H}],
  [{id:'r6a',tag:'D2',sel:['au','py'],opts:G.D},{id:'r6b',tag:'G2',sel:['eg'],opts:G.G}],
  [{id:'r7a',tag:'B1',sel:['ca','ch'],opts:G.B},{id:'r7b',tag:'3位',sel:[],opts:TH.t7}],
  [{id:'r8a',tag:'K1',sel:['pt','co'],opts:G.K},{id:'r8b',tag:'3位',sel:[],opts:TH.t8}]
 ]
};
let state=load();let editing=null;
function clone(x){return JSON.parse(JSON.stringify(x))}
function load(){
  const base={active:'bracket',bracket:clone(initial),groups:buildGroupRows(initialGroups),groupStatus:'初期データを表示中',goals:rows('得点')};
  try{
    const saved=JSON.parse(localStorage.getItem(STORE)||'{}');
    const merged=Object.assign(base,saved);
    if(!merged.groups)merged.groups=buildGroupRows(initialGroups);
    if(merged.active==='assists')merged.active='groups';
    return merged;
  }catch(e){return base}
}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function rows(){return Array.from({length:10},(_,i)=>({rank:i+1,value:'',player:'',team:''}))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function teamFlag(id){
  const code=FLAG_CODE[id];
  const name=esc(T[id]?.[0]||id);
  return code?`<img class="flag-img" src="https://flagcdn.com/w40/${code}.png" srcset="https://flagcdn.com/w80/${code}.png 2x" alt="${name}" loading="lazy">`:''
}
function teamText(ids){if(!ids||!ids.length)return '<span class="muted">未選択</span>';return ids.map(id=>T[id]?`${teamFlag(id)}${esc(T[id][0])}`:esc(id)).join(' <span class="muted">/</span> ')}
function render(){
  document.getElementById('tabs').innerHTML=tabs.map(([id,n])=>`<button class="tab ${state.active===id?'active':''}" data-tab="${id}">${n}</button>`).join('');
  document.getElementById('app').innerHTML=state.active==='bracket'?bracketHTML():state.active==='groups'?groupsHTML():simpleTab(state.active);
  bind()
}
function bracketHTML(){
  const leftSlots=state.bracket.left.flatMap((m,mi)=>m.map((slot,si)=>slotHTML(slot,'left',mi,si))).join('');
  const rightSlots=state.bracket.right.flatMap((m,mi)=>m.map((slot,si)=>slotHTML(slot,'right',mi,si))).join('');
  return `<section class="panel">
    <div class="toolbar"><button class="btn" id="reset">初期表示に戻す</button></div>
    <div class="bracket-card">
      <div class="bracket">
        ${linesSVG()}
        ${leftSlots}
        ${rightSlots}
      </div>
    </div>
  </section>`
}
function linesSVG(){
  const slotTop=3.5;
  const matchGap=11.8;
  const slotGap=5.5;
  const slotH=4.1;
  const pairCenters=Array.from({length:8},(_,i)=>{
    const first=slotTop+i*matchGap+slotH/2;
    return [first, first+slotGap];
  });
  const mid=pairCenters.map(([a,b])=>(a+b)/2);
  const block=[(mid[0]+mid[1])/2,(mid[2]+mid[3])/2,(mid[4]+mid[5])/2,(mid[6]+mid[7])/2];
  const semi=[(block[0]+block[1])/2,(block[2]+block[3])/2];
  const final=(semi[0]+semi[1])/2;
  let p=[];
  const line=(x1,x2,y)=>p.push(`<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}"/>`);

  // 左側：枠の右端中央から中央方向へ
  pairCenters.forEach(([a,b],i)=>{
    line(39.0,40.6,a);line(39.0,40.6,b);
    p.push(`<line x1="40.6" y1="${a}" x2="40.6" y2="${b}"/>`);
    line(40.6,43.0,mid[i]);
  });
  for(let i=0;i<4;i++){const a=mid[i*2],b=mid[i*2+1],m=block[i];p.push(`<line x1="43.0" y1="${a}" x2="43.0" y2="${b}"/>`);line(43.0,45.2,m);}
  for(let i=0;i<2;i++){const a=block[i*2],b=block[i*2+1],m=semi[i];p.push(`<line x1="45.2" y1="${a}" x2="45.2" y2="${b}"/>`);line(45.2,48.6,m);}
  p.push(`<line x1="48.6" y1="${semi[0]}" x2="48.6" y2="${semi[1]}"/>`);
  line(48.6,49.7,final);

  // 右側：枠の左端中央から中央方向へ
  pairCenters.forEach(([a,b],i)=>{
    line(61.0,59.4,a);line(61.0,59.4,b);
    p.push(`<line x1="59.4" y1="${a}" x2="59.4" y2="${b}"/>`);
    line(59.4,57.0,mid[i]);
  });
  for(let i=0;i<4;i++){const a=mid[i*2],b=mid[i*2+1],m=block[i];p.push(`<line x1="57.0" y1="${a}" x2="57.0" y2="${b}"/>`);line(57.0,54.8,m);}
  for(let i=0;i<2;i++){const a=block[i*2],b=block[i*2+1],m=semi[i];p.push(`<line x1="54.8" y1="${a}" x2="54.8" y2="${b}"/>`);line(54.8,51.4,m);}
  p.push(`<line x1="51.4" y1="${semi[0]}" x2="51.4" y2="${semi[1]}"/>`);
  line(51.4,50.3,final);

  p.push(`<line x1="49.7" y1="${final}" x2="50.3" y2="${final}"/>`);
  p.push(`<circle class="final-dot" cx="50" cy="${final}" r=".65"/>`);
  return `<svg class="bracket-svg" viewBox="0 0 100 100" preserveAspectRatio="none">${p.join('')}</svg>`
}
function slotHTML(s,side,mi,si){
  const top=3.5+(mi*11.8)+(si?5.5:0);
  const left=side==='left'?1.0:61.0;
  const classes=`slot ${s.sel.includes('jp')?'jp':''} ${s.sel.length?'':'empty'} ${s.fixed?'fixed':''} ${s.confirmed||s.fixed?'confirmed':''}`;
  const mainAttr=s.fixed?'disabled aria-disabled="true"':`data-slot="${s.id}"`;
  const confirmAttr=s.fixed?'aria-label="確定済み"':`data-confirm="${s.id}" aria-label="確定"`;
  return `<div class="${classes}" style="left:${left}%;top:${top}%">
    <button class="slot-main" type="button" ${mainAttr}><span class="tag">${esc(s.tag)}</span><span class="team-text">${teamText(s.sel)}</span></button>
    <button class="confirm-btn ${s.confirmed||s.fixed?'active':''}" type="button" ${confirmAttr}>確</button>
  </div>`
}
function isGroupComplete(rows){return rows&&rows.length===4&&rows.every(r=>(r.w+r.d+r.l)>=3)}
function isQualifiedTeam(id){
  const rows=state.groups?.[TEAM_TO_GROUP[id]]||[];
  if(!rows.length)return false;
  const r=rows.find(x=>x.team===id);
  if(!r)return false;
  if(isGroupComplete(rows))return r.rank<=2;
  return r.pts>=6;
}
function groupsHTML(){
  return `<section class="panel">
    <div class="group-toolbar">
      <div class="group-status">状態：${esc(state.groupStatus||'初期データを表示中')}<span class="qualified-note">黄色＝進出確定</span></div>
      <button class="btn primary" id="updateGroups">更新</button>
    </div>
    <div class="group-grid">
      ${GROUPS.map(g=>groupBoxHTML(g,state.groups[g]||[])).join('')}
    </div>
  </section>`
}
function groupBoxHTML(g,rows){
  return `<div class="group-box">
    <div class="group-title"><span>Group ${g}</span><span>${rows.length}チーム</span></div>
    <table class="group-table">
      <thead><tr><th class="rank-col">順</th><th class="flag-col">国</th><th class="team-col">国名</th><th class="rec-col">勝敗</th><th class="num-col">得</th><th class="num-col">失</th><th class="num-col">差</th><th class="pts-col">点</th></tr></thead>
      <tbody>${rows.map(r=>`<tr class="${isQualifiedTeam(r.team)?'qualified-row':''}"><td>${r.rank}</td><td>${teamFlag(r.team)}</td><td class="team-cell">${esc(T[r.team]?.[0]||r.team)}</td><td>${r.w}-${r.d}-${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gf-r.ga>0?'+':''}${r.gf-r.ga}</td><td class="pts-col">${r.pts}</td></tr>`).join('')}</tbody>
    </table>
  </div>`
}
function simpleTab(tab){
  const title={goals:'得点ランキング',flash:'速報',news:'最新ニュース'}[tab];
  if(tab==='flash')return `<div class="card"><h2>${title}</h2><p class="small">軽量化のため、ここは次工程で再調整します。</p><button class="btn primary">更新</button></div>`;
  if(tab==='news')return `<div class="card"><h2>${title}</h2><p class="small">軽量化のため、ここは次工程で再調整します。</p><select class="input"><option>W杯全体</option>${ALL.map(id=>`<option>${esc(T[id][0])}</option>`).join('')}</select></div>`;
  let rowsData=state.goals;
  return `<div class="card"><h2>${title}</h2><p class="small">得点ランキングは、信頼できる取得元が確定した後に自動更新へ切り替えます。現在は表示枠のみです。</p><table class="table"><thead><tr><th>順位</th><th>得点数</th><th>国旗 選手名（国名）</th></tr></thead><tbody>${rowsData.map((r,i)=>`<tr><td>${r.rank}</td><td><input class="input" data-r="goals|${i}|value" value="${esc(r.value)}"></td><td><input class="input" data-r="goals|${i}|player" placeholder="選手名" value="${esc(r.player)}"></td></tr>`).join('')}</tbody></table></div>`
}
function bind(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.active=b.dataset.tab;save();render()});
  document.querySelectorAll('[data-slot]').forEach(b=>b.onclick=()=>openSheet(b.dataset.slot));
  document.querySelectorAll('[data-confirm]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();toggleConfirm(b.dataset.confirm)});
  const reset=document.getElementById('reset');
  if(reset)reset.onclick=()=>{if(confirm('添付画像の初期表示に戻しますか？')){state.bracket=clone(initial);save();render()}};
  document.querySelectorAll('[data-r]').forEach(i=>i.oninput=()=>{const [t,n,f]=i.dataset.r.split('|');state[t][+n][f]=i.value;save()});
  const updateGroups=document.getElementById('updateGroups');if(updateGroups)updateGroups.onclick=updateGroupStandings
}
function toggleConfirm(id){
  const s=findSlot(id);if(!s||s.fixed)return;
  if(!s.sel.length){alert('先に国を選択してください。');return;}
  s.confirmed=!s.confirmed;
  if(s.confirmed)removeConfirmedFromOthers(s);
  save();render();
}
function removeConfirmedFromOthers(source){
  const ids=new Set(source.sel||[]);
  for(const side of ['left','right'])for(const m of state.bracket[side])for(const s of m){
    if(s===source||s.fixed)continue;
    const before=(s.sel||[]).length;
    s.sel=(s.sel||[]).filter(id=>!ids.has(id));
    if(before && !s.sel.length)s.confirmed=false;
  }
}
function resolveTeamFromESPN(team){
  const abbr=(team?.abbreviation||team?.team?.abbreviation||'').toUpperCase();
  if(ESPN_MAP[abbr])return ESPN_MAP[abbr];
  const name=String(team?.displayName||team?.shortDisplayName||team?.name||team?.team?.displayName||team?.team?.shortDisplayName||'').toLowerCase().replace(/[’']/g,'').trim();
  return NAME_MAP[name]||'';
}
function blankStats(){
  const obj={};
  Object.entries(G).forEach(([g,ids])=>{
    ids.forEach(id=>obj[id]={team:id,w:0,d:0,l:0,gf:0,ga:0,pts:0,group:g});
  });
  return obj;
}
function standingsFromStats(stats){
  const out={};
  GROUPS.forEach(g=>{
    out[g]=(G[g]||[]).map(id=>stats[id]).filter(Boolean).sort((a,b)=>
      b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf || T[a.team][0].localeCompare(T[b.team][0],'ja')
    ).map((r,i)=>Object.assign({},r,{rank:i+1}));
  });
  return out;
}
async function updateGroupStandings(){
  state.groupStatus='更新中...';
  save();render();
  try{
    const payloads=await Promise.all(ESPN_DATES.map(d=>fetch(`${ESPN_SCOREBOARD}?dates=${d}&limit=100`).then(r=>r.ok?r.json():{events:[]})));
    const stats=blankStats();
    let count=0;
    payloads.flatMap(p=>p.events||[]).forEach(ev=>{
      const comp=(ev.competitions||[])[0]||{};
      const st=(ev.status||{}).type||{};
      if(!st.completed)return;
      const cs=comp.competitors||[];
      if(cs.length<2)return;
      const a=cs[0],b=cs[1];
      const idA=resolveTeamFromESPN(a.team||a),idB=resolveTeamFromESPN(b.team||b);
      if(!idA||!idB||!stats[idA]||!stats[idB])return;
      if(TEAM_TO_GROUP[idA]!==TEAM_TO_GROUP[idB])return;
      const scoreA=Number(a.score),scoreB=Number(b.score);
      if(Number.isNaN(scoreA)||Number.isNaN(scoreB))return;
      stats[idA].gf+=scoreA;stats[idA].ga+=scoreB;
      stats[idB].gf+=scoreB;stats[idB].ga+=scoreA;
      if(scoreA>scoreB){stats[idA].w++;stats[idB].l++;stats[idA].pts+=3}
      else if(scoreA<scoreB){stats[idB].w++;stats[idA].l++;stats[idB].pts+=3}
      else{stats[idA].d++;stats[idB].d++;stats[idA].pts++;stats[idB].pts++}
      count++;
    });
    if(count===0)throw new Error('試合結果を取得できませんでした。');
    state.groups=standingsFromStats(stats);
    state.groupStatus=`ESPNの試合結果から${count}試合を反映：${new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    state.groupStatus='更新失敗：'+e.message+'。初期データを表示しています。';
    if(!state.groups)state.groups=buildGroupRows(initialGroups);
  }
  save();render();
}
function findSlot(id){for(const side of ['left','right'])for(const m of state.bracket[side])for(const s of m)if(s.id===id)return s;return null}
function confirmedIds(currentSlot){
  const ids=[];
  for(const side of ['left','right'])for(const m of state.bracket[side])for(const s of m){
    if(s===currentSlot)continue;
    if(s.fixed||s.confirmed)ids.push(...(s.sel||[]));
  }
  return [...new Set(ids)];
}
function availableOptions(s){
  const locked=confirmedIds(s);
  return s.opts.filter(id=>{
    if(ELIMINATED.includes(id))return false;
    if(locked.includes(id))return false;
    return true;
  });
}
function openSheet(id){
  const s=findSlot(id);if(!s||s.fixed)return;
  const options=availableOptions(s);
  editing=id;
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('sheet').classList.add('show');
  document.getElementById('sheet').innerHTML=`<div class="sheet-head"><div><div class="sheet-title">${esc(s.tag)} の候補国を選択</div><div class="small">複数選択できます。確定済みのチーム、敗退決定チームは選択肢から除外されます。</div></div><button class="sheet-close" id="closeSheetBtn" type="button" aria-label="閉じる">×</button></div><div class="sheet-body">${options.length?options.map(id=>`<label class="opt"><input type="checkbox" value="${id}" ${s.sel.includes(id)?'checked':''}>${teamFlag(id)}<b>${esc(T[id][0])}</b></label>`).join(''):'<div class="small">選択可能な候補がありません。</div>'}</div><div class="sheet-actions"><button class="btn" id="clearSel">クリア</button><button class="btn primary" id="doneSel">反映</button></div>`;
  document.getElementById('doneSel').onclick=applySheet;
  document.getElementById('clearSel').onclick=()=>{document.querySelectorAll('#sheet input').forEach(x=>x.checked=false)};
  document.getElementById('closeSheetBtn').onclick=closeSheet;
}
function closeSheet(){document.getElementById('backdrop').classList.remove('show');document.getElementById('sheet').classList.remove('show');editing=null}
function applySheet(){const s=findSlot(editing);if(s){s.sel=[...document.querySelectorAll('#sheet input:checked')].map(x=>x.value);s.confirmed=false;save();closeSheet();render()}}
document.getElementById('backdrop').onclick=closeSheet;
render();
})();
</script>
