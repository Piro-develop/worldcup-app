  <style>
    :root{
      --bg:#050913;--panel:#0c1424;--panel2:#111c30;--slot:#101b2f;
      --line:rgba(205,220,245,.24);--line2:rgba(205,220,245,.48);
      --text:#eef5ff;--muted:#8fa1bc;--accent:#34d2d0;--accent2:#155c66;
      --gold:#f0c96b;--danger:#ff6b6b;--shadow:0 12px 30px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050913;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
    body{background:radial-gradient(circle at 50% -10%,rgba(58,98,150,.32),transparent 34%),linear-gradient(180deg,#070c16 0%,#050913 100%)}
    .wrap{max-width:1180px;margin:0 auto;padding:12px 8px 28px}
    .hero{padding:8px 6px 4px}.eyebrow{font-size:10px;letter-spacing:.22em;color:#78c7ff;font-weight:800}.title{font-size:22px;margin:5px 0 2px;font-weight:900}.lead{font-size:12px;color:var(--muted);margin:0;line-height:1.55}
    .tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;overflow:visible;position:sticky;top:0;z-index:50;margin-top:10px;padding:7px;border:1px solid rgba(205,220,245,.34);border-radius:16px;background:rgba(7,12,22,.88);backdrop-filter:blur(14px);box-shadow:0 10px 26px rgba(0,0,0,.26),inset 0 0 0 1px rgba(255,255,255,.035)}
    .tab{width:100%;min-width:0;border:1px solid rgba(205,220,245,.18);border-radius:11px;padding:8px 2px;background:linear-gradient(180deg,rgba(22,34,55,.95),rgba(12,20,36,.95));color:#c8d6ea;font-size:12px;font-weight:800;white-space:nowrap;text-align:center;box-shadow:inset 0 -2px 0 rgba(0,0,0,.18)}.tab.active{background:linear-gradient(180deg,rgba(52,210,208,.28),rgba(21,92,102,.42));border-color:rgba(52,210,208,.72);color:#fff;box-shadow:0 0 0 1px rgba(52,210,208,.22),0 8px 18px rgba(52,210,208,.10),inset 0 -3px 0 rgba(52,210,208,.44)}
    .panel{margin-top:10px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:8px 2px}.btn{border:1px solid var(--line);border-radius:10px;background:#111c30;color:#eaf3ff;padding:8px 10px;font-weight:800;font-size:12px}.btn.primary{background:linear-gradient(180deg,#1b8a94,#155c66);border-color:rgba(52,210,208,.44)}

    .bracket-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:
        radial-gradient(circle at 50% 50%,rgba(52,210,208,.10),transparent 22%),
        linear-gradient(180deg,rgba(11,18,32,.94),rgba(5,9,19,.96));
      box-shadow:var(--shadow);
      padding:8px;
      overflow:hidden;
    }
    .bracket{
      position:relative;
      width:100%;
      max-width:920px;
      height:650px;
      margin:0 auto;
      border-radius:14px;
      background:linear-gradient(180deg,rgba(8,14,25,.2),rgba(5,9,19,.2));
    }
    .bracket-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
    .bracket-svg path,.bracket-svg line{
      stroke:var(--line2);
      stroke-width:2;
      fill:none;
      vector-effect:non-scaling-stroke;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .bracket-svg .final-dot{fill:var(--gold);stroke:none;filter:drop-shadow(0 0 8px rgba(240,201,107,.9))}
    .slot{
      position:absolute;
      z-index:2;
      width:38%;
      height:5.1%;
      min-height:32px;
      border:1px solid var(--line);
      border-radius:8px;
      background:linear-gradient(180deg,#14223a,#0d1728);
      display:flex;
      align-items:center;
      gap:0;
      padding:0;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.025);
      overflow:hidden;
    }
    .slot:hover{border-color:rgba(52,210,208,.62)}
    .slot.jp{background:linear-gradient(180deg,rgba(35,135,139,.95),rgba(16,89,96,.95));border-color:rgba(93,243,240,.64)}
    .slot.empty{color:#a4b3c9}
    .slot.fixed{border-color:rgba(240,201,107,.72);box-shadow:inset 0 0 0 1px rgba(240,201,107,.16)}
    .slot.confirmed{
      background:linear-gradient(180deg,#f6d87f,#c89933);
      border-color:rgba(255,231,151,.95);
      color:#15120a;
      box-shadow:0 0 0 1px rgba(255,231,151,.35),0 0 18px rgba(240,201,107,.28);
    }
    .slot-main{
      appearance:none;border:0;background:transparent;color:inherit;
      flex:1 1 auto;min-width:0;height:100%;
      display:flex;align-items:center;gap:5px;
      padding:2px 4px 2px 5px;text-align:left;cursor:pointer;
    }
    .slot.fixed .slot-main{cursor:default}
    .slot-main:disabled{opacity:1}
    .confirm-btn{
      appearance:none;flex:0 0 25px;height:calc(100% - 6px);margin-right:3px;
      border:1px solid rgba(205,220,245,.18);border-radius:7px;
      background:#1d2b44;color:#c8d6ea;font-size:10px;font-weight:900;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
    }
    .confirm-btn.active{background:#7a5414;color:#fff3cf;border-color:rgba(255,225,135,.75)}
    .slot.confirmed .confirm-btn{background:#17130a;color:#ffe79a;border-color:rgba(0,0,0,.24)}
    .tag{
      flex:0 0 31px;
      height:24px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:6px;
      background:#24314a;
      color:#c8d5e8;
      font-size:10px;
      font-weight:900;
    }
    .slot.jp .tag{background:#6ee7e5;color:#08212a}
    .slot.confirmed .tag{background:#1d1608;color:#ffe79a}
    .team-text{
      flex:1 1 auto;
      min-width:0;
      max-height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:1px;
      font-size:clamp(7px,.9vw,10px);
      font-weight:900;
      line-height:1.05;
      overflow:hidden;
      letter-spacing:-.03em;
    }
    .team-line{
      display:flex;
      align-items:center;
      min-width:0;
      white-space:nowrap;
      overflow:visible;
    }
    .team-line .flag-img{width:14px;height:9px;margin-right:2px}
    .team-name{display:inline-block;min-width:0;overflow:visible;text-overflow:clip}
    .team-text .muted{font-weight:700;color:#aab8cc}
    .slot.confirmed .team-text .muted{color:#473811}
    .flag-img{
      width:18px;
      height:12px;
      margin-right:4px;
      border-radius:2px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.22);
      flex:0 0 auto;
      vertical-align:-1px;
      background:#fff;
    }
    .group-table .flag-img{width:18px;height:12px;margin:0}
    .opt .flag-img{width:22px;height:15px;margin-right:0}

    .toolbar{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin:0 0 8px}
    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.56);z-index:100;display:none}.sheet-backdrop.show{display:block}.sheet{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(520px,calc(100vw - 18px));max-height:78vh;overflow:auto;border:1px solid var(--line2);border-radius:18px;background:#07111f;box-shadow:0 28px 70px rgba(0,0,0,.55);z-index:101;display:none}.sheet.show{display:block}.sheet-head{position:sticky;top:0;background:#07111f;border-bottom:1px solid var(--line);padding:12px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.sheet-title{font-weight:900}.sheet-close{flex:0 0 auto;width:34px;height:34px;border:1px solid var(--line);border-radius:999px;background:#111c30;color:#fff;font-size:20px;font-weight:900;line-height:1;display:inline-flex;align-items:center;justify-content:center}.sheet-body{padding:10px}.opt{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid rgba(205,220,245,.12);border-radius:12px;margin-bottom:7px;background:#0d1728}.opt input{accent-color:var(--accent);transform:scale(1.15)}.sheet-actions{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);position:sticky;bottom:0;background:#07111f}.sheet-actions .btn{flex:1}

    .card{border:1px solid var(--line);border-radius:16px;background:rgba(12,20,36,.9);padding:14px;margin:10px 0;box-shadow:var(--shadow)}.stat-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:8px 0 10px}.stat-status{font-size:11px;color:var(--muted);line-height:1.5}.source-pill{display:inline-flex;align-items:center;margin-left:6px;padding:2px 6px;border-radius:999px;background:#14233a;color:#b7c8df;font-size:10px}.stat-table .flag-img{width:18px;height:12px;margin-right:4px}.stat-player{font-weight:900}.stat-source-note{margin-top:10px;font-size:11px;color:#8fa1bc;line-height:1.5}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid rgba(205,220,245,.12);padding:8px;text-align:left}.stat-table th{text-align:center;white-space:nowrap}.stat-table th:nth-child(1),.stat-table td:nth-child(1){width:46px;min-width:46px;text-align:center;white-space:nowrap}.stat-table th:nth-child(2),.stat-table td:nth-child(2){width:58px;min-width:58px;text-align:center;white-space:nowrap}.stat-table th:nth-child(3){text-align:center;white-space:nowrap}.stat-table td:nth-child(3){text-align:left}.input{width:100%;border:1px solid var(--line);border-radius:8px;background:#07111f;color:#fff;padding:8px}.small{font-size:12px;color:var(--muted);line-height:1.6}


    .boot-error{border:1px solid rgba(255,107,107,.45);background:rgba(70,20,28,.86);color:#fff;border-radius:14px;padding:12px;margin:10px 0}.boot-error code{white-space:normal;word-break:break-word;color:#ffd6d6}
    .group-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:10px;
    }
    .group-box{
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(12,20,36,.92);
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .group-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 9px;
      background:linear-gradient(180deg,#12213a,#0d182b);
      border-bottom:1px solid rgba(205,220,245,.14);
      font-weight:900;
      font-size:12px;
    }
    .group-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      font-size:9px;
    }
    .group-table th,.group-table td{
      border-bottom:1px solid rgba(205,220,245,.10);
      padding:4px 2px;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .group-table th{color:#aebdd3;font-weight:800;background:rgba(7,17,31,.72)}
    .group-table td.team-cell{text-align:left;font-weight:900}
    .group-table .rank-col{width:16px}
    .group-table .flag-col{width:22px}
    .group-table .team-col{width:auto}
    .group-table .rec-col{width:34px}
    .group-table .num-col{width:20px}
    .group-table .pts-col{width:22px;font-weight:900;color:#ffe79a}
    .group-table tr.qualified-row{
      background:linear-gradient(90deg,rgba(246,216,127,.94),rgba(200,153,51,.92));
      color:#15120a;
      font-weight:900;
    }
    .group-table tr.qualified-row td{border-bottom-color:rgba(76,54,9,.18)}
    .group-table tr.qualified-row .pts-col{color:#15120a}
    .group-table tr.qualified-row .flag-img{border-color:rgba(40,30,10,.34);box-shadow:0 0 0 1px rgba(255,255,255,.35)}
    .qualified-note{display:inline-flex;align-items:center;gap:4px;margin-left:6px;padding:2px 6px;border-radius:999px;background:#f6d87f;color:#15120a;font-size:10px;font-weight:900}
    .group-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin:8px 2px 10px;
    }
    .group-status{font-size:11px;color:var(--muted);line-height:1.5}


    .group-box{cursor:pointer}
    .group-box:active{transform:scale(.992)}
    .sheet.group-detail{
      top:50%;
      bottom:auto;
      transform:translate(-50%,-50%);
      width:min(780px,calc(100vw - 16px));
      max-height:88vh;
      border-radius:20px;
    }
    .group-detail .sheet-head{align-items:center}
    .group-detail-title{font-size:18px;font-weight:900}
    .detail-section{padding:10px 10px 2px}
    .detail-section h3{margin:0 0 8px;font-size:14px}
    .detail-table{
      width:100%;
      border-collapse:collapse;
      table-layout:auto;
      font-size:12px;
      margin-bottom:12px;
    }
    .detail-table th,.detail-table td{
      border-bottom:1px solid rgba(205,220,245,.12);
      padding:7px 4px;
      text-align:center;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      line-height:1.25;
    }
    .detail-table th{color:#aebdd3;background:rgba(7,17,31,.72)}
    .detail-table .detail-team{
      text-align:left;
      font-weight:900;
      min-width:88px;
    }
    .match-list{display:flex;flex-direction:column;gap:8px}
    .match-card{
      border:1px solid rgba(205,220,245,.16);
      border-radius:13px;
      background:rgba(13,23,40,.95);
      padding:9px;
    }
    .match-date{font-size:11px;color:#9fb0ca;margin-bottom:5px}
    .match-main{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
      align-items:flex-start;
      gap:5px;
      font-size:12px;
      font-weight:900;
    }
    .match-team{display:flex;flex-direction:column;align-items:flex-start;align-self:flex-start;gap:3px;min-width:0;width:100%;border-radius:10px;padding:5px 5px}
    .match-team.away{align-items:flex-end;text-align:right}
    .match-team-name.winner{background:linear-gradient(90deg,rgba(129,216,208,.98),rgba(38,166,154,.92));color:#052523;box-shadow:0 0 0 1px rgba(129,216,208,.55),0 0 14px rgba(129,216,208,.22)}
    .match-team-name.winner .flag-img{border-color:rgba(5,37,35,.35);box-shadow:0 0 0 1px rgba(255,255,255,.38)}
    .match-team-name{display:flex;align-items:center;gap:4px;min-width:0;font-weight:900;border-radius:10px;padding:4px 6px}
    .match-team.away .match-team-name{justify-content:flex-end}
    .team-scorers{font-size:9.2px;line-height:1.25;color:#d7e2f2;font-weight:700;width:100%;max-width:100%;display:flex;flex-direction:column;gap:1px;align-items:stretch;text-align:left;overflow:hidden}
    .match-team.home .team-scorers{align-self:stretch}
    .match-team.away .team-scorers{align-self:stretch;text-align:left}
    .scorer-line{display:grid;grid-template-columns:minmax(0,1fr) max-content max-content;column-gap:0;align-items:baseline;width:100%;min-width:0;white-space:nowrap;text-align:left;overflow:hidden;letter-spacing:-.055em}
    .scorer-line span{min-width:0;white-space:nowrap}
    .scorer-name{font-weight:800;word-break:keep-all;overflow:visible;overflow-wrap:normal;padding-right:12px}
    .scorer-period{color:#b9c8dc;font-weight:800;white-space:nowrap;padding-left:0;padding-right:2px}
    .scorer-minute{color:#b9c8dc;font-weight:800;white-space:nowrap;padding-left:0}
    .match-score{
      align-self:flex-start;
      margin-top:4px;
      min-width:42px;
      text-align:center;
      border-radius:999px;
      padding:3px 6px;
      background:#17243a;
      color:#fff;
      font-weight:900;
    }
    .match-score.done{background:#f6d87f;color:#15120a}
    .scorers{
      margin-top:7px;
      padding-top:7px;
      border-top:1px dashed rgba(205,220,245,.15);
      color:#c9d6e8;
      font-size:11px;
      line-height:1.5;
    }
    .scorers b{color:#fff}
    .scorer-empty{color:#8fa1bc}
    .group-detail-note{font-size:11px;color:#8fa1bc;line-height:1.45;margin-top:6px}


    .stat-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 10px}
    .stat-head h2{margin:0;font-size:20px;line-height:1.25}
    .stat-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex:0 0 auto}
    .stat-actions .stat-status{min-width:58px;text-align:right;white-space:nowrap}
    .news-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 10px}
    .news-head h2{margin:0;font-size:20px;line-height:1.25}
    .news-controls{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:10px}
    .news-status{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;margin-bottom:8px;min-height:16px}
    .news-list{display:flex;flex-direction:column;gap:9px}
    .news-item{display:grid;grid-template-columns:74px 1fr;gap:10px;align-items:center;border:1px solid rgba(205,220,245,.13);border-radius:13px;background:#0d1728;padding:8px;text-decoration:none;color:inherit}
    .news-item:hover{border-color:rgba(52,210,208,.48)}
    .news-thumb{width:74px;height:52px;border-radius:9px;object-fit:cover;background:#14233a;border:1px solid rgba(255,255,255,.12)}
    .news-title{font-size:12.5px;line-height:1.42;font-weight:900;color:#eef5ff}
    .news-empty{font-size:12px;color:var(--muted);line-height:1.6;padding:12px;border:1px dashed rgba(205,220,245,.22);border-radius:12px;background:rgba(13,23,40,.72)}

    .ko-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .ko-head h2{margin:0;font-size:20px}
    .ko-viewbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 0 8px}
    .ko-nav-btn{appearance:none;width:38px;height:38px;border:1px solid rgba(205,220,245,.24);border-radius:999px;background:#111c30;color:#eef5ff;font-size:24px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.22)}
    .ko-nav-btn:disabled{opacity:.35;cursor:not-allowed}
    .ko-view-spacer{flex:1;min-width:0}
    .ko-board-wrap{overflow:hidden;padding:8px 2px 12px}
    .ko-stage{position:relative;width:100%;overflow:hidden;border-radius:16px;background:linear-gradient(180deg,rgba(7,17,31,.22),rgba(5,9,19,.08))}
    .ko-board{position:relative;width:100%;min-width:0;height:1200px;border-radius:16px;background:linear-gradient(180deg,rgba(7,17,31,.22),rgba(5,9,19,.08));overflow:hidden;will-change:transform,opacity}
    .ko-stage .ko-board{position:absolute;left:0;top:0;background:transparent}
    .ko-stage .ko-board.ko-static{position:relative}
    .ko-board.ko-current{z-index:2}
    .ko-board.ko-prev{z-index:1}
    .ko-board.ko-slide-in-next{animation:koSlideInNext 1.18s cubic-bezier(.16,.88,.20,1) both}
    .ko-board.ko-slide-in-prev{animation:koSlideInPrev 1.18s cubic-bezier(.16,.88,.20,1) both}
    .ko-board.ko-slide-out-next{animation:koSlideOutNext 1.18s cubic-bezier(.16,.88,.20,1) both}
    .ko-board.ko-slide-out-prev{animation:koSlideOutPrev 1.18s cubic-bezier(.16,.88,.20,1) both}

  const semi=[(block[0]+block[1])/2,(block[2]+block[3])/2];
  const final=(semi[0]+semi[1])/2;

  const line=(x1,x2,y)=>p.push(`<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}"/>`);

  const pos={};
  const xForGlobalCol=(col)=>xCols[visibleCols.indexOf(col)];
  const stepForCount=(count)=>count>=8?112:(count>=4?116:148);

  const firstCol=visibleCols[0];
  const firstOrder=orders[firstCol]||[];
  const firstStep=stepForCount(firstOrder.length);

      const m=koMatchByNo(no);

      if(deps.length){

function scoreText(score,pens){
  if(score===undefined||score===null||score==='')return '';
  return `${score}${pens!==undefined&&pens!==null&&pens!==''?` (${pens})`:''}`;
}
function isKoWinner(result,side){
  if(result.winner===side)return true;
  const hs=Number(result.hs),as=Number(result.as);
  if(Number.isNaN(hs)||Number.isNaN(as))return false;
  if(side==='home'&&hs>as)return true;
  if(side==='away'&&as>hs)return true;
  const hp=Number(result.homePens),ap=Number(result.awayPens);
  if(!Number.isNaN(hp)&&!Number.isNaN(ap))return side==='home'?hp>ap:ap>hp;
  return false;
}
function koTeamHTML(side,score,winner){
  const main=side.type==='team'?`${teamFlag(side.id)}<span>${esc(T[side.id]?.[0]||side.id)}</span>`:`<span class="ko-placeholder">${esc(side.label||'未定')}</span>`;
  return `<div class="ko-team ${winner?'winner':''}"><span class="ko-team-main">${main}</span>${score?`<span class="ko-score">${esc(score)}</span>`:''}</div>`;
}
function resolveKoSide(token){
  const t=String(token||'');
  if(T[t])return {type:'team',id:t};
  const g=t.match(/^([A-L])([12])$/);
  if(g){
    const team=confirmedTeamByGroupRank(g[1],Number(g[2]));
    if(team)return {type:'team',id:team};
    return {type:'label',label:`${g[1]}組${g[2]}位`};
  }
  const third=t.match(/^3([A-L]+)$/);
  if(third)return {type:'label',label:`3位（${third[1].split('').join('/')}）`};
  const win=t.match(/^W(\d+)$/);
  if(win){
    const winner=winnerOfMatch(Number(win[1]));
    if(winner)return {type:'team',id:winner};
    return {type:'label',label:'未定'};
  }
  const lose=t.match(/^L(\d+)$/);
  if(lose){
    const loser=loserOfMatch(Number(lose[1]));
    if(loser)return {type:'team',id:loser};
    return {type:'label',label:'未定'};
  }
  return {type:'label',label:t||'未定'};
}

function confirmedTeamByGroupRank(g,rank){
  const byTag=BRACKET_CONFIRMED_BY_TAG[`${g}${rank}`];
  if(byTag)return byTag;
  const rows=state.groups?.[g]||[];
  if(groupRowsComplete(g)){
    const row=rows.find(r=>Number(r.rank)===rank)||rows[rank-1];
    if(row&&row.team)return row.team;
  }
  const slot=allBracketSlots().find(s=>String(s.tag||'')===`${g}${rank}`&&(s.fixed||s.confirmed)&&(s.sel||[]).length===1);
  return slot?slot.sel[0]:'';
}
function winnerOfMatch(no){
  const m=KNOCKOUT_MATCHES.find(x=>Number(x.no)===Number(no));
  if(!m)return '';
  const r=getKoResult(m);
  if(!r.completed)return '';
  if(isKoWinner(r,'home'))return r.home||resolveKoSide(m.a).id||'';
  if(isKoWinner(r,'away'))return r.away||resolveKoSide(m.b).id||'';
  return '';
}
function loserOfMatch(no){
  const m=KNOCKOUT_MATCHES.find(x=>Number(x.no)===Number(no));
  if(!m)return '';
  const r=getKoResult(m);
  if(!r.completed)return '';
  if(isKoWinner(r,'home'))return r.away||resolveKoSide(m.b).id||'';
  if(isKoWinner(r,'away'))return r.home||resolveKoSide(m.a).id||'';
  return '';
}

async function fetchKnockoutResults(){
  const ids=new Set(KNOCKOUT_MATCHES.map(m=>String(m.id||''))); 
  const payloads=await Promise.all(KNOCKOUT_ESPN_DATES.map(d=>fetch(`${ESPN_SCOREBOARD}?dates=${d}&limit=100`).then(r=>r.ok?r.json():{events:[]}).catch(()=>({events:[]}))));
  const out={};
  payloads.flatMap(p=>p.events||[]).forEach(ev=>{
    const eid=String(ev.id||'');
    if(!ids.has(eid))return;
    const comp=(ev.competitions||[])[0]||{};
    const cs=comp.competitors||[];
    if(cs.length<2)return;
    const home=cs.find(c=>c.homeAway==='home')||cs[0];
    const away=cs.find(c=>c.homeAway==='away')||cs[1];
    const hId=resolveTeamFromESPN(home.team||home);
    const aId=resolveTeamFromESPN(away.team||away);
    const st=(ev.status||{}).type||{};
    const rec={completed:!!st.completed,live:!!st.inProgress,home:hId,away:aId,hs:home.score,as:away.score};
    if(home.winner)rec.winner='home';
    if(away.winner)rec.winner='away';
    const hp=home.curatedRank?.current||home.penaltyScore||home.shootoutScore;
    const ap=away.curatedRank?.current||away.penaltyScore||away.shootoutScore;
    if(hp!==undefined&&ap!==undefined){rec.homePens=hp;rec.awayPens=ap;}
    out[eid]=rec;
  });
  return out;
}

function toggleConfirm(id){
  const s=findSlot(id);if(!s||s.fixed)return;
  if(!s.sel.length){alert('先に国を選択してください。');return;}
  s.confirmed=!s.confirmed;
  if(s.confirmed)removeConfirmedFromOthers(s);

}
function removeConfirmedFromOthers(source){
  const ids=new Set(source.sel||[]);
  for(const side of ['left','right'])for(const m of state.bracket[side])for(const s of m){
    if(s===source||s.fixed)continue;
    const before=(s.sel||[]).length;
    s.sel=(s.sel||[]).filter(id=>!ids.has(id));
    if(before && !s.sel.length)s.confirmed=false;
  }
}
function resolveTeamFromESPN(team){
  const abbr=(team?.abbreviation||team?.team?.abbreviation||'').toUpperCase();
  if(ESPN_MAP[abbr])return ESPN_MAP[abbr];
  const name=String(team?.displayName||team?.shortDisplayName||team?.name||team?.team?.displayName||team?.team?.shortDisplayName||'').toLowerCase().replace(/[’']/g,'').trim();
  return NAME_MAP[name]||'';
}
function blankStats(){
  const obj={};
  Object.entries(G).forEach(([g,ids])=>{
    ids.forEach(id=>obj[id]={team:id,w:0,d:0,l:0,gf:0,ga:0,pts:0,group:g});
  });
  return obj;
}
function standingsFromStats(stats){
  const out={};
  GROUPS.forEach(g=>{
    out[g]=(G[g]||[]).map(id=>stats[id]).filter(Boolean).sort((a,b)=>
      b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf || T[a.team][0].localeCompare(T[b.team][0],'ja')
    ).map((r,i)=>Object.assign({},r,{rank:i+1}));
  });
  return out;
}

function allBracketSlots(){return ['left','right'].flatMap(side=>(state.bracket?.[side]||[]).flatMap(m=>m||[]));}
function groupRowsComplete(g){
  const rows=state.groups?.[g]||[];
  return rows.length===4&&rows.every(r=>(Number(r.w||0)+Number(r.d||0)+Number(r.l||0))>=3);
}
function setBracketSlotConfirmed(slot,team,locked){
  if(!slot||!team)return false;
  slot.sel=[team];
  slot.confirmed=true;
  slot.fixed=true;
  slot.autoLocked=true;
  if(locked)locked.add(team);
  return true;
}
function applyConfirmedBracketSlots(){
  const slots=allBracketSlots();
  const applied=[];
  const locked=new Set();

  // 公式・手元データ上ですでに進出枠が確定しているものは、保存済み入力より優先して固定します。
  slots.forEach(s=>{
    const team=BRACKET_CONFIRMED_BY_TAG[String(s.tag||'')];
    if(team&&setBracketSlotConfirmed(s,team,locked))applied.push(s);
  });

  // グループ全試合が完了した枠は、順位表から1位/2位を自動反映します。
  slots.forEach(s=>{
    if(applied.includes(s))return;
    const m=String(s.tag||'').match(/^([A-L])([12])$/);
    if(!m)return;
    const g=m[1], rank=Number(m[2]);
    const rows=state.groups?.[g]||[];
    if(!groupRowsComplete(g))return;
    const row=rows.find(r=>Number(r.rank)===rank)||rows[rank-1];
    if(row&&row.team&&setBracketSlotConfirmed(s,row.team,locked))applied.push(s);
  });

  // 確定済みチームが他の未確定枠に残っていた場合だけ除外します。
  // 未確定枠のユーザー入力そのものは残します。
  slots.forEach(s=>{
    if(applied.includes(s)||s.fixed)return;
    const before=(s.sel||[]).length;
    s.sel=(s.sel||[]).filter(id=>!locked.has(id));
    if(before&&!s.sel.length)s.confirmed=false;
  });
  return applied.length;
}
async function fetchLatestStandings(){
  const payloads=await Promise.all(ESPN_DATES.map(d=>fetch(`${ESPN_SCOREBOARD}?dates=${d}&limit=100`).then(r=>r.ok?r.json():{events:[]})));
  const stats=blankStats();
  let count=0;
  payloads.flatMap(p=>p.events||[]).forEach(ev=>{
    const comp=(ev.competitions||[])[0]||{};
    const st=(ev.status||{}).type||{};
    if(!st.completed)return;
    const cs=comp.competitors||[];
    if(cs.length<2)return;
    const a=cs[0],b=cs[1];
    const idA=resolveTeamFromESPN(a.team||a),idB=resolveTeamFromESPN(b.team||b);
    if(!idA||!idB||!stats[idA]||!stats[idB])return;
    if(TEAM_TO_GROUP[idA]!==TEAM_TO_GROUP[idB])return;
    const scoreA=Number(a.score),scoreB=Number(b.score);
    if(Number.isNaN(scoreA)||Number.isNaN(scoreB))return;
    stats[idA].gf+=scoreA;stats[idA].ga+=scoreB;
    stats[idB].gf+=scoreB;stats[idB].ga+=scoreA;
    if(scoreA>scoreB){stats[idA].w++;stats[idB].l++;stats[idA].pts+=3}
    else if(scoreA<scoreB){stats[idB].w++;stats[idA].l++;stats[idB].pts+=3}
    else{stats[idA].d++;stats[idB].d++;stats[idA].pts++;stats[idB].pts++}
    count++;
  });
  if(count===0)throw new Error('no matches');
  return {groups:standingsFromStats(stats),count};
}

function normalizeScorers(scorers,m){

  const m=s.match(/^(.*?)(?:\s+)(前半|後半|延前|延後|前|後)\s*([0-9]+(?:\+[0-9]+)?(?:['′分])?)?$/);

async function findYahooMatchUrl(m){

      if(id){

    const id=(block.match(/\/game\/(\d+)/)||[])[1]||(block.match(/game\/(\d+)/)||[])[1];

function readerPlainLines(text){

      .replace(/!\[[^\]]*\]\([^)]*\)/g,'')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'$1')

}
function cleanYahooScorer(line){
  const items=expandYahooScorerLine(line);
  return items[0]||'';
}
function expandYahooScorerLine(line){
  let s=String(line||'')
    .replace(/^[-・\s]+/,'')
    .replace(/\b\d+\s*-\s*\d+\b/g,'')
    .replace(/\s+/g,' ')
    .trim();
  if(!s||/試合|順位|動画|戦評|フォーメーション|スタッツ|テキスト速報|ハイライト|FIFAランキング|マン・オブ・ザ・マッチ/.test(s))return [];
  s=s.replace(/(前半|後半)\s*(\d{1,3})分/g,(m,h,n)=>`${h==='前半'?'前':'後'} ${n}'`);
  const firstHalf=s.search(/(?:^|\s)(前|後)\s*\d{1,3}'/);
  if(firstHalf<0)return [];
  const name=s.slice(0,firstHalf).trim()||'得点';
  const times=s.slice(firstHalf).trim();
  const out=[];
  let currentHalf='';
  const re=/(前|後)?\s*(\d{1,3})'\s*(\(PK\))?/g;
  let match;
  while((match=re.exec(times))){
    if(match[1])currentHalf=match[1];
    if(!currentHalf)continue;
    out.push(`${name} ${currentHalf} ${match[2]}'${match[3]||''}`);
  }
  return out;
}
function parseYahooSummaryScorers(text,m){
  const out={home:[],away:[]};
  const lines=readerPlainLines(text);
  const startIdx=lines.findIndex(l=>l==='試合終了');
  const endIdx=lines.findIndex((l,i)=>i>(startIdx>=0?startIdx:0)&&/試合／無料|最新確定値|試合情報|マン・オブ・ザ・マッチ|## 動画/.test(l));
  const scope=lines.slice(startIdx>=0?startIdx:0,endIdx>0?endIdx:Math.min(lines.length,180));
  const groups=[];
  let current=[];
  scope.forEach(l=>{
    const scorers=expandYahooScorerLine(l);
    if(scorers.length){current.push(...scorers);return;}
    if(current.length){groups.push(current);current=[];}
  });
  if(current.length)groups.push(current);
  const hs=Number(m.hs)||0, as=Number(m.as)||0;
  if(groups.length>=2){
    out.home=groups[0].slice(0,hs||groups[0].length);
    out.away=groups[1].slice(0,as||groups[1].length);
  }else if(groups.length===1){
    if(hs>0&&as===0)out.home=groups[0];

}
function parseScorersFromText(text,m){

function teamIdFromText(text){

function parseMatchSummary(data,m){

    if(id===m.home)hs=Number(c.score);

function extractScorers(data,m){

  pushArray(data.scoringPlays);
  pushArray(data.competitions?.[0]?.details);
  pushArray(data.header?.competitions?.[0]?.details);
  pushArray(data.details);
  pushArray(data.plays);
  pushArray(data.commentary);
  pushArray(data.gameInfo?.scoringPlays);
  collectGoalLikeObjects(data,candidates,new Set(),0);
  const out={home:[],away:[]};
  candidates.forEach(item=>{
    if(!isGoalEvent(item))return;
    const minute=goalMinute(item);

    const rawText=String(item.text||item.displayText||item.shortText||item.commentary||item.description||'').replace(/\s+/g,' ').trim();
    let label=formatScorerLabel(athlete||rawText||'得点',minute);
    if(/penalty|ペナルティ|PK/i.test(rawText)&&!/shootout|PK戦/i.test(rawText))label=addPenaltyPrefixToScorerLabel(label);
    if(team===m.home && !out.home.includes(label))out.home.push(label);

function collectGoalLikeObjects(obj,out,seen,depth){
  if(!obj||typeof obj!=='object'||depth>5||seen.has(obj))return;

  if(isGoalEvent(obj))out.push(obj);
  Object.keys(obj).forEach(k=>{
    const v=obj[k];
    if(Array.isArray(v))v.forEach(x=>collectGoalLikeObjects(x,out,seen,depth+1));
    else if(v&&typeof v==='object')collectGoalLikeObjects(v,out,seen,depth+1);
  });
}
function isGoalEvent(item){
  if(!item||typeof item!=='object')return false;
  const rawType=String(item.type?.text||item.type?.displayName||item.type?.name||item.type||item.scoringType||'');
  const rawText=String(item.text||item.displayText||item.shortText||item.commentary||item.description||item.summary||rawType||'');
  const all=(rawType+' '+rawText).toLowerCase();
  if(!/(^|\b)goal\b|ゴール/.test(all))return false;
  if(/penalty shootout|shootout|missed|saved|post|woodwork|offside|var overturned|ruled out|disallowed|substitution|yellow card|red card/.test(all))return false;
  return true;
}
function goalMinute(item){

  if(v==null)return '';

function goalAthlete(item){

  for(const arr of pools){

function absolutizeNewsImageUrl(src,base){
  let u=decodeHtml(String(src||'')).trim().replace(/^['\"]|['\"]$/g,'');
  if(!u||/^data:/i.test(u))return '';
  if(u.startsWith('//'))u='https:'+u;
  try{return new URL(u,base||location.href).href}catch(e){return ''}
}
function parseArticleImageFromText(text,baseUrl){
  const raw=String(text||'');
  const pick=src=>{
    const u=absolutizeNewsImageUrl(src,baseUrl);
    return isHttpNewsImage(u)?u:'';
  };
  try{
    if(/<\s*(html|head|body|meta|img)\b/i.test(raw)){
      const doc=new DOMParser().parseFromString(raw,'text/html');
      const selectors=[
        'meta[property="og:image"]','meta[property="og:image:url"]','meta[property="og:image:secure_url"]',
        'meta[name="twitter:image"]','meta[name="twitter:image:src"]','link[rel="image_src"]'
      ];
      for(const sel of selectors){
        const el=doc.querySelector(sel);
        const val=el&&(el.getAttribute('content')||el.getAttribute('href'));
        const u=pick(val);
        if(u)return u;
      }
      const imgs=Array.from(doc.querySelectorAll('img'));
      for(const img of imgs){
        const val=img.getAttribute('src')||img.getAttribute('data-src')||img.getAttribute('data-original')||img.getAttribute('data-lazy-src')||img.getAttribute('data-srcset')||img.getAttribute('srcset')||'';
        const first=String(val).split(',')[0].trim().split(/\s+/)[0];
        const u=pick(first);
        if(u)return u;
      }
    }
  }catch(e){}
  const md=raw.match(/!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/i);
  if(md){const u=pick(md[1]);if(u)return u;}
  const direct=raw.match(/https?:\/\/[^\s\)\]"'<>]+\.(?:jpg|jpeg|png|webp|avif)(?:\?[^\s\)\]"'<>]*)?/i);
  if(direct){const u=pick(direct[0]);if(u)return u;}
  return '';
}
function promiseWithSoftTimeout(promise,ms){
  return new Promise(resolve=>{
    let done=false;
    const timer=setTimeout(()=>{if(!done){done=true;resolve('')}},ms);
    Promise.resolve(promise).then(v=>{if(!done){done=true;clearTimeout(timer);resolve(v||'')}}).catch(()=>{if(!done){done=true;clearTimeout(timer);resolve('')}});
  });
}
function firstTruthy(promises){
  return new Promise(resolve=>{
    let left=promises.length;
    if(!left)return resolve('');
    promises.forEach(p=>Promise.resolve(p).then(v=>{
      if(v){resolve(v);left=-999;return;}
      left--; if(left===0)resolve('');
    }).catch(()=>{left--; if(left===0)resolve('')}));
  });
}

  const combined=[];

function normalizeGoogleNewsMaybeRelativeUrl(url){
  const raw=String(url||'').trim();
  if(!raw)return '';
  if(/^https?:\/\//i.test(raw))return raw;
  if(raw.startsWith('//'))return 'https:'+raw;
  if(raw.startsWith('/'))return 'https://news.google.com'+raw;

function cleanRssText(text){
  let raw=String(text||'').trim();
  if(!raw)return '';
  // AllOriginsやReader経由でXMLがHTMLエスケープされる場合があるため、RSSらしい文字列に戻します。
  if(raw.includes('&lt;item')||raw.includes('&lt;rss')||raw.includes('&lt;channel'))raw=decodeHtml(raw);
  raw=raw.replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g,'$1');
  return raw;
}
function parseGoogleNewsRssRegex(text){
  const raw=cleanRssText(text);
  if(!raw||!/<item[\s>]/i.test(raw))return [];
  const out=[];
  const itemRe=/<item[\s\S]*?<\/item>/gi;
  const tag=(block,name)=>{
    const m=block.match(new RegExp('<'+name+'(?:\s[^>]*)?>([\s\S]*?)<\/'+name+'>','i'));
    return m?decodeHtml(m[1].replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()):'';
  };
  let m;
  while((m=itemRe.exec(raw))){
    const block=m[0];
    const title=tag(block,'title');
    const link=normalizeNewsUrl(normalizeGoogleNewsMaybeRelativeUrl(tag(block,'link')));
    const pubDate=tag(block,'pubDate');
    const source=tag(block,'source');
    const desc=tag(block,'description');
    const imgMatch=block.match(/<(?:media:content|media:thumbnail)[^>]+url=["']([^"']+)["']/i)||desc.match(/<img[^>]+src=["']([^"']+)["']/i);
    const image=imgMatch?absolutizeNewsImageUrl(imgMatch[1],link):'';
    if(title&&link)out.push({title,url:link,image:isHttpNewsImage(image)?image:'',seen:pubDate,domain:source||'Google News'});
  }
  return out;
}
function parseGoogleNewsRssXml(text){
  const raw=cleanRssText(text);
  if(!raw||!/[<]item[\s>]/i.test(raw))return [];
  try{
    const doc=new DOMParser().parseFromString(raw,'text/xml');
    if(doc.querySelector('parsererror'))return parseGoogleNewsRssRegex(raw);
    const parsed=Array.from(doc.querySelectorAll('item')).map(item=>{
      const get=tag=>item.getElementsByTagName(tag)[0]?.textContent?.trim()||'';
      const desc=get('description');
      const imgNode=item.getElementsByTagName('media:content')[0]||item.getElementsByTagName('media:thumbnail')[0];
      const img=imgNode?.getAttribute('url')||((desc.match(/<img[^>]+src=["']([^"']+)["']/i)||[])[1])||'';
      const link=normalizeNewsUrl(normalizeGoogleNewsMaybeRelativeUrl(get('link')));
      const image=absolutizeNewsImageUrl(img,link);
      return {title:decodeHtml(get('title')),url:link,image:isHttpNewsImage(image)?image:'',seen:get('pubDate'),domain:get('source')||'Google News'};
    }).filter(a=>a.title&&a.url);
    return parsed.length?parsed:parseGoogleNewsRssRegex(raw);
  }catch(e){return parseGoogleNewsRssRegex(raw)}
}
function parseGoogleNewsReaderText(text){
  const out=[];
  const seen=new Set();
  const lines=String(text||'').replace(/\r/g,'').split('\n');
  const linkRe=/\[([^\]]{8,220})\]\(((?:https?:\/\/|\/)[^)]+)\)/g;
  lines.forEach(line=>{
    let m;
    while((m=linkRe.exec(line))){
      const title=stripMarkdownLinks(m[1]).replace(/\s+-\s+Google ニュース$/,'').trim();
      const url=normalizeNewsUrl(m[2].trim());
      if(!title||!url||seen.has(url))continue;
      if(/^(画像|動画|Google|ニュース|詳細|その他)$/.test(title))continue;
      seen.add(url);
      out.push({title,url,image:'',seen:'',domain:'Google News'});
    }
  });
  return out;
}
function parseMarkdownNewsLinks(text,domain){
  const out=[];
  const seen=new Set();
  const raw=String(text||'').replace(/\r/g,'');
  const linkRe=/\[([^\]]{8,240})\]\(((?:https?:\/\/|\/)[^)]+)\)/g;
  let m;
  while((m=linkRe.exec(raw))){
    let title=cleanNewsTitle(stripMarkdownLinks(m[1]).trim());
    let url=normalizeNewsArticleUrl(m[2].trim());
    if(!url)url=normalizeNewsArticleUrl(normalizeGoogleNewsMaybeRelativeUrl(m[2].trim()));
    if(!title||!url||seen.has(url))continue;
    if(!isUsableNewsTitle(title))continue;
    if(/^(画像|動画|写真|一覧|もっと見る|続きを読む|Google|ニュース|詳細|その他|ログイン)$/.test(title))continue;
    seen.add(url);
    out.push({title,url,image:'',seen:'',domain:domain||''});
    if(out.length>=30)break;
  }
  return out;
}
async function fetchGoogleNewsSearchReaderItems(target){
  const out=[];
  for(const q of buildGoogleNewsQueries(target)){
    const url=`https://news.google.com/search?q=${encodeURIComponent(q)}&hl=ja&gl=JP&ceid=JP:ja`;
    try{
      const txt=await fetchReaderText(url);
      out.push(...parseMarkdownNewsLinks(txt,'Google News'));
      if(dedupeNews(out).length>=20)break;
    }catch(e){console.warn('Google News search reader failed',q,e)}
  }
  return out;
}
async function fetchYahooNewsSearchReaderItems(target){
  const out=[];
  for(const q of buildGoogleNewsQueries(target)){
    const url=`https://news.yahoo.co.jp/search?p=${encodeURIComponent(q)}`;
    try{
      const txt=await fetchReaderText(url);
      out.push(...parseMarkdownNewsLinks(txt,'Yahoo!ニュース'));
      if(dedupeNews(out).length>=20)break;
    }catch(e){console.warn('Yahoo news search reader failed',q,e)}
  }
  return out;
}
function normalizeNewsTitle(t){
  return String(t||'')
    .toLowerCase()
    .replace(/https?:\/\/\S+/g,'')
    .replace(/[\[\]【】「」『』（）()<>〈〉《》]/g,' ')
    .replace(/(fifa|world cup|ワールドカップ|w杯|2026|北米中|サッカー|football|soccer)/g,' ')
    .replace(/[\s\-–—_.,，。:：;；!！?？/／|｜]+/g,'')
    .trim();
}
function bigramSet(str){
  const s=normalizeNewsTitle(str);
  if(!s)return new Set();
  if(s.length<2)return new Set([s]);
  const out=new Set();
  for(let i=0;i<s.length-1;i++)out.add(s.slice(i,i+2));
  return out;
}
function titleSimilarity(a,b){
  const A=bigramSet(a),B=bigramSet(b);
  if(!A.size||!B.size)return 0;
  let inter=0;
  A.forEach(x=>{if(B.has(x))inter++});
  return inter/(A.size+B.size-inter);
}
function isSimilarNews(a,b){
  const na=normalizeNewsTitle(a.title),nb=normalizeNewsTitle(b.title);
  if(!na||!nb)return false;
  if(a.url&&b.url&&a.url===b.url)return true;
  if(na===nb)return true;
  const shorter=na.length<nb.length?na:nb;
  const longer=na.length<nb.length?nb:na;
  if(shorter.length>=10&&longer.includes(shorter))return true;
  return titleSimilarity(na,nb)>=0.72;
}
function dedupeNews(items){
  const out=[];
  for(const item of items){
    if(!item.title||!item.url)continue;
    const clean=Object.assign({},item);
    clean.title=decodeHtml(stripMarkdownLinks(clean.title)).replace(/\s+-\s+[^-]{2,30}$/,'').trim()||clean.title;
    if(!hasJapaneseText(clean.title))continue;
    clean.url=normalizeNewsUrl(clean.url);
    if(!clean.url)continue;
    clean.image=isHttpNewsImage(clean.image)?clean.image:'';
    if(out.some(x=>isSimilarNews(clean,x)))continue;
    out.push(clean);
    if(out.length>=20)break;
  }
  return out;
}

async function updatePlayerStats(kind){
  state.statStatus=state.statStatus||{};
  state.statStatus[kind]='更新中・・・';
  save();render();
  const result=await fetchPlayerStats(kind);
  if(result.rows.length){
    state[kind]=result.rows.slice(0,20).map((r,i)=>({rank:r.rank||i+1,value:r.value,player:r.player,team:r.team||''}));
    state.statStatus[kind]='更新済';
  }else{
    const fb=fallbackStatRows(kind);
    if(fb.length)state[kind]=fb;
    state.statStatus[kind]='更新済';
  }
  save();render();
}
async function fetchPlayerStats(kind){
  const sources=STAT_SOURCES[kind]||[];
  let last='';
  for(const src of sources){
    try{
      const txt=await fetchReaderText(src.url);
      const rows=src.parser==='soccerking'?parseSoccerKingStatsText(txt,kind):src.parser==='yahoo'?parseYahooStatsText(txt,kind):parseStatsText(txt,kind);
      if(rows.length)return {source:src.name,rows};
      last=src.name+' は取得できましたが、表を解析できませんでした。';
    }catch(e){last=src.name+' 取得失敗';}
  }
  return {rows:[],message:last};
}
function stripMarkdownLinks(line){
  return String(line||'')
    .replace(/!\[[^\]]*\]\([^)]*\)/g,'')
    .replace(/\[([^\]]+)\]\([^)]*\)/g,'$1')
    .replace(/https?:\/\/\S+/g,'')
    .replace(/\s+/g,' ')
    .trim();
}
function parseSoccerKingStats(text,kind){
  if(kind!=='goals')return [];
  const lines=String(text||'').replace(/\r/g,'').split('\n').map(stripMarkdownLinks).filter(Boolean);
  const start=Math.max(0,lines.findIndex(l=>/FIFAワールドカップ\s*2026\s*得点ランキング|得点ランキング/.test(l)));
  const scope=lines.slice(start,start+120);
  const rows=[];
  const seen=new Set();
  for(let i=0;i<scope.length-1;i++){
    const line=scope[i].replace(/^[-*]\s*/,'').trim();
    const rank=line.match(/^(\d{1,2})[\.\)]?\s+(.+)$/);
    if(!rank)continue;
    const player=cleanPlayerName(rank[2]);
    if(!player||/順位|選手|得点|ランキング|INDEX|ワールドカップ/.test(player))continue;
    for(let j=i+1;j<Math.min(scope.length,i+4);j++){
      const stat=scope[j].replace(/^[-*]\s*/,'').trim();
      // 例：アルゼンチン 5 0 170′ / 日本 2 1 168'
      const m=stat.match(/^(.+?)\s+(\d{1,2})\s+(\d{1,2})\s+\d{1,4}\s*[′'’]?$/);
      if(!m)continue;
      const team=teamIdFromText(m[1]);
      const value=Number(m[2]);
      if(!team||!value)continue;
      const key=player+'|'+team+'|'+value;
      if(!seen.has(key)){seen.add(key);rows.push({player,team,value})}
      break;
    }
    if(rows.length>=20)break;
  }
  return rows.sort((a,b)=>Number(b.value)-Number(a.value));
}
function cleanPlayerName(name){
  return String(name||'')
    .replace(/^[\d\s\.\)]+/,'')
    .replace(/[#*`]/g,'')
    .replace(/\[[^\]]+\]/g,'')
    .replace(/^[：:・\-–—\s]+/,'')
    .replace(/\s+/g,' ')
    .trim();
}

function normalizeArticleLine(line){
  return String(line||'')
    .replace(/^L\d+:\s*/,'')
    .replace(/cite\d+†([^]+)/g,'$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
    .replace(/[*`#]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}
function cleanPlayerName(name){
  return normalizeArticleLine(name)
    .replace(/^[-–—・\s]+/,'')
    .replace(/\s*\|.*$/,'')
    .replace(/\s+/g,' ')
    .trim();
}
function parseSoccerKingStatsText(text,kind){
  const lines=String(text||'').replace(/\r/g,'').split(/\n+/).map(normalizeArticleLine).filter(Boolean);
  const start=Math.max(0,lines.findIndex(l=>/FIFAワールドカップ\s*2026\s*得点ランキング|順位\s*選手／国\s*得点|得点ランキング/.test(l)));
  let end=lines.findIndex((l,i)=>i>start&&/ワールドカップ2026得点王争い|得点ランキングの順位決定方法|日本代表（SAMURAI BLUE）の得点記録/.test(l));
  if(end<0)end=start+140;
  const scopeLines=lines.slice(start,end);
  const rows=[];
  const seen=new Set();
  const teamNames=Object.values(T).map(v=>v[0]).sort((a,b)=>b.length-a.length).map(escapeRegExp).join('|');

  const section=scopeLines.join(' ').replace(/\s+/g,' ');
  const re=new RegExp("(\\d{1,2})\\s+(.+?)\\s+("+teamNames+")\\s+(\\d{1,2})\\s+(\\d{1,2})\\s+\\d{1,4}\\s*[′'’]","g");
  let m;
  while((m=re.exec(section))&&rows.length<20){
    const rank=Number(m[1]);
    const player=cleanPlayerName(m[2]);
    const teamName=m[3];
    const goals=Number(m[4]);
    const assists=Number(m[5]);
    const value=kind==='goals'?goals:assists;
    const team=teamIdFromText(teamName);
    if(!player||/順位|選手|得点|アシスト|時間|INDEX|ランキング|FIFA|ワールドカップ/.test(player))continue;
    if(!Number.isFinite(value)||value<=0)continue;
    const key=rank+'|'+player+'|'+teamName+'|'+value;
    if(!seen.has(key)){seen.add(key);rows.push({rank,value,player,team})}
  }

  if(!rows.length){
    for(let i=0;i<scopeLines.length-1;i++){
      const a=scopeLines[i], b=scopeLines[i+1];
      const m1=a.match(/^(\d{1,2})\s+(.+?)$/);
      const m2=b.match(/^(.+?)\s+(\d{1,2})\s+(\d{1,2})\s+\d{1,4}\s*[′'’]?\s*$/);
      if(!m1||!m2)continue;
      const rank=Number(m1[1]);
      const player=cleanPlayerName(m1[2]);
      const team=teamIdFromText(m2[1]);
      const goals=Number(m2[2]);
      const assists=Number(m2[3]);
      const value=kind==='goals'?goals:assists;
      if(player&&team&&value>0)rows.push({rank,value,player,team});
    }
  }

  return rows.sort((a,b)=>Number(b.value)-Number(a.value)||Number(a.rank)-Number(b.rank));
}

function parseYahooStatsText(text,kind){
  const lines=String(text||'').replace(/\r/g,'').split(/\n+/).map(normalizeArticleLine).filter(Boolean);
  const start=Math.max(0,lines.findIndex(l=>/順位\s*選手名\s*チーム名\s*Pos\.|個人成績|アシスト/.test(l)));
  const scope=lines.slice(start,start+180);
  const rows=[];
  const seen=new Set();
  const teamNames=Object.values(T).map(v=>v[0]).concat(['DRコンゴ']).sort((a,b)=>b.length-a.length).map(escapeRegExp).join('|');
  const pos='(?:GK|DF|MF|FW)';
  const re=new RegExp('^(\\d{1,2})\\s+(.+?)\\s+('+teamNames+')\\s+'+pos+'\\s+(\\d{1,2})\\s+(\\d{1,2})\\s+(\\d{1,2})\\s+', 'i');

  for(const raw of scope){
    const line=raw.replace(/cite\\d+†([^]+)/g,'$1').replace(/\s+/g,' ').trim();
    const m=line.match(re);
    if(!m)continue;
    const rank=Number(m[1]);
    const player=cleanPlayerName(m[2]);
    const teamName=m[3];
    const goals=Number(m[4]);
    const assists=Number(m[6]);
    const value=kind==='goals'?goals:assists;
    const team=teamName==='DRコンゴ'?'cd':teamIdFromText(teamName);
    if(!player||!Number.isFinite(value)||value<=0)continue;
    const key=player+'|'+team+'|'+value;
    if(!seen.has(key)){
      seen.add(key);
      rows.push({rank,value,player,team});
    }
    if(rows.length>=20)break;
  }
  return rows.sort((a,b)=>Number(b.value)-Number(a.value)||Number(a.rank)-Number(b.rank));
}

function parseStatsText(text,kind){
  const cleaned=String(text||'').replace(/\r/g,'');
  if(/No Data Available/i.test(cleaned))return [];
  const lines=cleaned.split('\n').map(x=>x.replace(/[*`]/g,'').replace(/\s+/g,' ').trim()).filter(Boolean);
  const rows=[];
  const seen=new Set();
  const want=kind==='goals'?/(goal|得点|scorer)/i:/(assist|アシスト)/i;
  const start=Math.max(0,lines.findIndex(l=>want.test(l))-5);
  const scope=lines.slice(start,start+220);
  for(const line of scope){
    const parsed=parseStatsLine(line,kind);
    if(parsed&&parsed.player&&Number(parsed.value)>0){
      const key=parsed.player+'|'+parsed.value+'|'+parsed.team;
      if(!seen.has(key)){seen.add(key);rows.push(parsed)}
    }
    if(rows.length>=20)break;
  }
  return rows.sort((a,b)=>Number(b.value)-Number(a.value));
}
function parseStatsLine(line,kind){
  const cells=line.includes('|')?line.split('|').map(x=>x.trim()).filter(Boolean):null;
  if(cells&&cells.length>=3){
    const nums=cells.map((c,i)=>({i,n:Number(c)})).filter(x=>Number.isFinite(x.n));
    const stat=nums.filter(x=>x.n>=0&&x.n<30).pop();
    if(!stat)return null;
    const value=stat.n;
    const teamCell=cells.find(c=>teamIdFromText(c));
    const team=teamIdFromText(teamCell||'');
    const player=cells.find((c,i)=>i!==stat.i&&c!==teamCell&&!/^\d+$/.test(c)&&!/rank|name|team|club|player|goals?|assists?|得点|アシスト/i.test(c));
    if(player)return {player:player.replace(/\[[^\]]+\]/g,'').trim(),team,value};
  }
  const m=line.match(/^(?:#?\s*)?(\d{1,2})[\.\)]?\s+(.+?)\s+(\d{1,2})$/);
  if(m){
    let body=m[2].trim();
    const value=Number(m[3]);
    const team=teamIdFromText(body);
    for(const [id,v] of Object.entries(T))body=body.replace(new RegExp(v[0],'gi'),'');
    Object.keys(NAME_MAP).forEach(n=>{body=body.replace(new RegExp(n,'gi'),'')});
    body=body.replace(/\b[A-Z]{3}\b/g,'').replace(/[-–—|,]+/g,' ').replace(/\s+/g,' ').trim();
    if(body&&value>0)return {player:body,team,value};
  }
  return null;
}

if(backdropEl)backdropEl.onclick=closeSheet;

    render();
    document.body.setAttribute('data-app-ready','true');

    const app=document.getElementById('app');

  }
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',boot,{once:true});}else{boot();}
})();
